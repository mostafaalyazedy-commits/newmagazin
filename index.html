  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--green), var(--gold));
  transition: width .25s ease;
}
#pdf-export-overlay .pdf-hint {
  margin-top: 12px;
  font-size: 12.5px;
  color: var(--muted);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
@media print { #pdf-export-overlay { display: none !important; } }


/* ════════════════════════════════════════════════════════════════
   SHOPPING MODE — Mobile-first storefront layered over the magazine
   body.shop-mode shows #shop-view and hides the magazine chrome.
   The magazine keeps rendering underneath (hidden) so PDF export,
   print and magazine mode stay 100% intact.
   ════════════════════════════════════════════════════════════════ */
.ph-pro { background: linear-gradient(150deg, #eef5ee 0%, #f7f3e8 55%, #eef2f7 100%) !important; letter-spacing: 0 !important; }
.ph-pro .ph-cross {
  width: 52px; height: 52px; border-radius: 16px;
  background: linear-gradient(135deg, var(--green, #1F8438), #2BA84A);
  color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 18px rgba(31,132,56,.25); margin-bottom: 10px;
}
.ph-pro .ph-brand { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 13px; color: #6d7c74; letter-spacing: 0 !important; text-transform: none !important; }
.cover-hero .ph-pro, .hero-product .ph-pro { background: rgba(244,236,219,0.08) !important; }
.cover-hero .ph-pro .ph-brand, .hero-product .ph-pro .ph-brand { color: rgba(244,236,219,0.75); }

body.shop-mode {
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  background: #f4f6f9;
  /* The magazine base styles body as a centered flex column to center the
     fixed 1240px pages — inside that, #shop-view shrinks to fit-content and
     the grid explodes to max-content width on phones. Shopping mode needs a
     normal full-width block flow. */
  display: block !important;
  align-items: initial !important;
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden;
  overflow-x: clip;
}
#shop-view { width: 100%; max-width: 100vw; }
.shop-header, .shop-main { width: 100%; }
.ocean-connection-bar { position:sticky; top:0; z-index:120; display:flex; align-items:center; justify-content:center; gap:10px; min-height:38px; padding:7px 14px; background:#fff5cf; color:#684d00; font:700 13px/1.4 inherit; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.ocean-connection-bar[hidden] { display:none !important; }
.ocean-connection-bar.is-offline,.ocean-connection-bar.is-error { background:#fff0f0; color:#8b1f28; }
.ocean-connection-bar button { border:1px solid currentColor; border-radius:999px; background:transparent; color:inherit; padding:5px 10px; font:inherit; cursor:pointer; min-height:30px; }
body.shop-mode .toolbar,
body.shop-mode .section-nav,
body.shop-mode #magazine { display: none !important; }
body:not(.shop-mode) #shop-view { display: none !important; }
#shop-view[hidden] { display: none !important; }

/* ── Sticky header ── */
.shop-header {
  position: sticky; top: 0; z-index: 900;
  background: linear-gradient(180deg, #0E3D6E 0%, #0A2A4D 100%);
  box-shadow: 0 8px 26px rgba(10,42,77,.28);
  padding: 10px 14px 0;
}
.sh-row { display: flex; align-items: center; gap: 10px; }
.sh-row-brand { justify-content: space-between; padding-bottom: 8px; }
.sh-brand { display: flex; align-items: center; gap: 9px; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 17px; color: #F4ECDB; }
.sh-brand .ring { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2BA84A, #1F8438); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; }
.sh-actions { display: flex; align-items: center; gap: 8px; }
.sh-btn {
  min-height: 44px; min-width: 44px; padding: 0 12px;
  border: 1px solid rgba(244,236,219,.22); border-radius: 12px;
  background: rgba(255,255,255,.07); color: #F4ECDB;
  font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; touch-action: manipulation;
}
.sh-btn:active { transform: scale(.96); }
.sh-mode-btn span { display: inline; }
.sh-cart-btn { position: relative; }
.sh-cart-count {
  position: absolute; top: 2px; inset-inline-start: 2px;
  min-width: 19px; height: 19px; padding: 0 5px; border-radius: 999px;
  background: #E63946; color: #fff; font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; font-family: 'Cairo', sans-serif;
}
.sh-more-wrap { position: relative; }
.sh-more-menu {
  position: absolute; top: calc(100% + 8px); inset-inline-end: 0; z-index: 950;
  background: #fff; border-radius: 14px; box-shadow: 0 18px 44px rgba(10,42,77,.3);
  padding: 6px; min-width: 190px;
}
.sh-more-menu button {
  display: flex; width: 100%; align-items: center; gap: 8px;
  padding: 12px 14px; border: 0; background: none; border-radius: 10px;
  font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14.5px; color: #14202f;
  cursor: pointer; text-align: start; min-height: 44px;
}
.sh-more-menu button:hover, .sh-more-menu button:focus-visible { background: #f0f4f8; }

.sh-row-search { padding-bottom: 10px; }
.sh-row-primary .sh-brand { flex: 0 0 auto; }
.sh-row-primary .sh-search-wrap { flex: 1 1 auto; }
.sh-row-primary .sh-actions { flex: 0 0 auto; }
.sh-search-wrap { position: relative; flex: 1 1 auto; min-width: 0; }
.sh-search-icn { position: absolute; inset-inline-start: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: .55; pointer-events: none; }
.sh-search {
  width: 100%; height: 48px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,.25);
  background: #fff; color: #14202f;
  font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 600;
  padding-inline-start: 40px; padding-inline-end: 40px;
  -webkit-appearance: none; appearance: none;
}
.sh-search::-webkit-search-cancel-button { display: none; }
.sh-search:focus { outline: 3px solid rgba(43,168,74,.45); outline-offset: 1px; }
.sh-search-clear {
  position: absolute; inset-inline-end: 6px; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%; border: 0;
  background: #eef1f5; color: #5a6470; font-size: 15px; cursor: pointer;
}
.sh-filter-btn {
  height: 48px; padding: 0 14px; border-radius: 14px; border: 0;
  background: linear-gradient(135deg, #2BA84A, #1F8438); color: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 15px;
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer; touch-action: manipulation;
  box-shadow: 0 8px 18px rgba(31,132,56,.35); position: relative; flex: 0 0 auto;
}
.sh-filter-btn:active { transform: scale(.96); }
.sh-filter-count {
  min-width: 20px; height: 20px; padding: 0 5px; border-radius: 999px;
  background: #FFD166; color: #7a5300; font-size: 12px; font-weight: 900;
  display: inline-flex; align-items: center; justify-content: center;
}

/* Suggestions dropdown */
.sh-suggest {
  position: absolute; inset-inline: 14px; z-index: 940;
  background: #fff; border-radius: 16px; box-shadow: 0 24px 60px rgba(10,42,77,.35);
  max-height: min(430px, 60vh); overflow-y: auto; padding: 6px;
}
.sh-suggest .sg-head { font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 12px; font-weight: 700; color: #8b96a5; padding: 10px 12px 4px; display: flex; justify-content: space-between; align-items: center; }
.sh-suggest .sg-head button { border: 0; background: none; color: #E63946; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; padding: 4px 6px; }
.sh-suggest .sg-item {
  display: flex; width: 100%; align-items: center; gap: 10px;
  padding: 11px 12px; border: 0; background: none; border-radius: 11px;
  font-family: 'Cairo', sans-serif; font-size: 14.5px; font-weight: 600; color: #14202f;
  cursor: pointer; text-align: start; min-height: 44px;
}
.sh-suggest .sg-item:hover, .sh-suggest .sg-item:focus-visible, .sh-suggest .sg-item.is-active { background: #f0f6f1; }
.sh-suggest .sg-item .sg-icn { flex: 0 0 auto; opacity: .55; font-size: 14px; }
.sh-suggest .sg-item .sg-txt { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sh-suggest .sg-item .sg-txt mark { background: #FFE9A8; color: inherit; border-radius: 3px; padding: 0 1px; }
.sh-suggest .sg-item .sg-price { flex: 0 0 auto; font-weight: 800; color: #E63946; font-variant-numeric: tabular-nums; font-size: 13.5px; white-space: nowrap; }
.sh-suggest .sg-all { color: #0E3D6E; font-weight: 800; justify-content: center; border-top: 1px dashed #e3e8ee; border-radius: 0 0 11px 11px; }

/* Category chips */
.sh-row-chips { padding-bottom: 10px; }
.sh-chips {
  display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 2px; margin: -2px; flex: 1 1 auto; min-width: 0;
}
.sh-chips::-webkit-scrollbar { display: none; }
.sh-chip {
  flex: 0 0 auto; min-height: 40px; padding: 0 15px; border-radius: 999px;
  border: 1.5px solid rgba(244,236,219,.28); background: rgba(255,255,255,.08);
  color: #F4ECDB; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; white-space: nowrap; touch-action: manipulation;
  display: inline-flex; align-items: center; gap: 6px;
}
.sh-chip:active { transform: scale(.96); }
.sh-chip.is-active { background: #F4ECDB; color: #0A2A4D; border-color: #F4ECDB; box-shadow: 0 6px 14px rgba(0,0,0,.22); }
.sh-chip.chip-hot.is-active { background: #E63946; color: #fff; border-color: #E63946; }

/* Active filter chips */
.sh-active-filters {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 0 0 10px;
}
.af-chip {
  display: inline-flex; align-items: center; gap: 7px; min-height: 36px;
  padding: 0 6px 0 12px; border-radius: 999px; border: 0;
  background: #FFD166; color: #6b4a00; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13px;
}
.af-chip .af-x { width: 26px; height: 26px; border-radius: 50%; border: 0; background: rgba(0,0,0,.14); color: inherit; font-size: 12px; cursor: pointer; }
.af-clear-all { border: 0; background: none; color: #FFE9A8; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13px; min-height: 36px; cursor: pointer; text-decoration: underline; }

/* Active filters belong to the results, not the sticky navigation. Keeping
   them in the document flow saves a complete header row on small screens. */
.shop-main > .sh-active-filters {
  flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
  margin: 0 0 10px; padding: 0 0 2px; min-height: 38px;
  align-items: center; -webkit-overflow-scrolling: touch;
}
.shop-main > .sh-active-filters::-webkit-scrollbar { display: none; }
.shop-main > .sh-active-filters .af-chip,
.shop-main > .sh-active-filters .af-clear-all { flex: 0 0 auto; }
.shop-main > .sh-active-filters .af-clear-all { color: #0E3D6E; }
.shop-main > .sh-row-chips {
  padding: 0 0 10px;
}
.shop-main > .sh-row-chips .sh-chip {
  border-color: #d7e0ea; background: #fff; color: #0E3D6E;
  box-shadow: 0 2px 8px rgba(10,42,77,.06);
}
.shop-main > .sh-row-chips .sh-chip.is-active {
  background: #0E3D6E; color: #fff; border-color: #0E3D6E;
  box-shadow: 0 5px 12px rgba(10,42,77,.18);
}
.shop-main > .sh-row-chips .sh-chip.chip-hot.is-active {
  background: #E63946; border-color: #E63946;
}

/* Backend-driven category identity. Each chip receives its category palette
   as CSS variables from Categories (accent_color / accent_deep /
   background_color). Inactive chips stay calm; the selected one becomes
   fully coloured. */
.shop-main > .sh-row-chips .sh-chip[data-chip="cat"] {
  border-color: var(--cat-accent, #0E3D6E);
  background: var(--cat-bg, #FDFAF1);
  color: var(--cat-ink, #10233D);
  box-shadow: 0 2px 8px color-mix(in srgb, var(--cat-accent, #0E3D6E) 14%, transparent);
}
.shop-main > .sh-row-chips .sh-chip[data-chip="cat"]::before {
  content: "";
  width: 8px;
  height: 8px;
  flex: 0 0 8px;
  border-radius: 50%;
  background: var(--cat-accent, #0E3D6E);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--cat-accent, #0E3D6E) 14%, transparent);
}
.shop-main > .sh-row-chips .sh-chip[data-chip="cat"].is-active {
  border-color: var(--cat-accent, #0E3D6E);
  background: linear-gradient(135deg, var(--cat-accent, #0E3D6E), var(--cat-deep, #0A2A4D));
  color: var(--cat-on, #fff);
  box-shadow: 0 6px 16px color-mix(in srgb, var(--cat-accent, #0E3D6E) 34%, transparent);
}
.shop-main > .sh-row-chips .sh-chip[data-chip="cat"].is-active::before {
  background: currentColor;
  box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 18%, transparent);
}

@media (max-width: 700px) {
  .shop-header { padding: 5px 8px; }
  .sh-row-primary { gap: 5px; padding: 0; }
  body.shop-mode .ocean-logo--header { width: 42px; height: 40px; padding: 3px; border-radius: 9px; }
  body.shop-mode .ocean-logo--header .ocean-logo__image { width: 100%; height: 32px; }
  .sh-actions { gap: 4px; }
  .sh-btn { min-height: 40px; min-width: 40px; width: 40px; padding: 0; border-radius: 10px; }
  .sh-search, .sh-filter-btn { height: 40px; border-radius: 10px; }
  .sh-search { font-size: 13px; padding-inline-start: 34px; padding-inline-end: 32px; }
  .sh-search-icn { inset-inline-start: 10px; }
  .sh-filter-btn { width: 40px; padding: 0; justify-content: center; box-shadow: none; }
  .sh-filter-lbl { display: none; }
  .sh-filter-count { position: absolute; top: -5px; inset-inline-start: -4px; min-width: 18px; height: 18px; font-size: 10px; }
  .shop-main > .sh-row-chips,
  .shop-main > .sh-active-filters { display: none !important; }
}

@media (max-width: 380px) {
  body.shop-mode .ocean-logo--header { display: none; }
}

/* Floating cart: kept out of the header so search and filters get the full
   horizontal space. The existing button/id are reused to preserve the cart
   sheet, badge updates and accessibility behaviour. */
.floating-cart-btn {
  position: fixed;
  bottom: max(18px, calc(12px + env(safe-area-inset-bottom, 0px)));
  inset-inline-start: 16px;
  z-index: 1120;
  width: 54px;
  min-width: 54px;
  height: 54px;
  min-height: 54px;
  padding: 0;
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 50%;
  background: linear-gradient(135deg, #0E3D6E 0%, #0A2A4D 100%);
  color: #fff;
  box-shadow: 0 10px 26px rgba(10,42,77,.36);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: bottom .25s ease, transform .15s ease, box-shadow .2s ease;
}
.floating-cart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 30px rgba(10,42,77,.42);
}
.floating-cart-btn:active { transform: scale(.94); }
.floating-cart-btn:focus-visible {
  outline: 3px solid rgba(43,168,74,.55);
  outline-offset: 3px;
}
.floating-cart-btn .sh-cart-count {
  top: -3px;
  inset-inline-start: -3px;
  box-shadow: 0 0 0 3px #f4f6f9;
}
body.cart-bar-open .floating-cart-btn { bottom: 88px; }
body:not(.shop-mode) .floating-cart-btn { display: none !important; }

@media (max-width: 700px) {
  .floating-cart-btn {
    inset-inline-start: 10px;
    width: 48px;
    min-width: 48px;
    height: 48px;
    min-height: 48px;
  }
  body.cart-bar-open .floating-cart-btn {
    bottom: calc(58px + env(safe-area-inset-bottom, 0px));
  }
}

/* ── Main ── */
.shop-main { max-width: 1240px; margin: 0 auto; padding: 14px 14px 120px; }
.shop-intro {
  background: linear-gradient(135deg, #0E3D6E, #14538f);
  border-radius: 20px; padding: 20px 20px 18px; margin-bottom: 14px;
  color: #F4ECDB; font-family: 'Cairo', sans-serif;
  box-shadow: 0 14px 34px rgba(10,42,77,.22);
  position: relative; overflow: hidden;
}
.shop-intro::after { content: '✦'; position: absolute; inset-inline-end: -8px; top: -18px; font-size: 110px; opacity: .07; }
.shop-intro .si-title { font-size: 24px; font-weight: 900; line-height: 1.2; }
.shop-intro .si-title em { font-style: normal; color: #FFD166; }
.shop-intro .si-sub { margin-top: 6px; font-size: 13.5px; font-weight: 600; opacity: .85; }
.shop-intro .si-meta { margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.1); border-radius: 999px; padding: 6px 13px; font-size: 12.5px; font-weight: 700; }

.shop-results-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.sr-count { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 15px; color: #14202f; }
.sr-count .q { color: #0E3D6E; }
.sr-tools { display: flex; align-items: center; gap: 8px; }
.sr-sort {
  height: 42px; border-radius: 12px; border: 1.5px solid #d6dde6; background: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 13.5px; color: #14202f;
  padding: 0 10px; max-width: 190px;
}
.sr-view { display: flex; border: 1.5px solid #d6dde6; border-radius: 12px; overflow: hidden; background: #fff; }
.sr-view-btn { width: 44px; height: 42px; border: 0; background: none; font-size: 17px; color: #8b96a5; cursor: pointer; }
.sr-view-btn[aria-pressed="true"] { background: #0E3D6E; color: #fff; }

/* ── Product cards (shop) ── */
.shop-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
@media (min-width: 700px)  { .shop-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; } }
@media (min-width: 1024px) { .shop-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; } }
@media (max-width: 389px)  { .shop-grid { grid-template-columns: 1fr; } }

.shop-card {
  background: #fff; border-radius: 18px; padding: 10px 10px 12px;
  box-shadow: 0 4px 16px rgba(16,35,61,.08); border: 1px solid #edf0f4;
  display: flex; flex-direction: column; gap: 8px; position: relative; min-width: 0;
}
.shop-card:active { transform: none; }
@media (hover: hover) and (pointer: fine) {
  .shop-card:active { transform: scale(.985); }
}
.sc-img {
  position: relative; border-radius: 13px; background: #F7F3E8; overflow: hidden;
  aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
}
.sc-img img { max-width: 90%; max-height: 90%; object-fit: contain; display: block; }
.sc-badge {
  position: absolute; top: 8px; inset-inline-start: 8px; z-index: 2;
  background: linear-gradient(135deg, #E63946, #c92a37); color: #fff;
  border-radius: 10px; padding: 5px 9px 6px; font-family: 'Cairo', sans-serif;
  font-weight: 900; font-size: 13px; line-height: 1.15; box-shadow: 0 6px 14px rgba(230,57,70,.35);
  max-width: calc(100% - 16px); text-align: center;
}
.sc-badge .b2 { display: block; font-size: 10.5px; font-weight: 800; opacity: .92; }
.sc-name {
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14.5px; line-height: 1.35; color: #10233d;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  min-height: 39px; overflow-wrap: anywhere;
}
.sc-vol {
  font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 12px; color: #7a8694;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; min-height: 17px;
}
.sc-price-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; min-width: 0; }
.sc-price {
  font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 19px; color: #E63946;
  font-variant-numeric: tabular-nums; white-space: nowrap; line-height: 1.25;
}
.sc-price .cur2 { font-size: 12px; font-weight: 800; }
.sc-old {
  font-family: 'Cairo', sans-serif; font-size: 12.5px; color: #98a2ae; text-decoration: line-through;
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.sc-save {
  font-family: 'Cairo', sans-serif; font-size: 11.5px; font-weight: 800; color: #1F8438;
  background: rgba(43,168,74,.12); border-radius: 8px; padding: 3px 8px; align-self: flex-start;
}
.sc-cart { margin-top: auto; }
.sc-add {
  width: 100%; min-height: 44px; border: 0; border-radius: 12px;
  background: linear-gradient(135deg, #2BA84A, #1F8438); color: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14.5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px; touch-action: manipulation;
  box-shadow: 0 6px 14px rgba(31,132,56,.25);
}
.sc-add:active { transform: scale(.97); }
.shop-card .product-qty-control { margin: 0; width: 100%; }
.shop-card[data-incart="0"] .product-qty-control { display: none; }
.shop-card[data-incart="1"] .sc-add { display: none; }

/* List view */
.shop-grid.is-list { grid-template-columns: 1fr; gap: 10px; }
.shop-grid.is-list .shop-card { flex-direction: row; align-items: stretch; padding: 10px; gap: 12px; }
.shop-grid.is-list .sc-img { flex: 0 0 112px; width: 112px; aspect-ratio: 1/1; align-self: center; }
.shop-grid.is-list .sc-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.shop-grid.is-list .sc-name { min-height: 0; }
.shop-grid.is-list .sc-cart { margin-top: auto; max-width: 240px; }
.shop-grid.is-list .sc-badge { top: 6px; inset-inline-start: 6px; font-size: 11.5px; padding: 4px 7px 5px; }

/* Empty state */
.shop-empty {
  background: #fff; border-radius: 20px; padding: 36px 22px; text-align: center;
  font-family: 'Cairo', sans-serif; box-shadow: 0 4px 16px rgba(16,35,61,.07);
}
.shop-empty .se-icn { font-size: 44px; margin-bottom: 10px; }
.shop-empty h3 { font-size: 19px; font-weight: 900; color: #10233d; margin-bottom: 6px; }
.shop-empty p { font-size: 14px; color: #7a8694; margin-bottom: 14px; }
.shop-empty .se-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.shop-empty .se-actions button {
  min-height: 44px; padding: 0 18px; border-radius: 12px; border: 1.5px solid #d6dde6;
  background: #fff; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: #0E3D6E; cursor: pointer;
}
.shop-empty .se-actions button.primary { background: #0E3D6E; border-color: #0E3D6E; color: #fff; }

/* ── Filter bottom sheet ── */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 1200; background: rgba(8,22,45,.55);
  -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  opacity: 0; transition: opacity .22s ease;
}
.sheet-backdrop.show { opacity: 1; }
.filter-sheet {
  position: fixed; inset-inline: 0; bottom: 0; z-index: 1210;
  background: #fff; border-radius: 22px 22px 0 0;
  max-height: 86vh; display: flex; flex-direction: column;
  transform: translateY(105%); transition: transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 -18px 60px rgba(10,42,77,.35);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.filter-sheet.show { transform: translateY(0); }
.fs-handle { width: 44px; height: 5px; border-radius: 999px; background: #d6dde6; margin: 10px auto 2px; }
.fs-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px 12px; border-bottom: 1px solid #eef1f5; }
.fs-head h2 { font-family: 'Cairo', sans-serif; font-size: 18px; font-weight: 900; color: #10233d; }
.fs-close { width: 40px; height: 40px; border-radius: 50%; border: 0; background: #f0f3f7; color: #5a6470; font-size: 15px; cursor: pointer; }
.fs-body { overflow-y: auto; padding: 14px 18px 18px; flex: 1 1 auto; }
.fs-group { margin-bottom: 20px; }
.fs-group h3 { font-family: 'Cairo', sans-serif; font-size: 14.5px; font-weight: 800; color: #0E3D6E; margin-bottom: 10px; }
.fs-opts { display: flex; flex-wrap: wrap; gap: 9px; }
.fs-opt {
  min-height: 42px; padding: 0 15px; border-radius: 999px;
  border: 1.5px solid #d6dde6; background: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 13.5px; color: #33404f;
  cursor: pointer; touch-action: manipulation; display: inline-flex; align-items: center; gap: 6px;
}
.fs-opt:active { transform: scale(.96); }
.fs-opt.is-on { background: #0E3D6E; border-color: #0E3D6E; color: #fff; }
.fs-foot {
  display: flex; gap: 10px; padding: 12px 18px calc(14px + env(safe-area-inset-bottom, 0));
  border-top: 1px solid #eef1f5; background: #fff;
}
.fs-clear {
  flex: 0 0 auto; min-height: 50px; padding: 0 18px; border-radius: 14px;
  border: 1.5px solid #d6dde6; background: #fff; color: #5a6470;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14.5px; cursor: pointer;
}
.fs-apply {
  flex: 1 1 auto; min-height: 50px; border: 0; border-radius: 14px;
  background: linear-gradient(135deg, #2BA84A, #1F8438); color: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 16px; cursor: pointer;
  box-shadow: 0 10px 22px rgba(31,132,56,.35);
}
body.sheet-open { overflow: hidden; }

/* Mode pill (magazine → shop) */
.mode-pill {
  position: fixed; bottom: 18px; inset-inline-start: 16px; z-index: 1100;
  min-height: 48px; padding: 0 18px; border: 0; border-radius: 999px;
  background: linear-gradient(135deg, #E63946, #c92a37); color: #fff;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14.5px; cursor: pointer;
  box-shadow: 0 12px 28px rgba(230,57,70,.4); touch-action: manipulation;
}
body.cart-bar-open .mode-pill { bottom: 86px; }
.mode-pill[hidden] { display: none !important; }

/* Desktop refinements */
@media (min-width: 701px) {
  .shop-header {
    position: sticky;
    top: 0;
    z-index: 900;
    padding-inline: max(24px, calc((100vw - 1240px)/2 + 14px));
  }
  .sh-search { height: 50px; }
  .sh-row-primary .sh-brand {
    flex: 0 0 44px;
    width: 44px;
    min-width: 44px;
  }
  body.shop-mode .ocean-logo--header {
    width: 44px;
    min-width: 44px;
    height: 44px;
    padding: 3px;
    border-radius: 8px;
  }
  body.shop-mode .ocean-logo--header .ocean-logo__image {
    width: 100%;
    height: 38px;
  }
  body.shop-mode .ocean-logo--header .ocean-logo__fallback {
    max-width: 38px;
    overflow: hidden;
    font-size: 10px;
  }
  .shop-main > .sh-row-chips {
    position: sticky;
    top: 70px;
    z-index: 860;
    padding: 8px 0;
    margin: -4px 0 10px;
    background: rgba(244,246,249,.96);
    border-bottom: 1px solid rgba(14,61,110,.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
}

/* Shopping chrome never leaks into print or PDF */
@media print {
  #shop-view, .filter-sheet, .sheet-backdrop, .mode-pill { display: none !important; }
  body.shop-mode #magazine { display: block !important; }
  body.shop-mode { background: #fff !important; }
}
body.pdf-exporting #shop-view,
body.pdf-exporting .filter-sheet,
body.pdf-exporting .sheet-backdrop,
body.pdf-exporting .mode-pill { display: none !important; }
@media (prefers-reduced-motion: reduce) {
  .filter-sheet, .sheet-backdrop { transition: none; }
}


/* ════════════════════════════════════════════════════════════════
   DESIGN TOKENS (shopping layer) + OFFICIAL OCEAN PHARMACY LOGO
   One image (./ocean-pharmacy-logo-optimized.png), one component,
   size variants — never redrawn, recolored, cropped or distorted.
   On dark surfaces the logo sits in its faithful white container.
   ════════════════════════════════════════════════════════════════ */
:root {
  --color-primary: #0E3D6E;
  --color-primary-dark: #0A2A4D;
  --color-brand-green: #1F8438;
  --color-brand-green-2: #2BA84A;
  --color-offer: #E63946;
  --color-gold: #FFD166;
  --color-surface: #ffffff;
  --color-background: #f4f6f9;
  --color-text: #14202f;
  --color-muted: #7a8694;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --shadow-card: 0 4px 16px rgba(16,35,61,.08);
  --touch-target: 44px;
  --header-z: 900;
  --sheet-z: 1210;
  --logo-ratio: 944 / 696;   /* real aspect ratio of the optimized logo */
}

.ocean-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  overflow: visible;
}
.ocean-logo__image {
  display: block;
  height: 100%;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  object-position: center;
  aspect-ratio: var(--logo-ratio);
}
.ocean-logo__fallback {
  display: none;
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  white-space: nowrap;
  color: var(--color-primary);
}
.ocean-logo.logo-missing .ocean-logo__image { display: none; }
.ocean-logo.logo-missing .ocean-logo__fallback { display: inline; }

/* Faithful white container for dark surfaces (the original artwork bg) */
.ocean-logo--chip {
  background: #fff;
  border-radius: var(--radius-sm);
  box-shadow: 0 3px 12px rgba(0,0,0,.16);
}

/* Variants */
.ocean-logo--header { height: 44px; padding: 4px 12px; }
.ocean-logo--header .ocean-logo__image { height: 36px; }
.ocean-logo--header .ocean-logo__fallback { font-size: 15px; }

.ocean-logo--toolbar { height: 42px; padding: 4px 12px; }
.ocean-logo--toolbar .ocean-logo__image { height: 34px; }
.ocean-logo--toolbar .ocean-logo__fallback { font-size: 15px; }

.ocean-logo--page { height: 52px; }
.ocean-logo--page .ocean-logo__image { height: 52px; }
.ocean-logo--page .ocean-logo__fallback { font-size: 16px; color: var(--teal, #14524d); }

.ocean-logo--cover { padding: 14px 24px; border-radius: 16px; }
.ocean-logo--cover .ocean-logo__image { height: 118px; }
.ocean-logo--cover .ocean-logo__fallback { font-size: 30px; }

.ocean-logo--final { padding: 10px 18px; border-radius: 14px; }
.ocean-logo--final .ocean-logo__image { height: 84px; }
.ocean-logo--final .ocean-logo__fallback { font-size: 22px; }

@media (max-width: 700px) {
  .ocean-logo--cover { padding: 10px 16px; }
  .ocean-logo--cover .ocean-logo__image { height: 74px; }
  .ocean-logo--page { height: 40px; }
  .ocean-logo--page .ocean-logo__image { height: 40px; }
}


/* ════════════════════════════════════════════════════════════════
   SHOPPING v2 — adaptive header, discovery, cart sheet, quick view,
   load-more, back-to-top
   ════════════════════════════════════════════════════════════════ */
/* Stable sticky header: its height must not change while the user scrolls.
   Collapsing this row used to move the whole document under the pointer and
   could repeatedly flip between compact/expanded states on mobile. */
.sh-row-brand {
  max-height: none;
  overflow: visible;
}
body.sh-compact .sh-row-brand {
  max-height: none;
  opacity: 1;
  padding-bottom: 8px;
  pointer-events: auto;
}

.sh-btn svg, .sh-filter-btn svg, .sh-search-icn svg { display: block; }
.sh-more-menu button svg { flex: 0 0 auto; color: var(--color-primary); }
.mode-pill { display: inline-flex; align-items: center; gap: 8px; }
.mode-pill svg { display: block; }
.sr-shown { font-weight: 600; color: var(--color-muted); font-size: 12.5px; }

/* Load more */
#shop-load-more { display: flex; justify-content: center; padding: 18px 0 6px; }
#shop-load-more[hidden] { display: none; }
.sh-load-more-btn {
  min-height: 48px; padding: 0 26px; border-radius: var(--radius-md);
  border: 1.5px solid #cfd8e3; background: var(--color-surface); color: var(--color-primary);
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer;
  box-shadow: var(--shadow-card);
}
.sh-load-more-btn:active { transform: scale(.97); }
#shop-load-sentinel { width: 1px; height: 1px; }

/* Discovery sections */
#shop-discover[hidden] { display: none; }
.dv-section { margin-bottom: 16px; }
.dv-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.dv-head h2 { font-family: 'Cairo', sans-serif; font-size: 17px; font-weight: 900; color: var(--color-text); }
.dv-all {
  border: 0; background: none; color: var(--color-primary); cursor: pointer;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13.5px;
  min-height: 40px; padding: 0 8px; text-decoration: underline; text-underline-offset: 3px;
}
.dv-scroll {
  display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 2px 2px 6px; margin: -2px;
}
.dv-scroll::-webkit-scrollbar { display: none; }
.dv-card {
  flex: 0 0 132px; width: 132px; border: 1px solid #edf0f4; border-radius: var(--radius-md);
  background: var(--color-surface); padding: 8px; cursor: pointer; text-align: center;
  box-shadow: var(--shadow-card); display: flex; flex-direction: column; gap: 6px;
  font-family: 'Cairo', sans-serif;
}
.dv-card:active { transform: scale(.97); }
.dv-img {
  position: relative; display: flex; align-items: center; justify-content: center;
  aspect-ratio: 1/1; background: #F7F3E8; border-radius: 10px; overflow: hidden;
}
.dv-img img { max-width: 88%; max-height: 88%; object-fit: contain; }
.dv-badge {
  position: absolute; top: 5px; inset-inline-start: 5px;
  background: var(--color-offer); color: #fff; border-radius: 7px;
  font-size: 11px; font-weight: 900; padding: 2px 6px 3px;
  font-variant-numeric: tabular-nums; direction: ltr;
}
.dv-badge--offer { background: var(--color-brand-green); direction: rtl; }
.dv-name {
  font-size: 12px; font-weight: 700; color: var(--color-text); line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  min-height: 31px;
}
.dv-price { font-size: 13.5px; font-weight: 900; color: var(--color-offer); font-variant-numeric: tabular-nums; }
.dv-price span { font-size: 10.5px; font-weight: 800; }

/* Cart sheet */
.cart-summary {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: var(--color-text);
  background: #f4f7fa; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px;
}
.cart-summary .cs-save { color: var(--color-brand-green); font-size: 13px; }
.cart-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 12px 2px; border-bottom: 1px solid #eef1f5;
}
.cr-info { flex: 1 1 auto; min-width: 0; font-family: 'Cairo', sans-serif; }
.cr-name { font-weight: 800; font-size: 14px; color: var(--color-text); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.cr-code { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--color-muted); margin-top: 2px; }
.cr-price { font-size: 13px; font-weight: 800; color: var(--color-offer); margin-top: 3px; font-variant-numeric: tabular-nums; }
.cr-price s { color: var(--color-muted); font-weight: 600; margin-inline-start: 6px; }
.cr-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: 0 0 auto; }
.cr-actions .product-qty-control { margin: 0; }
.cr-line { font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 13.5px; color: var(--color-text); font-variant-numeric: tabular-nums; }
.cr-del {
  border: 0; background: none; color: var(--color-offer); cursor: pointer;
  font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 12.5px;
  min-height: 32px; padding: 0 6px; text-decoration: underline; text-underline-offset: 2px;
}
.cart-empty { text-align: center; padding: 36px 10px; font-family: 'Cairo', sans-serif; }
.cart-empty p { font-size: 18px; font-weight: 900; color: var(--color-text); margin-bottom: 6px; }
.cart-empty span { font-size: 13.5px; color: var(--color-muted); }
.cart-foot .fs-apply { font-variant-numeric: tabular-nums; }

/* Quick view */
.qv-sheet .fs-body { padding-bottom: calc(22px + env(safe-area-inset-bottom, 0)); }
.qv-img {
  display: flex; align-items: center; justify-content: center;
  background: #F7F3E8; border-radius: var(--radius-md);
  height: min(46vw, 260px); margin-bottom: 14px; overflow: hidden;
}
.qv-img img { max-width: 86%; max-height: 86%; object-fit: contain; }
.qv-name { font-family: 'Cairo', sans-serif; font-size: 19px; font-weight: 900; color: var(--color-text); line-height: 1.35; }
.qv-en { font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 12.5px; color: var(--color-muted); margin-top: 3px; direction: ltr; text-align: end; }
.qv-sub { font-family: 'Cairo', sans-serif; font-size: 13.5px; color: #5a6470; margin-top: 6px; }
.qv-price-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.qv-price { font-family: 'Cairo', sans-serif; font-size: 26px; font-weight: 900; color: var(--color-offer); font-variant-numeric: tabular-nums; }
.qv-price span { font-size: 14px; }
.qv-old { font-family: 'Cairo', sans-serif; font-size: 14px; color: var(--color-muted); text-decoration: line-through; font-variant-numeric: tabular-nums; }
.qv-offer { background: var(--color-offer); color: #fff; border-radius: 8px; padding: 3px 10px 4px; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 800; }
.qv-save { margin-top: 8px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 800; color: var(--color-brand-green); }
.qv-code { margin-top: 8px; font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--color-muted); }
.qv-cart { margin-top: 16px; }
.qv-cart[data-incart="0"] .product-qty-control { display: none; }
.qv-cart[data-incart="1"] .sc-add { display: none; }
.qv-cart .product-qty-control { margin: 0; width: 100%; }

/* Back to top */
#back-to-top {
  position: fixed; bottom: 18px; inset-inline-end: 16px; z-index: 1100;
  width: 48px; height: 48px; border: 0; border-radius: 50%;
  background: var(--color-primary); color: #fff; cursor: pointer;
  box-shadow: 0 10px 24px rgba(10,42,77,.35);
  display: flex; align-items: center; justify-content: center;
}
#back-to-top[hidden] { display: none; }
body.cart-bar-open #back-to-top { bottom: 86px; }
body:not(.shop-mode) #back-to-top { display: none; }

/* Compact mobile cart dock: keep the order action visible without covering
   a large part of the product grid. These final overrides intentionally sit
   after the legacy mobile rules. */
@media (max-width: 700px) {
  .smart-cart-bar {
    padding-inline: 8px !important;
  }
  .smart-cart-inner {
    padding: 8px 10px 10px !important;
    gap: 8px !important;
    border-radius: 13px 13px 0 0 !important;
  }
  .smart-cart-summary .sc-count {
    font-size: 10.5px !important;
    letter-spacing: 0 !important;
  }
  .smart-cart-summary .sc-total {
    font-size: 16px !important;
    line-height: 1.1 !important;
  }
  .smart-cart-summary .sc-total span { font-size: 11px !important; }
  .smart-cart-cta {
    min-height: 42px !important;
    padding: 8px 10px !important;
    border-radius: 9px !important;
    font-size: 12.5px !important;
    line-height: 1.2 !important;
    gap: 6px !important;
  }
  .smart-cart-cta .wa-ic { width: 18px !important; height: 18px !important; }
  body.cart-bar-open { padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px)) !important; }
  #back-to-top { width: 40px; height: 40px; inset-inline-end: 12px; }
  #back-to-top svg { width: 17px; height: 17px; }
  body.cart-bar-open #back-to-top { bottom: 68px; }
}

/* ULTRA-COMPACT MOBILE CHROME — final authority.
   Keep only essential shopping controls fixed and release the viewport to
   the product grid. This block also neutralizes older three-row headers if a
   cached markup revision is served during deployment. */
@media (max-width: 700px) {
  .shop-header {
    padding: 3px 6px !important;
    min-height: 0 !important;
  }
  .shop-header > .sh-row-brand,
  .shop-header > .sh-row-chips,
  .shop-header > .sh-active-filters { display: none !important; }
  .sh-row-primary {
    min-height: 36px !important;
    gap: 4px !important;
  }
  .sh-row-primary .sh-brand {
    display: flex !important;
    flex: 0 0 34px !important;
    width: 34px !important;
    min-width: 34px !important;
  }
  .sh-row-primary .sh-more-wrap { display: none !important; }
  body.shop-mode .ocean-logo--header {
    display: inline-flex !important;
    width: 34px !important;
    min-width: 34px !important;
    height: 36px !important;
    padding: 2px !important;
    border-radius: 7px !important;
  }
  body.shop-mode .ocean-logo--header .ocean-logo__image {
    width: 100% !important;
    height: 30px !important;
  }
  body.shop-mode .ocean-logo--header .ocean-logo__fallback {
    font-size: 0 !important;
  }
  body.shop-mode .ocean-logo--header .ocean-logo__fallback::after {
    content: "O";
    font-size: 19px;
    font-weight: 900;
  }
  .sh-row-primary .sh-search,
  .sh-row-primary .sh-filter-btn,
  .sh-row-primary .sh-btn {
    height: 36px !important;
    min-height: 36px !important;
  }
  .sh-row-primary .sh-search { font-size: 12px !important; }
  .sh-row-primary .sh-filter-btn,
  .sh-row-primary .sh-btn { width: 36px !important; min-width: 36px !important; }
  .sh-row-primary .sh-search-icn svg { width: 16px; height: 16px; }
  .sh-row-primary .sh-cart-btn svg { width: 18px; height: 18px; }
  .sh-cart-count { top: -3px; inset-inline-start: -3px; }

  .smart-cart-bar { padding-inline: 6px !important; }
  .smart-cart-inner {
    padding: 5px 7px 6px !important;
    gap: 6px !important;
    border-radius: 11px 11px 0 0 !important;
  }
  .smart-cart-summary .sc-count { display: none !important; }
  .smart-cart-summary .sc-total {
    font-size: 14px !important;
    line-height: 1 !important;
  }
  .smart-cart-summary .sc-total span { font-size: 10px !important; }
  .smart-cart-cta {
    min-height: 36px !important;
    padding: 6px 9px !important;

const OCEAN_CACHE_VERSION = 1;
const OCEAN_CACHE_PREFIX = "ocean-storefront-v" + OCEAN_CACHE_VERSION + ":";

function oceanCacheRead(key) {
  try {

      if (timer) clearTimeout(timer);
      return data;
    } catch (error) {
      if (timer) clearTimeout(timer);
      lastError = error;
      if (attempt < retries) await oceanDelay(450 * Math.pow(2, attempt));
    }
  }
  throw lastError || new Error("Network request failed");
}
async function oceanLoadDataset(key, url, options) {
  options = options || {};
  const cached = oceanCacheRead(key);

  /* Stale-while-revalidate: a last-good response is returned synchronously
     from localStorage, while a bounded network refresh continues in the
     background. Optional sheets may also start empty so they never hold the
     product grid hostage on a first visit. */
  if (!options.force && (cached || options.allowEmptyCache)) {
    const initial = cached
      ? { data: cached.data, source: "cache", timestamp: cached.timestamp }
      : { data: [], source: "empty" };
    initial.refreshPromise = oceanFetchJson(url, { timeoutMs: 6000, retries: 1 }).then(data => {
      const changed = !cached || !oceanDatasetsEqual(cached.data, data);
      oceanCacheWrite(key, data);
      return { data: data, source: "network", changed: changed };
    });
    return initial;
  }

  try {
    const data = await oceanFetchJson(url, { timeoutMs: 6000, retries: 1 });
    oceanCacheWrite(key, data);
    return { data: data, source: "network" };
  } catch (error) {
    if (cached) return { data: cached.data, source: "cache", timestamp: cached.timestamp, error: error };
    throw error;
  }
}
function oceanSetConnectionState(state, detail) {
  let bar = document.getElementById("ocean-connection-bar");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "ocean-connection-bar";
    bar.setAttribute("role", "status");
    bar.setAttribute("aria-live", "polite");
    const host = document.getElementById("shop-header") || document.body;
    host.insertAdjacentElement(host === document.body ? "afterbegin" : "afterend", bar);
  }
  const labels = {
    loading: "جاري تحديث العروض…",
    cached: "الاتصال ضعيف — نعرض آخر نسخة محفوظة",
    offline: "أنت غير متصل بالإنترنت — يمكنك تصفح العروض المحفوظة",
    error: "تعذر تحديث العروض"
  };
  bar.className = "ocean-connection-bar is-" + state;
  bar.hidden = state === "online";
  bar.innerHTML = '<span>' + escapeHtml(detail || labels[state] || "") + '</span>' +
    ((state === "cached" || state === "offline" || state === "error")
      ? '<button type="button" id="ocean-network-retry">إعادة المحاولة</button>' : '');
  const retry = document.getElementById("ocean-network-retry");
  if (retry) retry.onclick = function () { loadMagazine({ force: true }); };
}

const truthy = v => /^(true|yes|y|1|نعم)$/i.test(String(v || "").trim());

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* Cart ID + price helpers — defined early so renderProductCard can use them */
function getProductCartId(p) {
  const code = String(p.item_code || p.sku || p.code || '').trim();
  if (code) return code;
  return String(p.product_name_ar || p.product_name || p.name_ar || p.name || 'product').trim().slice(0, 60);
}
function getProductPrice(p) {
  const candidates = [p.new_price, p.offer_price, p.sale_price, p.price];
  for (const v of candidates) {
    const n = parseFloat(String(v || '').replace(/[^0-9.]/g, ''));
    if (isFinite(n) && n > 0) return n;
  }
  return 0;
}

function whatsappLink(num, text) {
  const n = String(num||"").replace(/[^0-9]/g,"");
  if (!n) return "";
  return "https://wa.me/"+n+(text?"?text="+encodeURIComponent(text):"");
}

function extractDriveId(url) {
  if (!url) return null;
  var m1 = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_\-]+)/);
  if (m1) return m1[1];
  var m2 = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_\-]+)/);
  if (m2) return m2[1];
  var m3 = url.match(/[?&]id=([a-zA-Z0-9_\-]+)/);
  if (url.includes("drive.google.com") && m3) return m3[1];
  var m4 = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_\-]+)/);
  if (m4) return m4[1];
  return null;
}

function convertDriveUrl(url) {
  if (!url) return url;
  var id = extractDriveId(url);
  // Use uc?export=view — works on mobile/desktop without CORS/cookie issues
  if (id) return "https://drive.google.com/uc?export=view&id=" + id;
  return url;
}

const PH_HTML = '<div class="img-placeholder ph-pro"><div class="ph-cross" aria-hidden="true">✚</div><div class="ph-brand">صيدلية أوشن</div></div>';

function imgTag(url, alt, cssClass) {
  // Avoid double-converting URLs already processed by convertDriveUrl
  const raw = url || "";
  const src = raw ? (raw.includes("uc?export=view") || raw.includes("lh3.googleusercontent") ? raw : convertDriveUrl(raw)) : "";
  if (!src) return PH_HTML;
  const safePh = PH_HTML.replace(/'/g,"\\'").replace(/"/g,"&quot;");
  const cls = cssClass || "slot-img";
  const driveId = extractDriveId(src);
  const fallbackSrc = driveId ? "https://lh3.googleusercontent.com/d/" + driveId : "";
  const onerrorJs = fallbackSrc
    ? `if(!this._f){this._f=1;this.src='${fallbackSrc}';}else{this.outerHTML='${safePh}';}`
    : `this.outerHTML='${safePh}';`;
  return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt||"")}" class="${cls}" onerror="${onerrorJs}">`;
}

function toNumber(v) {
  const s = String(v||"").replace(/[^0-9.\-]/g,"");
  return s===""?NaN:parseFloat(s);
}

function enrichProduct(p, idx) {
  p.sheet_index = idx;
  const oldP = toNumber(p.old_price), newP = toNumber(p.new_price);
  const isCombo = /\d+\s*\+\s*\d+/.test(p.discount_percent||"");
  if ((!p.save_amount||!String(p.save_amount).trim()) && !isNaN(oldP) && !isNaN(newP))
    p.save_amount = String(Math.max(0, Math.round(oldP-newP)));
  if (!isCombo && (!p.discount_percent||!String(p.discount_percent).trim()) && !isNaN(oldP) && !isNaN(newP) && oldP>0)
    p.discount_percent = Math.round(((oldP-newP)/oldP)*100)+"%";
  return p;
}

function imageUrlFor(p) {
  if (p.image_url && p.image_url.trim()) return convertDriveUrl(p.image_url.trim());
  if (p.item_code && p.item_code.trim()) return "images/"+p.item_code.trim()+".png";
  return "";
}

/* productImageBlock is defined once in the Smart Product Photo Engine section below. */

function premiumCategoryTag(p) {
  const raw = String(p.category_ar || p.category_name_ar || p.category || p.category_key || p.section || "").trim().toLowerCase();
  const name = (p.category_ar || p.category_name_ar || p.category || p.section || "").trim();
  if (/baby|child|infant|kids|اطفال|أطفال|طفل|حليب/.test(raw)) return "للأطفال";
  if (/diaper|حفاض/.test(raw)) return "للأطفال";
  if (/vitamin|supplement|فيتامين|مكمل/.test(raw)) return "مكمل غذائي";
  if (/skin|beauty|care|بشرة|تجميل|عناية/.test(raw)) return "عناية";
  return name || "عرض خاص";
}

  el.textContent = text;

async function loadCategoryData(dataset) {
  try {
    const result = dataset || await oceanLoadDataset("categories", CATEGORIES_API_URL);
    const rows = result.data;
    CATEGORY_DATA = {};
    const list = [];
    rows.forEach(row => {
      // Use category_key if present, else auto-generate from English/Arabic name
      let key = String(row.category_key||"").trim();
      if (!key && row.category_name_en) key = String(row.category_name_en).trim();
      if (!key && row.category_name_ar) key = String(row.category_name_ar).trim();
      if (!key) return;
      key = key.toLowerCase(); // normalize to lowercase for consistent matching
      // Only skip if active column explicitly exists AND is FALSE
      const activeVal = String(row.active||"").trim();
      if (activeVal !== "" && !truthy(activeVal)) return;
      const entry = {
        key,
        name_ar:     row.category_name_ar || key,
        name_en:     row.category_name_en || key.toUpperCase(),
        toc_image:   convertDriveUrl(row.toc_image   || ""),
        hero_image:  convertDriveUrl(row.hero_image  || ""),
        cover_image: convertDriveUrl(row.cover_image || row.hero_image || ""),
        order:       parseInt(row.order,10)||99,
        css_class:   row.css_class      || "",
        accent:      row.accent_color   || DEFAULT_ACCENT,
        accent_deep: row.accent_deep    || DEFAULT_ACCENT_DEEP,
        bg:          row.background_color|| DEFAULT_BG,
        show_if_empty: truthy(row.show_if_empty)
      };
      CATEGORY_DATA[key] = entry;
      list.push(entry);
    });
    ORDERED_CATS = list.sort((a,b) => a.order - b.order);
    window.CATEGORY_DATA = CATEGORY_DATA;
    window.ORDERED_CATS = ORDERED_CATS;
    console.log("Categories loaded:", ORDERED_CATS.length);
    return result;
  } catch(err) {
    console.warn("Categories API failed, using empty fallback:", err.message);
    CATEGORY_DATA = {};
    ORDERED_CATS = [];
    window.CATEGORY_DATA = CATEGORY_DATA;
    window.ORDERED_CATS = ORDERED_CATS;
    return null;
  }
}

function renderProductCard(p) {
  const badgeCls = (function(){
    const b = String(p.offer_badge||"").toLowerCase();
    if (b==="alt"||b==="free"||b==="navy") return "alt";
    if (b==="gold") return "gold";
    return "";
  })();
  const isCombo = /\d+\s*\+\s*\d+/.test(p.discount_percent||"");
  const pctText = (p.discount_percent||"").trim() || (p.save_amount?p.save_amount+"%":"");
  const lblText = isCombo ? "مجاناً" : "خصم";
  const hasBadge = pctText?"":" style=\"display:none\"";
  /* Long TEXT offers (e.g. "Buy 2 Get 1 Free", "Buy 1 Get 1 50% Off") need a
     structured safe-area layout: each line is an independent span, the whole
     text sits in a .badge-content layer with internal padding, so no glyph
     can ever touch the badge edge. Short numeric badges keep their look. */
  const isTextOffer = pctText && (/[A-Za-z\u0600-\u06FF]/.test(pctText) || pctText.length > 6);
  let offerMain = pctText, offerFree = "";
  if (isTextOffer) {
    const mSplit = pctText.match(/^(.*\S)\s+(free!?)$/i) ||
                   pctText.match(/^(.*\S)\s+(\d+\s*%\s*off)$/i) ||
                   pctText.match(/^(.*\S)\s+(مجاناً|مجانا)$/);
    if (mSplit) { offerMain = mSplit[1]; offerFree = mSplit[2]; }
  }
  const badgeInnerHtml = isTextOffer
    ? `<span class="pct"><span class="offer-main">${escapeHtml(offerMain)}</span>${offerFree?` <span class="offer-free">${escapeHtml(offerFree)}</span>`:""}</span> <span class="lbl offer-ar">${lblText}</span>`
    : `<span class="pct">${escapeHtml(pctText)}</span> <span class="lbl">${lblText}</span>`;
  const tagText = premiumCategoryTag(p);
  /* High-value class: inject at render time — no post-processing needed */
  const discNum = parseInt(String(p.discount_percent||"").replace(/[^\d]/g,""),10)||0;
  const valueClass = discNum>=40 ? " spotlight" : discNum>=30 ? " high-value" : "";
  const valuePill  = discNum>=30 ? `<span class="high-value-tag">${discNum>=40?"⭐ قيمة استثنائية":"✦ قيمة ممتازة"}</span>` : "";
  return `
    <div class="product-card premium-card${valueClass}">
      <div class="premium-fav">♡</div>
      <div class="badge ${badgeCls}${isTextOffer?" badge-text-offer":""}"${hasBadge}>
        <span class="badge-content">${badgeInnerHtml}</span>
      </div>
      <div class="product-image">${(window.imageWithPriority ? window.imageWithPriority(productImageBlock(p)) : productImageBlock(p))}</div>
      <div class="product-copy">
        <div class="premium-tag-row"><span class="premium-tag">${escapeHtml(tagText)}</span>${valuePill}</div>
        ${p.product_name_en?`<div class="product-cat">${escapeHtml(p.product_name_en)}</div>`:""}
        <div class="product-name">${escapeHtml(p.product_name_ar||"")}</div>
        ${p.subtitle||p.description?`<div class="product-vol">${escapeHtml(p.subtitle||p.description||"")}</div>`:"<div class=\"product-vol\"></div>"}
      </div>
      <div class="premium-price-box">
        <div class="price-row">
          ${p.new_price?`<span class="price-new"><span class="cur">ر.س</span>${escapeHtml(p.new_price)}</span>`:""}
          ${p.old_price?`<span class="price-old">${escapeHtml(p.old_price)} ر.س</span>`:""}
        </div>
        ${p.save_amount&&String(p.save_amount).trim()!=="0"?`<div class="product-savings"><span>وفر ${escapeHtml(p.save_amount)} ر.س</span><span class="save-lbl">YOU SAVE</span></div>`:""}
        <div class="product-qty-control" data-qty="0" data-cart-id="${escapeHtml(getProductCartId(p))}" role="group" aria-label="الكمية">
          <button class="qty-btn qty-plus" type="button" data-cart-add="${escapeHtml(getProductCartId(p))}" data-product='${escapeHtml(JSON.stringify({id:getProductCartId(p),name_ar:p.product_name_ar||p.product_name||"صنف",name_en:p.product_name_en||"",code:p.item_code||p.sku||"",price:getProductPrice(p),old_price:toNumber(p.old_price),cat:p.category||""}))}' aria-label="إضافة إلى السلة">+</button>
          <span class="qty-value" aria-live="polite">أضف</span>
          <button class="qty-btn qty-minus" type="button" data-cart-remove="${escapeHtml(getProductCartId(p))}" aria-label="تقليل الكمية">−</button>
        </div>
      </div>
    </div>`;
}

/* ================================================================
   AUTO-PAGINATION: split products into pages
   ================================================================ */

function chunkProductsByCategory(catProducts, cat) {
  if (!catProducts.length) return [];

  const pages = [];
  // Page 1: hero + FIRST_PAGE_GRID_COUNT
  const firstPageTotal = 1 + FIRST_PAGE_GRID_COUNT; // hero + 8 grid
  const firstSlice = catProducts.slice(0, firstPageTotal);
  pages.push({ products: firstSlice, isFirst: true, hasHero: true });

  // Remaining pages: NORMAL_PAGE_GRID_COUNT each
  let remaining = catProducts.slice(firstPageTotal);
  while (remaining.length > 0) {
    const chunk = remaining.slice(0, NORMAL_PAGE_GRID_COUNT);
    pages.push({ products: chunk, isFirst: false, hasHero: false });
    remaining = remaining.slice(NORMAL_PAGE_GRID_COUNT);
  }

  return pages;
}

function renderCategoriesMount() {
  const mount = document.getElementById("categories-mount");
  if (!mount) return;

  const filtered = getFilteredProducts();

  if (!filtered.length) {
    if (ALL_PRODUCTS.length > 0) {
      /* Has products but filter/search returned zero → empty state */
      mount.innerHTML = `<div class="page-wrap"><section class="page" style="position:relative;overflow:visible;height:auto;transform:none;width:100%">
        <div class="page-pad" style="position:relative;inset:auto;padding:20px 16px 40px">
          <div class="empty-state" role="status" aria-live="polite">
            <div class="es-icon" aria-hidden="true">🔍</div>
            <h2>لا توجد منتجات مطابقة</h2>
            <p>لم يتم العثور على منتجات تطابق بحثك. جرّب كلمة أخرى أو تصفح الأقسام.</p>
            <button class="es-btn" onclick="clearMagSearch()" aria-label="مسح البحث والعودة للكل">مسح البحث ↩</button>
          </div>
        </div>
      </section></div>`;
    } else {
      mount.innerHTML = renderErrorPage("لم يتم العثور على أي منتج يطابق البحث الحالي.");
    }
    return;
  }

  // Group by category key, preserve sheet_index order
  const groups = new Map();
  for (const p of filtered) {
    const k = String(p.category||"").trim().toLowerCase();
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(p);
  }
  // Sort within each group by sheet_index
  for (const [, list] of groups) list.sort((a,b) => a.sheet_index - b.sheet_index);

  // Determine display order:
  // Priority 1: categories that exist in CATEGORY_DATA, in ORDERED_CATS order
  // Priority 2: unknown categories (warn, show at end if any)
  const orderedKeys = [];
  const unknownKeys = [];
  const productCatKeys = new Set(groups.keys());

  // First: categories from ORDERED_CATS that have products
  for (const cat of ORDERED_CATS) {
    if (productCatKeys.has(cat.key)) orderedKeys.push(cat.key);
  }

  // Any product category not in CATEGORY_DATA
  for (const k of productCatKeys) {
    if (!CATEGORY_DATA[k]) {
      console.warn("[Magazine] Unknown category in products (not in Categories sheet):", k);
      unknownKeys.push(k);
    }
  }

  let globalPageNum = 3; // pages 1=cover, 2=toc, 3+ = products
  const pages = [];

  for (const key of orderedKeys) {
    const cat    = CATEGORY_DATA[key];
    const prods  = groups.get(key) || [];
    const chunks = chunkProductsByCategory(prods, cat);
    for (const chunk of chunks) {
      pages.push(renderCategoryPageHtml(cat, chunk.products, pages.length, chunk.isFirst, chunk.hasHero, globalPageNum));
      globalPageNum++;
    }
  }

  // Unknown categories shown last with default styling
  for (const key of unknownKeys) {
    const fakeCat = { key, name_ar: key, name_en: key.toUpperCase(), accent: DEFAULT_ACCENT, accent_deep: DEFAULT_ACCENT_DEEP, bg: DEFAULT_BG, hero_image: "", css_class: "" };
    const prods   = groups.get(key) || [];
    const chunks  = chunkProductsByCategory(prods, fakeCat);
    for (const chunk of chunks) {
      pages.push(renderCategoryPageHtml(fakeCat, chunk.products, pages.length, chunk.isFirst, chunk.hasHero, globalPageNum));
      globalPageNum++;
    }
  }

  mount.innerHTML = pages.join("");
  applyPageScale();

  /* Overflow guard: run synchronously in the SAME frame so cards never
     visibly hop between pages after appearing; scheduled passes still
     re-check after web-fonts settle and on resize. */
  if (typeof enforcePageBounds === "function") enforcePageBounds();
  if (typeof schedulePageBalance === "function") schedulePageBalance();

  /* Enterprise: update count badge on every render */
  if (typeof upsertResultCount === "function") upsertResultCount();
}

/* ================================================================
   FILTERED PRODUCTS
   ================================================================ */

function getFilteredProducts() {
  const q   = CURRENT_FILTER.search.trim().toLowerCase();
  const cat = CURRENT_FILTER.category;
  return ALL_PRODUCTS.filter(p => {
    if (cat && String(p.category||"").trim().toLowerCase() !== cat) return false;
    if (q) {
      const hay = ((p.product_name_ar||"")+" "+(p.product_name_en||"")+" "+(p.item_code||"")+" "+(p.category||"")+" "+(p.subtitle||"")+" "+(p.description||"")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ================================================================
   TOC RENDER
   ================================================================ */

/* Max tiles per index page: 3 rows × 2 columns. Six tiles always fit the
   fixed 1240×1754 page; anything beyond flows into continuation pages. */
const TOC_TILES_PER_PAGE = 6;

function buildTocTileHtml(cat, i) {
  const tocImg = cat.toc_image ? imgTag(cat.toc_image, cat.name_en) : PH_HTML;
  const slug = slugifyCategoryName(cat.name_ar || cat.key);
  return `
      <div class="toc-tile"
           data-target="${slug}"
           role="button"
           tabindex="0"
           aria-label="انتقل إلى قسم ${escapeHtml(cat.name_ar)}">
        <div class="tt-num">${String(i + 1).padStart(2, "0")}</div>
        <div class="tt-img">${tocImg}</div>
        <div class="tt-cat">${escapeHtml(cat.name_en)}</div>
        <div class="tt-title">${escapeHtml(cat.name_ar)}</div>
        <div class="tt-meta">
          <span class="count"></span>
          <span class="pg"></span>
        </div>
      </div>`;
}

function renderTocGrid() {
  const mount = document.getElementById("toc-grid-mount");
  if (!mount) return;

  /* Re-render safety: drop previously created continuation index pages */
  document.querySelectorAll(".toc-page-wrap.toc-cont").forEach(el => el.remove());

  // Collect categories that actually have products (in display order)
  const productCatKeys = new Set(ALL_PRODUCTS.map(p=>String(p.category||"").trim().toLowerCase()));
  const displayCats = ORDERED_CATS.filter(cat => productCatKeys.has(cat.key) || cat.show_if_empty);

  if (!displayCats.length) {
    mount.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--muted); font-family:'Cairo',sans-serif; font-size:22px; padding: 40px;">لا توجد أقسام متاحة</div>`;
    return;
  }

  const count = ALL_PRODUCTS.length;
  const tiles = displayCats.map((cat, i) => buildTocTileHtml(cat, i));
  const baseWrap = mount.closest(".page-wrap");

  /* First index page: up to 6 tiles (unchanged design) */
  mount.innerHTML = tiles.slice(0, TOC_TILES_PER_PAGE).join("");

  /* Continuation index pages: clone the page chrome, swap the tiles.
     Cloned pages carry no ids (the anchors stay unique) and use fixed
     row heights so a sparse last page keeps balanced tiles. */
  if (baseWrap && tiles.length > TOC_TILES_PER_PAGE) {
    let anchor = baseWrap;
    for (let start = TOC_TILES_PER_PAGE; start < tiles.length; start += TOC_TILES_PER_PAGE) {
      const contWrap = baseWrap.cloneNode(true);
      contWrap.classList.add("toc-cont");
      contWrap.removeAttribute("id");
      contWrap.querySelectorAll("[id]").forEach(el => el.removeAttribute("id"));
      const grid = contWrap.querySelector(".toc-grid");
      if (grid) grid.innerHTML = tiles.slice(start, start + TOC_TILES_PER_PAGE).join("");
      const monoEl = contWrap.querySelector(".cat-mono");
      if (monoEl) monoEl.textContent = "INDEX · تابع الفهرس";
      anchor.after(contWrap);
      anchor = contWrap;
    }
  }

  // Update cover stats
  const catCountEl  = document.getElementById("cover-cat-count");
  const prodCountEl = document.getElementById("cover-prod-count");
  if (catCountEl)  catCountEl.textContent  = displayCats.length;
  if (prodCountEl) prodCountEl.textContent = count + "+";

  // Page numbers reflect the real page sequence (works on mobile too)
  if (typeof renumberMagazinePages === "function") renumberMagazinePages();
}

function updateCoverImage() {
  const img = document.getElementById("cover-hero-img");
  if (!img) return;
  const cats = ORDERED_CATS.filter(c => c.cover_image || c.hero_image);
  const best = (cats.find(c=>c.cover_image)||cats.find(c=>c.hero_image));
  if (best) {
    const url = best.cover_image || best.hero_image;
    img.src = url;
    img.style.display = "";
   img.onerror = function() { 
     console.error("Cover image failed:", this.src);
     this.style.display = "none"; 
   };
  }
}

   ================================================================ */

function showStorefrontLoadError(message) {
  const grid = document.getElementById("shop-grid");
  const empty = document.getElementById("shop-empty");
  if (grid) grid.innerHTML = "";
  if (!empty) return;
  empty.hidden = false;
  empty.innerHTML = `<div class="se-icn" aria-hidden="true">⚠️</div>
    <h3>تعذر تحميل العروض</h3>
    <p>${escapeHtml(message || "حدث خطأ أثناء تحميل المنتجات.")}</p>
    <div class="se-actions"><button type="button" class="primary" onclick="loadMagazine({force:true})">إعادة المحاولة</button></div>`;
}

async function loadMagazine(options) {
  options = options || {};
  const loadSequence = ++OCEAN_LOAD_SEQUENCE;
  const mount      = document.getElementById("categories-mount");
  const finalMount = document.getElementById("final-page-mount");
  if (!mount) return;

  /* Enterprise: skeleton cards instead of bare spinner */
  if (!options.silent && !SHOP_ONLY_MODE) (function buildSkeleton() {
    function skelCard() {
      return '<div class="product-card skeleton-card" aria-hidden="true">' +
        '<div class="skel-img"></div>' +
        '<div class="skel-line wide"></div>' +
        '<div class="skel-line mid"></div>' +
        '<div class="skel-line short"></div>' +
        '<div class="skel-price-row"><div class="skel-line price" style="flex:1"></div>' +
        '<div class="skel-line mid"></div></div></div>';
    }
    var cards = Array.from({length:8}, skelCard).join("");
    mount.innerHTML = '<div class="page-wrap"><section class="page" style="position:relative;overflow:visible;height:auto;transform:none;width:100%">' +
      '<div class="page-pad" style="position:relative;inset:auto;padding:20px 16px 16px;">' +
      '<div class="grid-4" role="status" aria-busy="true" aria-label="جاري تحميل المنتجات">' + cards + '</div></div></section></div>';
  })();
  if (!options.silent) {
    setStatus("جاري التحميل…","");
    oceanSetConnectionState(navigator.onLine === false ? "offline" : "loading");
  }

  // Products, categories and settings start together. Optional sheets never
  // delay the product grid, and an older request cannot overwrite a newer one.
  const supplied = options.datasets || {};
  const [prodResult, catResult, settingsResult] = await Promise.allSettled([
    supplied.products ? Promise.resolve(supplied.products) :
      oceanLoadDataset("products", PRODUCTS_API_URL, { force: !!options.force }),
    supplied.categories ? Promise.resolve(supplied.categories) :
      oceanLoadDataset("categories", CATEGORIES_API_URL, { force: !!options.force, allowEmptyCache: true }),
    supplied.settings ? Promise.resolve(supplied.settings) :
      oceanLoadDataset("settings", SETTINGS_API_URL, { force: !!options.force, allowEmptyCache: true })
  ]);
  if (loadSequence !== OCEAN_LOAD_SEQUENCE) return;
  if (catResult.status === "fulfilled") await loadCategoryData(catResult.value);
  if (settingsResult.status === "fulfilled") {
    await loadMagazineSettings(settingsResult.value);
    if (typeof renderCoverAndStaticSections === "function") renderCoverAndStaticSections();
  }

  // Magazine artwork is not built in the single storefront experience.
  if (!SHOP_ONLY_MODE) updateCoverImage();

  if (prodResult.status === "rejected") {
    setStatus("تعذّر التحميل","error");
    oceanSetConnectionState(navigator.onLine === false ? "offline" : "error");
    if (!SHOP_ONLY_MODE) mount.innerHTML = renderErrorPage("تعذر تحميل العروض حاليًا. يرجى المحاولة لاحقًا.");
    else showStorefrontLoadError("تعذر تحميل العروض حاليًا. يرجى المحاولة لاحقًا.");
    if (finalMount) { finalMount.innerHTML = renderFinalPage(buildFinalPageSettings()); applyPageScale(); }
    return;
  }

  const rawProducts = prodResult.value.data;
  const seenProducts = new Set();
  const products = rawProducts
    .filter(r => r && Object.values(r).some(v=>String(v||"").trim()!=="") && (truthy(r.is_active)||truthy(r.active)))
    .filter(r => {
      const code = String(r.item_code || r.sku || r.code || "").trim();
      const fallback = [
        r.product_name_ar || r.product_name || r.name_ar || r.name || "",
        r.category || "",
        r.volume || r.size || r.subtitle || "",
        r.new_price || r.offer_price || r.sale_price || r.price || ""
      ].map(v => String(v || "").trim().toLowerCase()).join("|");
      const identity = code ? "code:" + code.toLowerCase() : "row:" + fallback;
      if (seenProducts.has(identity)) return false;
      seenProducts.add(identity);
      return true;
    })
    .map((row, idx) => enrichProduct({...row}, idx));

  if (!products.length) {
    setStatus("لا توجد منتجات فعّالة","error");
    if (!SHOP_ONLY_MODE) mount.innerHTML = renderErrorPage("لم يتم العثور على أي منتج فعّال. تأكد أن العمود active مضبوط على TRUE.");
    else showStorefrontLoadError("لا توجد منتجات متاحة حاليًا.");
    if (finalMount) { finalMount.innerHTML = renderFinalPage(buildFinalPageSettings()); applyPageScale(); }
    return;
  }

  ALL_PRODUCTS = products;
  window.ALL_PRODUCTS = ALL_PRODUCTS;

  if (!SHOP_ONLY_MODE) {
    // Legacy magazine render path kept dormant for data compatibility only.
    renderTocGrid();
    populateCategoryFilter();
    renderCategoriesMount();
    if (finalMount) { finalMount.innerHTML = renderFinalPage(buildFinalPageSettings()); }
    applyPageScale();
  } else {
    mount.innerHTML = "";
  }

  const now = new Date().toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
  setStatus(products.length+" منتج · "+now,"ok");
  const usedCache = prodResult.value.source === "cache" ||
    (catResult.status === "fulfilled" && catResult.value.source === "cache") ||
    (settingsResult.status === "fulfilled" && settingsResult.value.source === "cache");
  oceanSetConnectionState(usedCache ? (navigator.onLine === false ? "offline" : "cached") : "online");

  /* Notify the shopping renderer when a silent background refresh replaces
     the data. Its current search/filter state is preserved. */
  try {
    window.dispatchEvent(new CustomEvent("ocean:products-updated", {
      detail: { source: prodResult.value.source, background: !!options.background }
    }));
  } catch (_) {}

  /* Attach to any stale-while-revalidate requests only after the cached UI is
     already visible. One consolidated repaint avoids three separate jumps. */
  if (!options.skipBackground) {
    const entries = [
      { name: "products", base: prodResult },
      { name: "categories", base: catResult },
      { name: "settings", base: settingsResult }
    ];
    const hasRefresh = entries.some(entry =>
      entry.base.status === "fulfilled" && entry.base.value && entry.base.value.refreshPromise
    );
    if (hasRefresh) {
      Promise.allSettled(entries.map(entry =>
        entry.base.status === "fulfilled" && entry.base.value.refreshPromise
          ? entry.base.value.refreshPromise
          : Promise.resolve(null)
      )).then(freshResults => {
        if (loadSequence !== OCEAN_LOAD_SEQUENCE) return;
        let changed = false;
        let anySuccess = false;
        const datasets = {};
        entries.forEach((entry, index) => {
          const fresh = freshResults[index];
          if (fresh.status === "fulfilled" && fresh.value) {
            datasets[entry.name] = fresh.value;
            changed = changed || !!fresh.value.changed;
            anySuccess = true;
          } else if (entry.base.status === "fulfilled") {
            datasets[entry.name] = entry.base.value;
          }
        });
        if (changed && datasets.products) {
          loadMagazine({ datasets: datasets, skipBackground: true, silent: true, background: true });
        } else if (anySuccess) {
          oceanSetConnectionState("online");
        }
      });
    }
  }

  /* Enterprise: update result count + value classes after full load */
  if (typeof upsertResultCount === "function") upsertResultCount();
}

/* ================================================================
   SMART PRODUCT PHOTO ENGINE
   - Dynamic gradient background from image dominant color
   - Smart auto-zoom via natural img sizing
   - Drop shadow + anti-aliasing
   - Loading shimmer → fade in
   - Cache processed results
   ================================================================ */

const IMG_CACHE = new Map();

// Extract dominant color from image via canvas (same-origin or CORS-enabled)
function extractDominantColor(img) {
  try {
    const c = document.createElement("canvas");
    const size = 40;
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;
    let r=0, g=0, b=0, count=0;
    for (let i=0; i<data.length; i+=4) {
      const a = data[i+3];
      // Skip transparent + near-white + near-black pixels
      if (a < 30) continue;
      const R=data[i], G=data[i+1], B=data[i+2];
      const brightness = (R+G+B)/3;
      if (brightness > 235 || brightness < 15) continue;
      r+=R; g+=G; b+=B; count++;
    }
    if (!count) return null;
    return { r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) };
  } catch(e) {
    return null; // CORS block — silent fail
  }
}

function rgbToHsl(r, g, b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h, s, l=(max+min)/2;
  if (max===min) { h=s=0; } else {
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      default: h=((r-g)/d+4)/6;
    }
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function buildGradient(col, containerEl) {
  const { h, s, l } = rgbToHsl(col.r, col.g, col.b);
  // Muted pastel gradient: light version of color
  const sLight = Math.min(s, 35);
  const c1 = `hsl(${h},${sLight}%,${Math.min(l+32,96)}%)`;
  const c2 = `hsl(${(h+30)%360},${sLight}%,${Math.min(l+20,90)}%)`;
  const fade = `hsl(${h},${sLight}%,${Math.min(l+28,94)}%,0.5)`;
  containerEl.style.setProperty("--pi-bg", `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`);
  containerEl.style.setProperty("--pi-fade", fade);
}

function smartProcessImage(containerEl, src, alt) {
  if (!src) return;

  // Check cache
  if (IMG_CACHE.has(src)) {
    const cached = IMG_CACHE.get(src);
    applySmartImage(containerEl, cached.src, alt, cached.gradient);
    return;
  }

  // Show shimmer
  containerEl.classList.add("pi-loading");
  containerEl.innerHTML = "";

  const img = new Image();
  // No crossOrigin — avoids CORS block on mobile for Drive images
  img.decoding = "async";

  img.onload = function() {
    containerEl.classList.remove("pi-loading");

    // Try color extraction
    const col = extractDominantColor(img);
    let gradApplied = false;
    if (col) {
      buildGradient(col, containerEl);
      gradApplied = true;
    }

    // Cache result
    IMG_CACHE.set(src, { src, gradient: gradApplied });

    applySmartImage(containerEl, src, alt, gradApplied);
  };

  img.onerror = function() {
    // Fallback: try lh3.googleusercontent.com if uc?export=view failed
    var driveId = extractDriveId(src);
    if (driveId && !img._triedFallback) {
      img._triedFallback = true;
      img.src = "https://lh3.googleusercontent.com/d/" + driveId;
      return;
    }
    containerEl.classList.remove("pi-loading");
    containerEl.innerHTML = '<div class="img-placeholder"><div class="ph-icn">!</div><div>Image<br>unavailable</div></div>';
    console.warn("[PhotoEngine] Failed to load:", src);
  };

  img.src = src;
}

function applySmartImage(containerEl, src, alt, hasGradient) {
  // Wrap img for smart zoom behavior
  const wrap = document.createElement("div");
  wrap.className = "pi-img-wrap";
  // Ensure wrap fills container on all screen sizes
  wrap.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;";
  const img = document.createElement("img");
  img.src = src;
  img.alt = alt || "";
  img.loading = "eager";
  img.decoding = "async";
  // Fade in
  img.style.opacity = "0";
  img.style.transition = "opacity 0.35s ease";
  img.onload = () => { img.style.opacity = "1"; };
  img.onerror = () => {
    // Fallback to lh3 if primary URL failed
    var driveId = extractDriveId(src);
    if (driveId && !img._triedFallback) {
      img._triedFallback = true;
      img.src = "https://lh3.googleusercontent.com/d/" + driveId;
      return;
    }
    containerEl.innerHTML = '<div class="img-placeholder"><div class="ph-icn">!</div><div>Image<br>unavailable</div></div>';
  };
  wrap.appendChild(img);
  containerEl.innerHTML = "";
  containerEl.appendChild(wrap);
}
