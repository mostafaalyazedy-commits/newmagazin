  function applyLogo(root) {
    if (!root) return;
    var images = [];
    if (root.matches && root.matches(".ocean-logo__image")) images.push(root);
    if (root.querySelectorAll) {
      root.querySelectorAll(".ocean-logo__image").forEach(function (img) { images.push(img); });
    }
    images.forEach(function (img) {
      if (img.dataset.oceanLogoApplied === "1") return;
      img.dataset.oceanLogoApplied = "1";
      var holder = img.closest ? img.closest(".ocean-logo") : null;
      if (holder) holder.classList.remove("logo-missing");
      img.src = OCEAN_LOGO_SRC;
    });
  }

  function bootLogo() {
    applyLogo(document);
    new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (node.nodeType === 1) applyLogo(node);
        });
      });
    }).observe(document.documentElement, { childList: true, subtree: true });
  }

  /* Install immediately while the document is still being parsed, so every
     logo gets the embedded artwork before a missing relative asset can flash. */
  if (document.documentElement) bootLogo();
  else document.addEventListener("DOMContentLoaded", bootLogo, { once: true });
})();

<style>
  :root {
    --teal: #0E3D6E; --teal-deep: #0A2A4D; --teal-soft: #1A5290;
    --cream: #F4ECDB; --cream-light: #FBF6EA; --paper: #FDFAF1;
    --coral: #E63946; --coral-deep: #B5202C;
    --gold: #C9A567; --gold-deep: #9A7A3F;
    --green: #2BA84A; --green-deep: #1F8438;
    --sand: #E8DCC2; --ink: #14201F; --muted: #7A7468; --line: #D8CFB8;
    --pad-x: 72px; --pad-y: 72px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #1a1a1a; color: var(--ink); -webkit-font-smoothing: antialiased; padding-top: 72px; }

  /* TOOLBAR */
  .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: var(--teal-deep); color: var(--cream-light); display: flex; align-items: center; gap: 14px; padding: 0 22px; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.35); font-family: 'Cairo', sans-serif; }
  .toolbar .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 18px; margin-inline-end: 12px; white-space: nowrap; }
  .toolbar .brand .ring { width: 32px; height: 32px; border-radius: 50%; background: var(--green); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 17px; box-shadow: 0 0 0 3px rgba(43,168,74,0.22); }
  .toolbar .divider { width: 1px; height: 28px; background: rgba(244,236,219,0.18); }
  .toolbar .search, .toolbar .filter { background: rgba(244,236,219,0.08); border: 1px solid rgba(244,236,219,0.18); color: var(--cream-light); padding: 8px 14px; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 15px; outline: none; min-width: 220px; }
  .toolbar .search::placeholder { color: rgba(244,236,219,0.5); }
  .toolbar .filter { min-width: 180px; cursor: pointer; }
  .toolbar .filter option { background: var(--teal-deep); color: var(--cream-light); }
  .toolbar .search:focus, .toolbar .filter:focus { border-color: var(--gold); background: rgba(244,236,219,0.14); }
  .toolbar .spacer { flex: 1; }
  .toolbar button { background: rgba(244,236,219,0.08); border: 1px solid rgba(244,236,219,0.18); color: var(--cream-light); padding: 9px 18px; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.15s ease; }
  .toolbar button:hover { background: rgba(244,236,219,0.16); border-color: var(--gold); }
  .toolbar button.primary { background: var(--coral); border-color: var(--coral); }
  .toolbar button.primary:hover { background: var(--coral-deep); border-color: var(--coral-deep); }
  .toolbar button .ic { font-size: 16px; line-height: 1; }
  .toolbar .status { font-family: 'Roboto Mono', monospace; font-size: 12px; color: rgba(244,236,219,0.65); letter-spacing: 0.06em; white-space: nowrap; }
  .toolbar .status.error { color: #ff8a8a; }
  .toolbar .status.ok { color: #6bd97a; }

  /* IMAGE PLACEHOLDER */
  .img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: repeating-linear-gradient(135deg, var(--cream) 0px, var(--cream) 14px, var(--cream-light) 14px, var(--cream-light) 28px); color: var(--muted); font-family: 'Roboto Mono', monospace; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; text-align: center; padding: 16px; }
  .img-placeholder .ph-icn { width: 44px; height: 44px; border: 2px solid var(--muted); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 22px; line-height: 1; }
  .cover-hero .img-placeholder, .hero-product .img-placeholder { background: rgba(244,236,219,0.06); color: rgba(244,236,219,0.6); }
  .cover-hero .img-placeholder .ph-icn, .hero-product .img-placeholder .ph-icn { border-color: rgba(244,236,219,0.5); }

  /* TYPOGRAPHY */
  .mono { font-family: 'Roboto Mono', monospace; letter-spacing: 0.08em; }
  .wordmark { display: inline-flex; align-items: baseline; gap: 14px; font-family: 'Cairo', sans-serif; font-weight: 700; }
  .wordmark-mark { width: 38px; height: 38px; border-radius: 50%; background: var(--green); display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 22px; transform: translateY(6px); box-shadow: 0 0 0 3px rgba(43,168,74,0.18); }

  /* PRODUCT CARD */
  .product-card { background: white; border: 1px solid var(--line); padding: 20px 22px 0; position: relative; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 28px -12px rgba(20,32,31,0.18), 0 2px 6px rgba(20,32,31,0.04); border-radius: 10px; overflow: hidden; min-height: 520px; }
  .product-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--sec-accent, var(--teal)); z-index: 1; }

.product-image img,

  /* COVER */

  /* MAGAZINE LAYOUT */

  --cyan: #66D9EF;
  --sunny: #FFD166;
  --fresh: #06D6A0;
  --blush: #FF6B9D;
  --lavender: #C084FC;
  --card-bg: #FFFFFF;
  --card-surface: #F8FAFE;
  --shine-1: rgba(255,255,255,0.55);
  --shine-2: rgba(255,255,255,0.0);
  --glow-teal: rgba(14,61,110,0.18);
  --glow-green: rgba(43,168,74,0.22);
  --glow-coral: rgba(230,57,70,0.22);
  --glow-gold: rgba(201,165,103,0.28);
  --transition-smooth: all 0.38s cubic-bezier(0.34,1.56,0.64,1);
  --transition-ease: all 0.28s cubic-bezier(0.25,0.46,0.45,0.94);
}

/* ── GLOBAL BODY UPGRADE ── */
body {
  background:
    radial-gradient(ellipse at 20% 0%, rgba(14,61,110,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(43,168,74,0.08) 0%, transparent 55%),
    linear-gradient(160deg, #111827 0%, #1a1a2e 40%, #16213e 100%);
  background-attachment: fixed;
}

/* ── PREMIUM MAGAZINE WRAPPER ── */
.magazine {
  padding: 32px 0 48px;
  gap: 32px;
}

/* ── PAGE WRAP GLOW ── */
.page-wrap {
  border-radius: 4px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 32px 80px rgba(0,0,0,0.55),
    0 8px 24px rgba(0,0,0,0.35);
  transition: var(--transition-ease);
}
.page-wrap:hover {
  box-shadow:
    0 0 0 1px rgba(102,217,239,0.12),
    0 40px 100px rgba(0,0,0,0.6),
    0 12px 32px rgba(14,61,110,0.3);
}

/* ══════════════════════════════════════════════════
   TOOLBAR — PREMIUM GLASS
   ══════════════════════════════════════════════════ */
.toolbar {
  background: rgba(8,22,45,0.85) !important;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(102,217,239,0.12);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.04),
    0 8px 32px rgba(0,0,0,0.4),
    0 0 60px rgba(14,61,110,0.15);
  height: 68px !important;
}

.toolbar .brand {
  background: linear-gradient(135deg, rgba(14,61,110,0.6), rgba(43,168,74,0.3));
  border: 1px solid rgba(102,217,239,0.18);
  border-radius: 12px;
  padding: 6px 14px 6px 8px;
}

.toolbar .brand .ring {
  background: linear-gradient(135deg, var(--green), #06D6A0) !important;
  box-shadow:
    0 0 0 3px rgba(6,214,160,0.2),
    0 0 16px rgba(43,168,74,0.4),
    0 4px 12px rgba(0,0,0,0.3) !important;
  width: 36px !important;
  height: 36px !important;
  font-size: 19px !important;
}

.toolbar .search,
.toolbar .filter {
  background: rgba(255,255,255,0.06) !important;
  border: 1px solid rgba(102,217,239,0.15) !important;
  border-radius: 10px !important;
  transition: var(--transition-ease);
}

.toolbar .search:focus,
.toolbar .filter:focus {
  background: rgba(102,217,239,0.08) !important;
  border-color: rgba(102,217,239,0.4) !important;
  box-shadow: 0 0 0 3px rgba(102,217,239,0.12), inset 0 1px 0 rgba(255,255,255,0.05) !important;
}

.toolbar button {
  background: rgba(255,255,255,0.07) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  border-radius: 10px !important;
  transition: var(--transition-ease) !important;
  position: relative;
  overflow: hidden;
}

.toolbar button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}

.toolbar button:hover {
  background: rgba(102,217,239,0.12) !important;
  border-color: rgba(102,217,239,0.35) !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(102,217,239,0.15) !important;
}

.toolbar button.primary {
  background: linear-gradient(135deg, #E63946, #B5202C) !important;
  border-color: rgba(230,57,70,0.5) !important;
  box-shadow: 0 4px 16px rgba(230,57,70,0.3) !important;
}

.toolbar button.primary:hover {
  background: linear-gradient(135deg, #FF4D5A, #E63946) !important;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(230,57,70,0.4) !important;
}

/* ══════════════════════════════════════════════════
   COVER PAGE — FULL PREMIUM UPGRADE
   ══════════════════════════════════════════════════ */
.cover {
  background:
    radial-gradient(ellipse at 75% 15%, rgba(6,214,160,0.18) 0%, transparent 40%),
    radial-gradient(ellipse at 15% 85%, rgba(255,209,102,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(102,217,239,0.06) 0%, transparent 70%),
    radial-gradient(ellipse at 85% 70%, rgba(230,57,70,0.10) 0%, transparent 35%),
    linear-gradient(165deg, #0A2A4D 0%, #0E3D6E 35%, #0A3158 65%, #061526 100%) !important;
  overflow: hidden !important;
}

/* Animated floating particles */
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(102,217,239,0.18) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,209,102,0.12) 1.5px, transparent 1.5px),
    radial-gradient(circle, rgba(6,214,160,0.10) 1px, transparent 1px);
  background-size: 48px 48px, 72px 72px, 96px 96px;
  background-position: 0 0, 24px 24px, 48px 12px;
  animation: coverParticles 20s linear infinite;
  z-index: 1;
  pointer-events: none;
}

/* Animated wave overlay */
.cover::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -10%;
  right: -10%;
  height: 200px;
  background: linear-gradient(180deg, transparent, rgba(102,217,239,0.04));
  border-radius: 50% 50% 0 0 / 60px 60px 0 0;
  animation: coverWave 8s ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}

@keyframes coverParticles {
  0% { background-position: 0 0, 24px 24px, 48px 12px; }
  100% { background-position: 48px 48px, 72px 72px, 144px 60px; }
}
@keyframes coverWave {
  0%, 100% { transform: translateX(0) scaleY(1); }
  50% { transform: translateX(-3%) scaleY(1.15); }
}

/* Decorative abstract medical shapes on cover */
.cover-arc {
  background: radial-gradient(circle, rgba(255,209,102,0.35), rgba(201,165,103,0.12) 60%, transparent 100%) !important;
  opacity: 1 !important;
  width: 640px !important;
  height: 640px !important;
  bottom: -200px !important;
  right: -180px !important;
  animation: floatOrb 12s ease-in-out infinite;
}

.cover-arc-2 {
  background: radial-gradient(circle, rgba(6,214,160,0.25), rgba(43,168,74,0.08) 60%, transparent 100%) !important;
  opacity: 1 !important;
  width: 480px !important;
  height: 480px !important;
  top: -140px !important;
  right: -120px !important;
  animation: floatOrb 15s ease-in-out infinite reverse;
}

/* Extra decorative pill shapes */
.cover-dots {
  background-image:
    radial-gradient(circle, rgba(102,217,239,0.3) 2px, transparent 2.5px),
    radial-gradient(circle, rgba(255,209,102,0.2) 1.5px, transparent 2px) !important;
  background-size: 24px 24px, 36px 36px !important;
  opacity: 1 !important;
  width: 280px !important;
  height: 180px !important;
  animation: dotsFloat 6s ease-in-out infinite;
}

@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-20px, 15px) scale(1.05); }
  66% { transform: translate(10px, -10px) scale(0.96); }
}

@keyframes dotsFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Glass masthead */
.cover-top {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 16px 24px !important;
  border: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 4px;
}

.cover-mast .ring {
  background: linear-gradient(135deg, #2BA84A, #06D6A0) !important;
  box-shadow:
    0 0 0 6px rgba(6,214,160,0.15),
    0 0 30px rgba(43,168,74,0.5),
    0 8px 24px rgba(0,0,0,0.3) !important;
  animation: ringPulse 3s ease-in-out infinite;
}

@keyframes ringPulse {
  0%, 100% { box-shadow: 0 0 0 6px rgba(6,214,160,0.15), 0 0 30px rgba(43,168,74,0.5), 0 8px 24px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 0 0 10px rgba(6,214,160,0.08), 0 0 50px rgba(43,168,74,0.7), 0 8px 24px rgba(0,0,0,0.3); }
}

/* Cover headline upgrade */
.cover-headline {
  background: linear-gradient(135deg, #FFFFFF 0%, rgba(255,255,255,0.85) 50%, #F4ECDB 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
}

.cover-headline .accent {
  background: linear-gradient(135deg, #FFD166, #C9A567, #FFD166);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,209,102,0.5));
}

/* Cover hero glow */
.cover-hero .circle-bg {
  background: radial-gradient(circle at 40% 35%,
    rgba(102,217,239,0.18) 0%,
    rgba(255,255,255,0.10) 35%,
    rgba(255,255,255,0.02) 72%) !important;
  border: 1px solid rgba(102,217,239,0.25) !important;
  box-shadow:
    inset 0 0 80px rgba(102,217,239,0.08),
    0 0 60px rgba(102,217,239,0.12) !important;
  animation: heroCirclePulse 5s ease-in-out infinite;
}

@keyframes heroCirclePulse {
  0%, 100% { box-shadow: inset 0 0 80px rgba(102,217,239,0.08), 0 0 60px rgba(102,217,239,0.12); }
  50% { box-shadow: inset 0 0 100px rgba(102,217,239,0.14), 0 0 90px rgba(102,217,239,0.2); }
}

.cover-hero .image-frame {
  border: 2px solid rgba(102,217,239,0.3) !important;
  box-shadow:
    0 0 0 8px rgba(102,217,239,0.04),
    0 30px 80px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.15) !important;
  background: radial-gradient(circle at 40% 30%,
    rgba(255,255,255,0.12) 0%,
    rgba(102,217,239,0.04) 50%,
    rgba(14,61,110,0.15) 100%) !important;
}

/* Cover burst upgrade */
.cover-burst {
  background: linear-gradient(135deg, #E63946 0%, #B5202C 60%, #8B0000 100%) !important;
  box-shadow:
    0 0 0 4px rgba(230,57,70,0.25),
    0 20px 50px rgba(230,57,70,0.45),
    inset 0 1px 0 rgba(255,255,255,0.2) !important;
  transform: rotate(-14deg) !important;
  animation: burstEntrance 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  filter: drop-shadow(0 0 20px rgba(230,57,70,0.4));
}

@keyframes burstEntrance {
  from { transform: rotate(-14deg) scale(0.55); opacity: 0; }
  to   { transform: rotate(-14deg) scale(1);    opacity: 1; }
}

@media print {
  .cover-burst { animation: none !important; transform: rotate(-14deg) !important; }
}
@media (prefers-reduced-motion: reduce) {
  .cover-burst { animation: none !important; }
}

/* Cover callout chips — glass upgrade */
.cover-callouts .chip {
  background: rgba(255,255,255,0.06) !important;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.14) !important;
  border-radius: 14px !important;
  transition: var(--transition-ease);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
}

.cover-callouts .chip:hover {
  background: rgba(255,255,255,0.12) !important;
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
}

/* Cover foot gold bar upgrade */
.cover-foot {
  background: linear-gradient(135deg, #C9A567, #FFD166, #C9A567) !important;
  border-radius: 14px !important;
  box-shadow: 0 8px 30px rgba(201,165,103,0.35), inset 0 1px 0 rgba(255,255,255,0.35) !important;
  position: relative;
  overflow: hidden;
}

.cover-foot::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: -100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  animation: shineBar 4s ease-in-out infinite;
}

@keyframes shineBar {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}

/* ══════════════════════════════════════════════════
   PAGE CHROME UPGRADE
   ══════════════════════════════════════════════════ */
.page-head {
  border-bottom: none !important;
  position: relative;
  padding-bottom: 24px !important;
}

.page-head::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    var(--gold) 0%,
    var(--coral) 35%,
    var(--teal) 65%,
    var(--green) 100%);
  border-radius: 2px;
}

.page-head h1 {
  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-soft) 50%, #1a6bb5 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(14,61,110,0.15));
}

.section-strip {
  background: linear-gradient(90deg,
    #FFD166 0%, #C9A567 25%,
    #E63946 25%, #B5202C 50%,
    #2BA84A 50%, #06D6A0 75%,
    #0E3D6E 75%, #66D9EF 100%) !important;
  height: 5px !important;
  border-radius: 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.page-foot {
  border-top: none !important;
  padding-top: 14px !important;
  position: relative;
}
.page-foot::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
}

/* ══════════════════════════════════════════════════
   TOC PAGE UPGRADE
   ══════════════════════════════════════════════════ */
.toc-grid {
  gap: 18px !important;
}

.toc-tile {
  border: none !important;
  border-radius: 18px !important;
  background: linear-gradient(160deg, #ffffff 0%, #f8faff 100%) !important;
  box-shadow:
    0 1px 3px rgba(14,61,110,0.06),
    0 8px 24px rgba(14,61,110,0.08),
    0 20px 50px rgba(14,61,110,0.06),
    inset 0 1px 0 rgba(255,255,255,0.9) !important;
  transition: var(--transition-smooth);
  overflow: hidden;
  position: relative;
}

.toc-tile::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--teal), var(--green));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.toc-tile:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow:
    0 1px 3px rgba(14,61,110,0.08),
    0 16px 40px rgba(14,61,110,0.14),
    0 32px 64px rgba(14,61,110,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9) !important;
}

.toc-tile:hover::before { opacity: 1; }

.toc-tile .tt-img {
  background: linear-gradient(135deg,
    rgba(14,61,110,0.04) 0%,
    rgba(43,168,74,0.04) 50%,
    rgba(102,217,239,0.06) 100%) !important;
  border-radius: 12px !important;
  overflow: hidden;
  position: relative;
}

.toc-tile .tt-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(14,61,110,0.06));
  pointer-events: none;
}

.toc-tile .tt-title {
  background: linear-gradient(135deg, var(--teal), var(--teal-soft));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800 !important;
}

.toc-tile .tt-meta {
  padding-top: 10px !important;
}

.toc-tile .tt-meta .count {
  font-weight: 800 !important;
  background: linear-gradient(135deg, var(--coral), #FF6B9D);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 20px !important;
}

/* ══════════════════════════════════════════════════
   HERO PRODUCT UPGRADE
   ══════════════════════════════════════════════════ */
.hero-product {
  border-radius: 20px !important;
  overflow: hidden;
  box-shadow:
    0 20px 60px rgba(10,42,77,0.35),
    0 4px 16px rgba(10,42,77,0.2) !important;
  position: relative;
}

.hero-product::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.04) 0%,
    transparent 50%,
    rgba(0,0,0,0.08) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Shine sweep on hero */
.hero-product::after {
  content: '';
  position: absolute;
  top: -100%; left: -60%;
  width: 40%;
  height: 300%;
  background: linear-gradient(105deg,
    transparent 40%,
    rgba(255,255,255,0.04) 50%,
    transparent 60%);
  animation: heroShine 8s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}

@keyframes heroShine {
  0%, 100% { left: -60%; }
  50% { left: 160%; }
}

.hero-product .hp-img {
  border-radius: 16px !important;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(255,255,255,0.08), inset 0 0 0 1px rgba(255,255,255,0.1) !important;
}

.hero-product .hp-new {
  background: linear-gradient(135deg, #FFD166 0%, #C9A567 50%, #FFD166 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(201,165,103,0.4));
}

.hero-product .hp-badge {
  background: linear-gradient(135deg, #E63946 0%, #B5202C 60%) !important;
  box-shadow:
    0 0 0 4px rgba(230,57,70,0.2),
    0 20px 50px rgba(230,57,70,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2) !important;
  z-index: 10 !important;
  top: 16px !important;
  left: 16px !important;
  right: auto !important;
  width: 108px !important;
  height: 108px !important;
  animation: badgeBounce 4s ease-in-out infinite;
}

@keyframes badgeBounce {
  0%, 100% { transform: rotate(-10deg) scale(1); }
  50% { transform: rotate(-10deg) scale(1.06); }
}

/* ══════════════════════════════════════════════════
   PRODUCT CARDS — FULL PREMIUM UPGRADE
   ══════════════════════════════════════════════════ */

/* Base card upgrade */
.product-card {
  background: linear-gradient(160deg, #ffffff 0%, #f8faff 60%, #f0f4fc 100%) !important;
  border: 1px solid rgba(14,61,110,0.08) !important;
  border-radius: 20px !important;
  box-shadow:
    0 1px 3px rgba(14,61,110,0.06),
    0 6px 18px rgba(14,61,110,0.08),
    0 16px 40px rgba(14,61,110,0.05),
    inset 0 1px 0 rgba(255,255,255,0.95) !important;
  transition: var(--transition-smooth);
  will-change: transform, box-shadow;
}

.product-card:hover {
  transform: translateY(-8px) scale(1.015);
  box-shadow:
    0 2px 6px rgba(14,61,110,0.1),
    0 16px 40px rgba(14,61,110,0.14),
    0 32px 64px rgba(14,61,110,0.1),
    0 0 0 1px rgba(102,217,239,0.15),
    inset 0 1px 0 rgba(255,255,255,0.95) !important;
}

/* Animated shine sweep on cards */
.product-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; bottom: 0;
  width: 60%;
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,255,255,0.18) 50%,
    transparent 70%);
  transition: left 0.6s ease;
  pointer-events: none;
  z-index: 0;
}

.product-card:hover::after {
  left: 150%;
}

/* Top accent stripe — gradient */
.product-card::before {
  height: 4px !important;
  background: linear-gradient(90deg,
    var(--sec-accent, var(--teal)),
    color-mix(in srgb, var(--sec-accent, var(--teal)) 60%, var(--green) 40%),
    var(--green)) !important;
  box-shadow: 0 2px 8px rgba(14,61,110,0.3);
  border-radius: 4px 4px 0 0;
}

/* Product image area upgrade */
.product-image {
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,1) 0%, rgba(240,248,255,0.96) 60%, rgba(224,236,248,0.88) 100%) !important;
  border: 1px solid rgba(14,61,110,0.06) !important;
  border-radius: 16px !important;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.9),
    0 8px 24px rgba(14,61,110,0.06) !important;
  position: relative;
  overflow: hidden;
}

/* Image area shimmer on hover */
.product-card:hover .product-image {
  box-shadow:
    inset 0 0 0 1px rgba(102,217,239,0.2),
    0 8px 24px rgba(14,61,110,0.1),
    0 0 20px rgba(102,217,239,0.08) !important;
}

/* Product image drop shadow upgrade */
.product-image img,
.pi-img-wrap img {
  filter: drop-shadow(0 12px 24px rgba(10,42,77,0.2)) drop-shadow(0 4px 8px rgba(10,42,77,0.1)) !important;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease !important;
}

/* ══════════════════════════════════════════════════
   PAGE ENTRY ANIMATIONS
   ══════════════════════════════════════════════════ */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.94); }
  to   { opacity: 1; transform: scale(1); }
}

.page-wrap {
  animation: scaleIn 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
}

.page-wrap:nth-child(1) { animation-delay: 0.0s; }
.page-wrap:nth-child(2) { animation-delay: 0.08s; }
.page-wrap:nth-child(3) { animation-delay: 0.16s; }
.page-wrap:nth-child(4) { animation-delay: 0.22s; }
.page-wrap:nth-child(5) { animation-delay: 0.28s; }

/* Staggered card animations */
.product-card {
  animation: fadeSlideUp 0.45s cubic-bezier(0.34,1.1,0.64,1) both;
}

.grid-4 .product-card:nth-child(1),
.grid-3 .product-card:nth-child(1) { animation-delay: 0.05s; }
.grid-4 .product-card:nth-child(2),
.grid-3 .product-card:nth-child(2) { animation-delay: 0.10s; }
.grid-4 .product-card:nth-child(3),
.grid-3 .product-card:nth-child(3) { animation-delay: 0.15s; }
.grid-4 .product-card:nth-child(4),
.grid-3 .product-card:nth-child(4) { animation-delay: 0.20s; }
.grid-4 .product-card:nth-child(5) { animation-delay: 0.25s; }
.grid-4 .product-card:nth-child(6) { animation-delay: 0.30s; }
.grid-4 .product-card:nth-child(7) { animation-delay: 0.35s; }
.grid-4 .product-card:nth-child(8) { animation-delay: 0.40s; }

/* TOC tile animations */

}
.toc-tile:nth-child(1) { animation-delay: 0.05s; }
.toc-tile:nth-child(2) { animation-delay: 0.12s; }

/* ─────────────────────────────────────────────
   4. PREMIUM CARD DEPTH + SURFACE
      GPT: gradient bg + layered shadow
      + GENIUS: top border inherits accent colour
   ───────────────────────────────────────────── */
.product-card,
.product-card.premium-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,.99), rgba(255,252,246,.97)) !important;
  border: 1px solid rgba(14,61,110,.11) !important;
  box-shadow:
    0 1px 2px rgba(10,42,77,.04),
    0 6px 18px rgba(10,42,77,.09),
    0 18px 40px rgba(10,42,77,.06),
    inset 0 1px 0 rgba(255,255,255,.92) !important;
  transition:
    transform .32s cubic-bezier(.34,1.2,.64,1),
    box-shadow .32s ease,
    border-color .32s ease !important;
}

@media (hover:hover) {
  .product-card:hover {
    transform: translateY(-7px) scale(1.016) !important;
    border-color: rgba(43,168,74,.26) !important;
    box-shadow:
      0 2px 4px rgba(10,42,77,.06),
      0 14px 36px rgba(10,42,77,.16),
      0 28px 56px rgba(10,42,77,.08),
      0 0 0 1.5px rgba(43,168,74,.18),
      inset 0 1px 0 rgba(255,255,255,.94) !important;
  }
}

/* ─────────────────────────────────────────────
   5. CATEGORY COLOR PILLS — per-category identity
      GPT: nth-child color rotation
      + GENIUS: icon dot per colour group
   ───────────────────────────────────────────── */
.product-cat {
  display: inline-flex !important;
  align-items: center !important;
  gap: 5px !important;
  padding: 5px 12px !important;
  border-radius: 999px !important;
  background: linear-gradient(135deg, rgba(14,61,110,.09), rgba(102,217,239,.15)) !important;
  color: #0E3D6E !important;
  font-weight: 700 !important;
  border: 1px solid rgba(14,61,110,.09) !important;
  font-size: 13px !important;
  letter-spacing: .04em !important;
}

.product-card:nth-child(3n+2) .product-cat {
  background: linear-gradient(135deg, rgba(43,168,74,.12), rgba(6,214,160,.12)) !important;
  color: #1a7a32 !important;
  border-color: rgba(43,168,74,.14) !important;
}

.product-card:nth-child(3n+3) .product-cat {
  background: linear-gradient(135deg, rgba(201,165,103,.22), rgba(255,209,102,.18)) !important;
  color: #7a5218 !important;
  border-color: rgba(201,165,103,.22) !important;
}

/* ─────────────────────────────────────────────
   6. FEATURED EVERY 5TH CARD — visual rhythm
      GPT: warm gold accent
      + GENIUS: crown emoji top label
   ───────────────────────────────────────────── */
.grid-3 .product-card:nth-child(5n),
.grid-4 .product-card:nth-child(5n) {
  background:
    radial-gradient(circle at 18% 0%, rgba(255,209,102,.22), transparent 38%),
    linear-gradient(175deg, #ffffff 0%, #fff9eb 100%) !important;
  border-color: rgba(201,165,103,.3) !important;
}

.grid-3 .product-card:nth-child(5n)::before,
.grid-4 .product-card:nth-child(5n)::before {
  background: linear-gradient(90deg, #FFD166 0%, #E63946 50%, #2BA84A 100%) !important;
  height: 5px !important;
}

/* GENIUS: "⭐ مميز" micro-ribbon on featured card */
.grid-3 .product-card:nth-child(5n) .product-cat::before,
.grid-4 .product-card:nth-child(5n) .product-cat::before {
  content: "⭐ " !important;
}

/* ─────────────────────────────────────────────
   7. CARD SHINE SWEEP on hover
      GPT: translateX sweep
      + GENIUS: only fires once per hover, not loop
   ───────────────────────────────────────────── */
.product-card::after {
  content: "" !important;
  position: absolute !important;
  inset: 0 !important;
  background: linear-gradient(115deg,
    transparent 0%, transparent 40%,
    rgba(255,255,255,.42) 50%,
    transparent 60%, transparent 100%) !important;
  transform: translateX(-130%) !important;
  pointer-events: none !important;
  z-index: 5 !important;
  transition: none !important;
}

@media (hover:hover) {
  .product-card:hover::after {
    animation: cardSweep .75s ease forwards !important;
  }
}

@keyframes cardSweep {
  to { transform: translateX(130%); }
}

/* ─────────────────────────────────────────────
   8. SAVINGS BAR — from plain to punchy
      GPT: gradient green + emoji
      + GENIUS: animated shimmer bar inside
   ───────────────────────────────────────────── */
.product-savings {
  background: linear-gradient(90deg, #1a7a35 0%, #2BA84A 55%, #06D6A0 100%) !important;
  color: #ffffff !important;
  font-weight: 900 !important;
  text-shadow: 0 1px 3px rgba(0,0,0,.18) !important;
  border-top: none !important;
  position: relative !important;
  overflow: hidden !important;
}

.product-savings::before {
  content: "🔥" !important;
  margin-inline-end: 5px !important;
}

/* shimmer bar running inside savings */
.product-savings::after {
  content: "" !important;
  position: absolute !important;
  top: 0 !important; bottom: 0 !important;
  left: -60% !important; width: 50% !important;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent) !important;
  animation: savingsRun 3s ease-in-out infinite !important;
  pointer-events: none !important;
}

@keyframes savingsRun {
  0%   { left: -60%; }
  60%,100% { left: 120%; }
}

/* ─────────────────────────────────────────────
   9. BACKGROUND SOFT TEXTURE per page
      GPT: radial mood + dot pattern
      + GENIUS: each category section has mood colour
   ───────────────────────────────────────────── */
.page {
  background:
    radial-gradient(circle at 8% 10%, rgba(102,217,239,.09), transparent 30%),
    radial-gradient(circle at 92% 14%, rgba(43,168,74,.07), transparent 30%),
    radial-gradient(circle at 50% 94%, rgba(255,209,102,.09), transparent 28%),
    var(--paper) !important;
  position: relative;
}

.page::before {
  content: "" !important;
  position: absolute !important;
  inset: 0 !important;
  background-image: radial-gradient(rgba(14,61,110,.045) 1px, transparent 1px) !important;
  background-size: 20px 20px !important;
  opacity: .25 !important;
  pointer-events: none !important;
  z-index: 0 !important;
}

/* ─────────────────────────────────────────────
   10. MOBILE OPTIMISATION + PRINT SAFE
      GPT: lighter shadows on mobile
      + reduced motion + print strip
   ───────────────────────────────────────────── */
@media (max-width:700px) {
  .product-card,
  .product-card.premium-card {
    box-shadow:
      0 3px 10px rgba(10,42,77,.10),
      0 8px 22px rgba(10,42,77,.07),
      inset 0 1px 0 rgba(255,255,255,.9) !important;
  }
  .product-image img,
  .pi-img-wrap img,
  .product-image .slot-img {
    filter: drop-shadow(0 10px 16px rgba(10,42,77,.15)) !important;
  }
  .price-new { font-size: 28px !important; }
  .badge { animation: none !important; box-shadow: 0 8px 20px rgba(230,57,70,.38), inset 0 1px 0 rgba(255,255,255,.35) !important; }
}

@media print {
  .product-card, .product-card.premium-card {
    transform: none !important;
    animation: none !important;
    box-shadow: 0 1px 4px rgba(0,0,0,.08) !important;
  }
  .product-card::after, .badge::after,
  .product-savings::after, .product-savings::before,
  .page::before { display: none !important; }
  .price-new {
    -webkit-text-fill-color: #e63946 !important;
    background: none !important;
    color: #e63946 !important;
  }
}

@media (prefers-reduced-motion:reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
}

/* ════════════════════════════════════════════════════════════════════
   ✦ GENIUS EXCLUSIVE TOUCHES (5 original ideas)
   ════════════════════════════════════════════════════════════════════ */

/* ✦ G1 — DEAL RIBBON: "عرض الشهر" gold diagonal ribbon
        Appears on first card of every category section
        Visual only · pure CSS · no JS */
.grid-3 .product-card:first-child::after,
.grid-4 .product-card:first-child::after {
  animation: none !important;
}

.grid-3 .product-card:first-child,
.grid-4 .product-card:first-child {
  --ribbon-show: 1;
}

.grid-3 .product-card:first-child .product-image::after,
.grid-4 .product-card:first-child .product-image::after {
  content: "🏆 الأفضل" !important;
  position: absolute !important;
  top: 14px !important; right: -28px !important;
  background: linear-gradient(90deg, #C9A567, #FFD166, #C9A567) !important;
  color: #3d2800 !important;
  font-family: 'Cairo', sans-serif !important;
  font-size: 11px !important;
  font-weight: 900 !important;
  padding: 4px 38px !important;
  transform: rotate(35deg) !important;
  box-shadow: 0 3px 10px rgba(201,165,103,.45) !important;
  white-space: nowrap !important;
  z-index: 10 !important;
  letter-spacing: .04em !important;
}

/* ✦ G2 — NEON PRICE GLOW: price glows on card hover
        Like luxury e-commerce price highlight */
@media (hover:hover) {
  .product-card:hover .price-new {
    filter: drop-shadow(0 0 10px rgba(230,57,70,.35)) !important;
    transform: scale(1.04) !important;
    display: inline-block !important;
    transition: transform .3s ease, filter .3s ease !important;
  }
}

/* ✦ G3 — HEARTBEAT FAV: favourite icon does a heartbeat
        on hover — feels alive and emotional */
.premium-fav {
  transition: transform .2s ease, color .2s ease, background .2s ease !important;
}

.premium-fav:hover {
  animation: heartbeat .55s ease !important;
  color: #e63946 !important;
}

@keyframes heartbeat {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.35); }
  45%  { transform: scale(.9); }
  65%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* ✦ G4 — CATEGORY MOOD RING: page top border changes colour
        per section identity — feels intentional & curated */
.page[data-cat*="baby"]    { --sec-border: #66D9EF; }
.page[data-cat*="skin"]    { --sec-border: #FF6B9D; }
.page[data-cat*="vitamin"] { --sec-border: #2BA84A; }
.page[data-cat*="personal"]{ --sec-border: #C084FC; }

/* Top "mood" stripe per page — 3px only, very subtle */
.page::after {
  content: "" !important;
  position: absolute !important;
  top: 0 !important; left: 0 !important; right: 0 !important;
  height: 3px !important;
  background: linear-gradient(90deg,
    var(--sec-border, var(--gold)) 0%,
    rgba(255,255,255,0) 100%) !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

/* ✦ G5 — GLASS SAVINGS BADGE: savings amount gets a
        glass pill that feels like a real price tag */
.product-savings .save-amt {
  background: rgba(255,255,255,.22) !important;
  backdrop-filter: blur(4px) !important;
  -webkit-backdrop-filter: blur(4px) !important;
  border-radius: 999px !important;
  padding: 2px 10px !important;
  border: 1px solid rgba(255,255,255,.35) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.3) !important;
  font-size: .95em !important;
  font-weight: 900 !important;
  color: #fff !important;
}


/* ════════════════════════════════════════════════════════════════════
   OCEAN PHARMACY — PREMIUM MOTION SYSTEM
   7 animations · CSS + IntersectionObserver · Zero layout changes
   ════════════════════════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────────────
   1. PRODUCT CARD ENTRANCE
   Cards start invisible; .is-visible triggers entrance
   ────────────────────────────────────────────────────── */
.product-card,
.product-card.premium-card {
  opacity: 0;
  transform: translateY(26px) scale(.98);
  transition:
    opacity  .55s ease,
    transform .55s cubic-bezier(.2,.8,.2,1),
    box-shadow .32s ease,
    border-color .32s ease !important;
  will-change: opacity, transform;
}

.product-card.is-visible,
.product-card.premium-card.is-visible {
  opacity: 1 !important;
  transform: translateY(0) scale(1) !important;
  will-change: auto;
}

/* ──────────────────────────────────────────────────────
   2. BADGE ENTRANCE — pops in after card
   ────────────────────────────────────────────────────── */
.badge {
  opacity: 0;
  transform: scale(0) rotate(-8deg);
  transition: none;
}

.product-card.is-visible .badge {
  animation: badgeEntrance .5s cubic-bezier(.34,1.56,.64,1) .22s both !important;
}

@keyframes badgeEntrance {
  from { opacity: 0; transform: scale(0) rotate(-8deg); }
  to   { opacity: 1; transform: scale(1) rotate(-2deg); }
}

/* ──────────────────────────────────────────────────────
   3. HERO IMAGE FLOAT — gentle infinite loop
   ────────────────────────────────────────────────────── */
.hero-product .hp-img img,
.hero-product .hp-img .slot-img,
.cover-hero .image-frame img,
.cover-hero .image-frame .slot-img {
  animation: heroFloat 4.5s ease-in-out infinite;
  will-change: transform;
}

@keyframes heroFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

/* ──────────────────────────────────────────────────────
   4. SAVINGS BAR FILL — RTL-aware scaleX reveal
   ────────────────────────────────────────────────────── */
.product-savings {
  position: relative !important;
  overflow: hidden !important;
}

/* All direct children sit above the fill layer */
.product-savings > * {
  position: relative !important;
  z-index: 2 !important;
}

/* The fill overlay — starts collapsed from right (RTL) */
.product-savings::before {
  content: "" !important;
  position: absolute !important;
  inset: 0 !important;
  background: inherit !important;
  transform: scaleX(0) !important;
  transform-origin: right center !important;
  z-index: 1 !important;
  pointer-events: none !important;
  border-radius: inherit !important;
}

.product-card.is-visible .product-savings::before {
  animation: savingsFill .6s cubic-bezier(.2,.8,.2,1) .25s both !important;
}

@keyframes savingsFill {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* ──────────────────────────────────────────────────────
   5. TOC TILES CASCADE — slide in from right (RTL)
   ────────────────────────────────────────────────────── */
.toc-tile {
  opacity: 0;
  transform: translateX(22px);
  transition:
    opacity  .5s ease,
    transform .5s cubic-bezier(.2,.8,.2,1);
  will-change: opacity, transform;
}

.toc-tile.is-visible {
  opacity: 1 !important;
  transform: translateX(0) !important;
  will-change: auto;
}

/* ──────────────────────────────────────────────────────
   6. COVER HEADLINE REVEAL — clip-path, Arabic-safe
   ────────────────────────────────────────────────────── */
.cover-headline {
  animation: headlineReveal .9s cubic-bezier(.2,.8,.2,1) .2s both;
}

@keyframes headlineReveal {
  from { clip-path: inset(0 100% 0 0); }
  to   { clip-path: inset(0 0% 0 0);   }
}

/* Keep visible after animation — never reclip */
.cover-headline {
  clip-path: inset(0 0 0 0);
  overflow: visible !important;
}

/* ──────────────────────────────────────────────────────
   7. TOOLBAR HIDE / SHOW — mobile only
   ────────────────────────────────────────────────────── */
.toolbar {
  transition: transform .32s cubic-bezier(.4,0,.2,1) !important;
  will-change: transform;
}

@media (max-width: 700px) {
  .toolbar.toolbar-hidden {
    transform: translateY(-110%) !important;
  }
}

/* ──────────────────────────────────────────────────────
   ACCESSIBILITY — respect reduced motion
   ────────────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .product-card,
  .product-card.premium-card,
  .toc-tile {
    opacity: 1 !important;
    transform: none !important;
    transition: none !important;
  }
  .badge {
    opacity: 1 !important;
    transform: scale(1) rotate(-2deg) !important;
    animation: none !important;
  }
  .hero-product .hp-img img,
  .hero-product .hp-img .slot-img,
  .cover-hero .image-frame img,
  .cover-hero .image-frame .slot-img {
    animation: none !important;
  }
  .cover-headline {
    animation: none !important;
    clip-path: inset(0 0 0 0) !important;
  }
  .toolbar { transition: none !important; }
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ──────────────────────────────────────────────────────
   PRINT — strip all motion
   ────────────────────────────────────────────────────── */
@media print {
  * { animation: none !important; transition: none !important; }
  .product-card,
  .product-card.premium-card,
  .toc-tile {
    opacity: 1 !important;
    transform: none !important;
  }
  .badge {
    opacity: 1 !important;
    transform: scale(1) rotate(-2deg) !important;
  }
  .cover-headline {
    clip-path: none !important;
    opacity: 1 !important;
  }
  .toolbar { transform: none !important; }
}


/* ═══════════════════════════════════════════════════════════════════
   OCEAN PHARMACY — ENTERPRISE UPGRADE  |  Phase 1-3  |  CSS Only
   Skeleton · Empty State · Error · Result Count · A11y · Micro UX
   ═══════════════════════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────────────────────────
   PHASE 1-A  SKELETON CARDS
   ────────────────────────────────────────────────────────────────── */
@keyframes skimmer {
  0%   { background-position: -400px 0; }
  100% { background-position:  400px 0; }
}

.skeleton-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  padding: 14px 14px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 340px;
  position: relative;
}

.skeleton-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--line) 0%, var(--sand) 50%, var(--line) 100%);
  background-size: 400px 100%;
  animation: skimmer 1.6s ease-in-out infinite;
}

.skel-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--cream) 25%, #EDE5D0 50%, var(--cream) 75%);
  background-size: 400px 100%;
  animation: skimmer 1.6s ease-in-out infinite;
}

.skel-line {
  height: 12px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--cream) 25%, #EDE5D0 50%, var(--cream) 75%);
  background-size: 400px 100%;
  animation: skimmer 1.6s ease-in-out infinite;
}
.skel-line.wide  { width: 80%; }
.skel-line.mid   { width: 55%; }
.skel-line.short { width: 35%; }
.skel-line.price { width: 45%; height: 20px; }

.skel-price-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
  padding-bottom: 10px;
}

@media (max-width: 700px) {
  .skeleton-card { min-height: 0; padding: 10px 10px 0; }
  .skel-line { height: 10px; }
  .skel-line.price { height: 16px; }
}

@media print {
  .skeleton-card { display: none !important; }
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 1-B  EMPTY STATE
   ────────────────────────────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
  gap: 16px;
  font-family: 'Cairo', sans-serif;
  background: var(--paper);
  border-radius: 16px;
  border: 1px dashed var(--sand);
  margin: 24px 0;
  min-height: 320px;
}

.empty-state .es-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(14,61,110,.08), rgba(102,217,239,.12));
  border: 2px solid rgba(14,61,110,.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.empty-state h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--teal);
  margin: 0;
  line-height: 1.3;
}

.empty-state p {
  font-size: 16px;
  color: var(--muted);
  margin: 0;
  max-width: 300px;
  line-height: 1.6;
}

.empty-state .es-btn {
  margin-top: 8px;
  background: var(--teal);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 10px 24px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s ease, transform .2s ease;
}

.empty-state .es-btn:hover {
  background: var(--teal-soft);
  transform: translateY(-2px);
}

@media (max-width: 700px) {
  .empty-state { padding: 40px 20px; min-height: 240px; }
  .empty-state h2 { font-size: 18px; }
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 1-C  ERROR STATE PREMIUM
   ────────────────────────────────────────────────────────────────── */
.error-state-premium {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
  gap: 16px;
  font-family: 'Cairo', sans-serif;
  background: var(--paper);
  border-radius: 16px;
  border: 1px solid rgba(230,57,70,.15);
  margin: 24px 0;
  min-height: 320px;
}

.error-state-premium .err-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(230,57,70,.1), rgba(230,57,70,.18));
  border: 2px solid rgba(230,57,70,.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.error-state-premium h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--coral-deep);
  margin: 0;
}

.error-state-premium p {
  font-size: 16px;
  color: var(--muted);
  margin: 0;
  max-width: 340px;
  line-height: 1.6;
}

.error-state-premium .partial-note {
  font-size: 13px;
  color: var(--green-deep);
  background: rgba(43,168,74,.08);
  border: 1px solid rgba(43,168,74,.15);
  border-radius: 8px;
  padding: 8px 16px;
}

.error-state-premium .retry-btn {
  background: linear-gradient(135deg, var(--coral), var(--coral-deep));
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 12px 28px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s ease;
  box-shadow: 0 8px 20px rgba(230,57,70,.28);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.error-state-premium .retry-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(230,57,70,.38);
}

.error-state-premium .retry-btn.loading {
  opacity: .7;
  pointer-events: none;
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 1-D  RESULT COUNT BADGE
   ────────────────────────────────────────────────────────────────── */
.result-count {
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: rgba(244,236,219,.8);
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 999px;
  padding: 4px 12px;
  white-space: nowrap;
  letter-spacing: .02em;
  transition: all .25s ease;
}

.result-count.filtered {
  background: rgba(201,165,103,.2);
  border-color: rgba(201,165,103,.35);
  color: var(--gold);
}

@media (max-width: 700px) {
  .result-count { font-size: 11px; padding: 3px 9px; }
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 2-A  HIGH VALUE / SPOTLIGHT CARDS
   ────────────────────────────────────────────────────────────────── */
.product-card.high-value {
  border-color: rgba(201,165,103,.35) !important;
  box-shadow:
    0 1px 2px rgba(10,42,77,.04),
    0 6px 18px rgba(10,42,77,.09),
    0 18px 40px rgba(10,42,77,.06),
    inset 0 0 0 2px rgba(201,165,103,.12),
    inset 0 1px 0 rgba(255,255,255,.92) !important;
}

.product-card.spotlight {
  border-color: rgba(201,165,103,.5) !important;
}

@keyframes goldBorderPulse {
  0%, 100% { box-shadow: 0 1px 2px rgba(10,42,77,.04), 0 8px 24px rgba(10,42,77,.1), 0 0 0 2px rgba(201,165,103,.25), inset 0 1px 0 rgba(255,255,255,.92); }
  50%       { box-shadow: 0 1px 2px rgba(10,42,77,.04), 0 8px 24px rgba(10,42,77,.1), 0 0 0 2px rgba(201,165,103,.55), inset 0 1px 0 rgba(255,255,255,.92); }
}

.product-card.spotlight {
  animation: goldBorderPulse 3s ease-in-out infinite !important;
}

@media (prefers-reduced-motion: reduce) {
  .product-card.spotlight { animation: none !important; }
}

@media print {
  .product-card.high-value,
  .product-card.spotlight { box-shadow: 0 1px 4px rgba(0,0,0,.08) !important; animation: none !important; }
}

.high-value-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(201,165,103,.18), rgba(255,209,102,.14));
  border: 1px solid rgba(201,165,103,.25);
  color: #7a5218;
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  font-weight: 800;
  margin-top: 3px;
}

.high-value-tag::before { content: '✦'; font-size: 9px; color: var(--gold); }

/* ──────────────────────────────────────────────────────────────────
   PHASE 2-B  SAVINGS BAR PULSE (CSS only, 2 pulses)
   ────────────────────────────────────────────────────────────────── */
@keyframes savingsPulse {
  0%  { box-shadow: 0 0 0 0 rgba(43,168,74,.4); }
  40% { box-shadow: 0 0 0 6px rgba(43,168,74,.0); }
  70% { box-shadow: 0 0 0 0 rgba(43,168,74,.3); }
  90% { box-shadow: 0 0 0 5px rgba(43,168,74,.0); }
  100%{ box-shadow: 0 0 0 0 rgba(43,168,74,.0); }
}

.product-card.is-visible .product-savings {
  animation: savingsPulse .9s ease-out .5s both !important;
}

@media (prefers-reduced-motion: reduce) {
  .product-card.is-visible .product-savings { animation: none !important; }
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 2-C  SECTION TRANSITION (light fade — no 3D, no flip)
   ────────────────────────────────────────────────────────────────── */
.page-leaving {
  opacity: 1;
  transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease;
}

.page-leaving.out {
  opacity: 0;
  transform: translateY(-8px);
}

.page-entering {
  opacity: 0;
  transform: translateY(10px);
}

.page-entering.in {
  opacity: 1;
  transform: translateY(0);
  transition: opacity .28s ease .02s, transform .28s cubic-bezier(.2,.8,.2,1) .02s;
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 3-A  MOBILE TAP FEEDBACK (CSS only)
   ────────────────────────────────────────────────────────────────── */
@media (hover: none) and (pointer: coarse) {
  .product-card:active {
    transform: scale(.985) !important;
    filter: brightness(.97) !important;
    transition: transform .08s ease, filter .08s ease !important;
  }
}

/* ──────────────────────────────────────────────────────────────────
   PHASE 3-B  DESKTOP SECTION NAV DOTS
   ────────────────────────────────────────────────────────────────── */
.section-nav {
  position: fixed;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 999;
}

@media (max-width: 900px) {
  .section-nav { display: none !important; }
}

.section-nav-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(201,165,103,.35);
  border: 1px solid rgba(201,165,103,.5);
  cursor: pointer;
  transition: all .25s ease;
  position: relative;
}

.section-nav-dot.active {
  background: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,165,103,.2);
  transform: scale(1.3);
}

.section-nav-dot[title]:hover::after {
  content: attr(title);
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--teal-deep);
  color: var(--cream-light);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}

@media print {
  .section-nav { display: none !important; }
}

/* ──────────────────────────────────────────────────────────────────
   ACCESSIBILITY — focus-visible ring
   ────────────────────────────────────────────────────────────────── */
.toolbar button:focus-visible,
.empty-state .es-btn:focus-visible,
.error-state-premium .retry-btn:focus-visible {
  outline: 3px solid var(--gold);
  outline-offset: 2px;
}

/* ──────────────────────────────────────────────────────────────────
   HERO FLOAT — safety: only hero, never cards, media-gated
   ────────────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .hero-product .hp-img img,
  .hero-product .hp-img .slot-img {
    animation-play-state: paused !important;
  }
}


/* ── TOC CLICK NAVIGATION ── */
.toc-tile {
  cursor: pointer !important;
}
.toc-tile:focus-visible {
  outline: 3px solid var(--gold);
  outline-offset: 3px;
}
.toc-tile:active {
  transform: scale(.97) !important;
  transition: transform .1s ease !important;
}

/* scroll-margin so fixed toolbar doesn't hide the heading */
.page-wrap {
  scroll-margin-top: 90px;
}
@media (max-width: 700px) {
  .page-wrap { scroll-margin-top: 70px; }
}
@media print {
  .page-wrap { scroll-margin-top: 0; }
}

/* ══════════════════════════════════════════════════════════════
   SMART CART — QUANTITY CONTROLS
   ══════════════════════════════════════════════════════════════ */
.product-qty-control {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 8px 12px 10px;
  border-radius: 999px;
  overflow: hidden;
  border: 1.5px solid rgba(43,168,74,0.28);
  background: rgba(43,168,74,0.05);
  height: 36px;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.product-qty-control:focus-within {
  border-color: rgba(43,168,74,0.55);
  box-shadow: 0 0 0 3px rgba(43,168,74,0.12);
}
.qty-btn {
  flex: 0 0 36px;
  height: 36px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  color: #1F8438;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s ease, color .15s ease, transform .1s ease;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn:active { transform: scale(.88); }
.qty-btn.qty-minus { color: #5a6470; }
.qty-btn.qty-minus:hover { background: rgba(0,0,0,.05); color: #333; }
.qty-btn.qty-plus  { color: #1F8438; }
.qty-btn.qty-plus:hover  { background: rgba(43,168,74,.13); }
.qty-value {
  flex: 1;
  text-align: center;
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: #10233d;
  pointer-events: none;
  user-select: none;
}
/* When qty = 0 the control shows add-prompt style */
.product-qty-control[data-qty="0"] {
  border-color: rgba(14,61,110,.18);
  background: rgba(14,61,110,.04);
}
.product-qty-control[data-qty="0"] .qty-value { color: #8898aa; }
.product-qty-control[data-qty="0"] .qty-btn.qty-minus { opacity: .32; pointer-events: none; }

/* ══════════════════════════════════════════════════════════════
   SMART CART BAR
   ══════════════════════════════════════════════════════════════ */
.smart-cart-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 1100;
  display: flex;
  justify-content: center;
  padding: 0 16px env(safe-area-inset-bottom, 0px);
  pointer-events: none;
  transform: translateY(110%);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.smart-cart-bar.is-visible {
  transform: translateY(0);
  pointer-events: auto;
}
.smart-cart-inner {
  width: 100%;
  max-width: 780px;
  background: linear-gradient(135deg, #0A2A4D 0%, #0E3D6E 100%);
  border: 1px solid rgba(102,217,239,.22);
  border-radius: 18px 18px 0 0;
  padding: 14px 18px 18px;
  box-shadow:
    0 -6px 32px rgba(10,42,77,.45),
    0 0 0 1px rgba(255,255,255,.06) inset;
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'Cairo', sans-serif;
}
.smart-cart-summary {
  flex: 1;
  min-width: 0;
}
.smart-cart-summary .sc-count {
  font-size: 13px;
  color: rgba(244,236,219,.7);
  font-family: 'Roboto Mono', monospace;
  letter-spacing: .06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.smart-cart-summary .sc-total {
  font-size: 22px;
  font-weight: 800;
  color: #FFD166;
  line-height: 1.2;
  white-space: nowrap;
}
.smart-cart-cta {
  flex: 0 0 auto;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  box-shadow: 0 6px 20px rgba(37,211,102,.35);
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  touch-action: manipulation;
}
.smart-cart-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(37,211,102,.45);
}
.smart-cart-cta:active { transform: scale(.96); }
.smart-cart-cta.loading { opacity: .7; pointer-events: none; }
.smart-cart-cta .wa-ic {
  width: 20px; height: 20px; flex-shrink: 0;
}
/* Body padding when cart bar visible */
body.cart-bar-open { padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px)); }

@media (max-width: 700px) {
  .smart-cart-inner { border-radius: 16px 16px 0 0; padding: 12px 14px 16px; gap: 10px; }
  .smart-cart-summary .sc-total { font-size: 18px; }
  .smart-cart-cta { font-size: 14px; padding: 11px 14px; border-radius: 10px; }
}

/* ══════════════════════════════════════════════════════════════
   OUT-OF-COVERAGE MODAL & TOAST
   ══════════════════════════════════════════════════════════════ */
.order-modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(5,15,30,.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 1200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0 0 env(safe-area-inset-bottom,0px);
  animation: fadeInBackdrop .25s ease both;
}
@keyframes fadeInBackdrop { from { opacity:0; } to { opacity:1; } }
.order-coverage-modal {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(170deg, #0A2A4D 0%, #0E3D6E 100%);
  border: 1px solid rgba(102,217,239,.2);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 32px;
  box-shadow: 0 -8px 40px rgba(10,42,77,.6);
  font-family: 'Cairo', sans-serif;
  color: var(--cream-light);
  animation: slideUpModal .35s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes slideUpModal { from { transform:translateY(100%); } to { transform:translateY(0); } }
.order-coverage-modal .ocm-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.2);
  margin: 0 auto 20px;
}
.order-coverage-modal .ocm-icon {
  font-size: 38px; text-align: center; margin-bottom: 10px;
}
.order-coverage-modal .ocm-title {
  font-size: 20px; font-weight: 800; text-align: center; line-height: 1.3; margin-bottom: 8px;
}
.order-coverage-modal .ocm-msg {
  font-size: 15px; text-align: center; color: rgba(244,236,219,.78);
  line-height: 1.6; margin-bottom: 18px;
}
.order-coverage-modal .ocm-branch-info {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(102,217,239,.14);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.7;
}
.order-coverage-modal .ocm-branch-info strong { color: #FFD166; }
.order-modal-actions {
  display: flex; flex-direction: column; gap: 10px;
}
.order-modal-actions .oma-btn {
  width: 100%; border: none; border-radius: 12px;
  padding: 13px 18px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.order-modal-actions .oma-btn.wa-btn {
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  box-shadow: 0 6px 20px rgba(37,211,102,.3);
}
.order-modal-actions .oma-btn.wa-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,.4); }
/* Pickup — primary green CTA */
.order-modal-actions .oma-btn.pickup-btn {
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  font-size: 16px;
  box-shadow: 0 6px 22px rgba(37,211,102,.35);
}
.order-modal-actions .oma-btn.pickup-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(37,211,102,.48); }
.order-modal-actions .oma-btn.pickup-btn:active { transform: scale(.96); }
/* Maps — blue outline */
.order-modal-actions .oma-btn.maps-btn {
  background: rgba(102,217,239,.10);
  color: #66D9EF;
  border: 1px solid rgba(102,217,239,.30);
}
.order-modal-actions .oma-btn.maps-btn:hover { background: rgba(102,217,239,.18); border-color: rgba(102,217,239,.5); }
/* Support — muted small */
.order-modal-actions .oma-btn.support-btn {
  background: transparent;
  color: rgba(244,236,219,.48);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
}
.order-modal-actions .oma-btn.support-btn:hover { color: rgba(244,236,219,.72); }
.order-modal-actions .oma-btn.close-btn {
  background: transparent;
  color: rgba(244,236,219,.5);
  font-size: 14px;
}

/* Toast */
.order-toast {
  position: fixed;
  bottom: calc(90px + env(safe-area-inset-bottom,0px));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: #0A2A4D;
  color: var(--cream-light);
  font-family: 'Cairo', sans-serif;
  font-size: 15px; font-weight: 600;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid rgba(102,217,239,.2);
  box-shadow: 0 8px 24px rgba(10,42,77,.45);
  z-index: 1300;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
  max-width: 90vw;
  text-align: center;
}
.order-toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

@media print {
  .smart-cart-bar, .order-modal-backdrop, .order-toast,
  .product-qty-control { display: none !important; }
  body.cart-bar-open { padding-bottom: 72px !important; }
}
@media (prefers-reduced-motion: reduce) {
  .smart-cart-bar { transition: none; }
  .order-coverage-modal { animation: none; }
  .order-modal-backdrop { animation: none; }
}

/* ================================================================
   LAYOUT INTEGRITY — deterministic card heights (overflow root fix)
   Long text was the real cause of uneven card heights and page
   overflow. Every free-height text element is now clamped, so a
   grid-4 premium card has a hard upper bound (~560px) and the
   pagination math in JS holds on every page.
   ================================================================ */
.premium-card .product-vol {
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-word;
}
.premium-tag-row { max-height: 28px; overflow: hidden; }
.premium-card .product-name { word-break: break-word; max-height: 60px; }
.grid-4 .premium-card .product-name { max-height: 50px; }
.hero-product .hp-desc {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.hero-product .hp-name { max-height: 145px; }
/* Keep the price line on one row inside the card — never let it push height */
.premium-card .price-row { flex-wrap: nowrap; min-width: 0; }
.premium-card .price-old { white-space: nowrap; }
/* Grid rows always stretch to equal height */
.grid-4, .grid-3 { align-items: stretch; }
@media (max-width: 700px) {
  /* Mobile pages are auto-height — allow the volume line a second row */
  .premium-card .product-vol { -webkit-line-clamp: 2; }
  .premium-tag-row { max-height: none; }
}

/* ================================================================
   INDEX (TOC) PAGINATION
   When categories exceed one page (6 tiles = 3×2), renderTocGrid
   creates continuation index pages. Rows on every index page use
   minmax(0, 1fr): they always share the fixed page height equally
   and are allowed to shrink below the section image's intrinsic
   height — real (large) toc images can therefore never inflate a
   row and push tiles past the page edge. Tiles keep their look:
   the image area simply fills whatever space the row gives it
   (object-fit: cover). Sparse continuation pages use fixed rows
   so a last page with 2 tiles stays balanced.
   ================================================================ */
.toc-grid { grid-auto-rows: minmax(0, 1fr); }
.toc-tile { min-height: 0; }
.toc-tile .tt-img { min-height: 0; }
/* Section images FILL their frame. The legacy global patch forces
   `object-fit: contain / max 92% / drop-shadow` on every .slot-img
   (meant for product photos) — this higher-specificity rule wins
   the !important tie and restores edge-to-edge cover fill here. */
.toc-tile .tt-img .slot-img {
  position: absolute !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  max-width: 100% !important;
  max-height: 100% !important;
  object-fit: cover !important;
  object-position: center center !important;
  filter: none !important;
}

.toc-page-wrap.toc-cont .toc-grid {
  align-content: start;
  grid-auto-rows: 428px;
  flex: 1 1 auto;
}
.toc-page-wrap.toc-cont .toc-tile { min-height: 0; }
@media (max-width: 700px) {
  /* Mobile pages are auto-height — rows size to content; the image
     keeps a tidy fixed-height cover fill inside its frame */
  .toc-grid { grid-auto-rows: auto; }
  .toc-tile .tt-img .slot-img {
    position: static !important;
    width: 100% !important;
    height: 150px !important;
    max-width: 100% !important;
    max-height: none !important;
    object-fit: cover !important;
    filter: none !important;
  }
  .toc-page-wrap.toc-cont .toc-grid { grid-auto-rows: auto; align-content: stretch; }
}

/* ================================================================
   OFFER BADGE — SAFE TEXT LAYOUT
   The badge shape (background/radius/rotation) and the text now
   live on separate layers: .badge-content is an inner safe area
   with its own padding, overflow:visible, and one independent
   span per line — so «Buy 2 Get 1», «Free» and «خصم» can never
   touch or cross the badge edge, on web or in the PDF, and the
   badge shape is identical on every card.
   ================================================================ */
.badge .badge-content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;

  box-sizing: border-box;

}

/* Text-type offers (Buy X Get Y …) on premium cards: auto-sized
   rounded badge, fixed integer font sizes, one span per line */
.premium-card .badge.badge-text-offer {
  width: auto !important;
  height: auto !important;
  min-width: 96px;
  min-height: 0 !important;
  max-width: calc(100% - 64px);   /* never under the ♡ button */
  padding: 10px 14px 11px !important;
  border-radius: 14px;
  clip-path: none;
  transform: rotate(-2deg);
  line-height: normal;
}
.badge-text-offer .pct {

  line-height: 1.15;
}
.badge-text-offer .offer-main {

}
.badge-text-offer .offer-free {

.badge-text-offer .lbl.offer-ar {

/* grid-4 cards are narrower → slightly smaller fixed sizes */

.grid-4 .badge-text-offer .pct { font-size: 15px; }

.grid-4 .badge-text-offer .offer-free { font-size: 14px; }

@media (max-width: 700px) {

  .premium-card .badge.badge-text-offer {

/* ================================================================

/* ================================================================

   Added ONLY if the primary browser-native renderer fails for a

   and it destroys Arabic shaping when letter-spacing is set — so
   this mode converts those to raster-safe equivalents.

/* ================================================================
   PDF EXPORT — TEXT CLIPPING SAFE AREA (body.pdf-export-mode)
   Applied ONLY on the capture-sandbox body, never on the live page.
   Root cause: elements painted with `background-clip: text` (cover
   headline, prices, section titles…) only paint glyph ink inside
   the element's own background/padding box. With line-height ≤ 1
   and zero padding, the alef head in «أوشن», the leading digit of
   prices like 84.53, and the س of «ر.س» get shaved at the box edge
   — plus `overflow: hidden` on .premium-price-box trimming a
   centered nowrap price row, and line-height:1 inside badges.
   Fix: enlarge the PAINT box with padding while cancelling it with
   equal negative margins → zero layout shift, zero design change,
   pagination untouched. overflow:visible only on the exact
   affected text containers (page boundaries stay clipped).
   ================================================================ */

/* ── Cover headline (gradient text, line-height .85) ── */
body.pdf-export-mode .cover-headline {
  overflow: visible !important;
  padding: 28px 26px !important;
  margin: -28px -26px !important;
}
body.pdf-export-mode .cover-headline .accent {
  /* inline element: vertical padding never affects line layout */
  padding: 30px 14px !important;
  margin: -30px -14px !important;
}
body.pdf-export-mode .cover-headline .accent::after {
  /* keep the coral underline exactly where it was despite the padding */
  left: 14px !important;
  right: 14px !important;
  bottom: 48px !important;
}

/* ── Brand wordmarks («أوشن») and big Arabic titles ── */
body.pdf-export-mode .cover-mast,
body.pdf-export-mode .wordmark,
body.pdf-export-mode .final-head .brand-row {
  overflow: visible !important;
  padding: 8px 10px !important;
  margin: -8px -10px !important;
}
body.pdf-export-mode .page-head h1 {
  overflow: visible !important;
  padding: 12px 14px !important;
  /* original margin is 4px 0 0 — compensate padding while keeping it */
  margin: -8px -14px -12px !important;
}
body.pdf-export-mode .final-title {
  overflow: visible !important;
  padding: 10px 14px !important;
  margin: -10px -14px !important;
}
body.pdf-export-mode .toc-tile .tt-title {
  overflow: visible !important;
  padding: 6px 8px !important;
  margin: -6px -8px !important;
}
body.pdf-export-mode .toc-tile .tt-meta .count {
  padding: 4px 6px !important;
  margin: -4px -6px !important;
}

/* ── Prices: never trim the leading digit ── */
body.pdf-export-mode .premium-price-box { overflow: visible !important; }
body.pdf-export-mode .price-row { overflow: visible !important; }
body.pdf-export-mode .price-new,
body.pdf-export-mode .premium-card .price-new {
  display: inline-flex !important;
  align-items: baseline !important;
  overflow: visible !important;
  padding: 6px 8px !important;
  margin: -6px -8px !important;
}
body.pdf-export-mode .price-old {
  overflow: visible !important;
  padding-inline: 3px !important;
  margin-inline: -3px !important;
}
body.pdf-export-mode .hero-product .hp-price { overflow: visible !important; }
body.pdf-export-mode .hero-product .hp-new {
  display: inline-flex !important;

/* ── Currency symbol «ر.س» — Arabic font, roomy paint box ── */
