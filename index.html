    '<div class="fs-handle" aria-hidden="true"></div>' +
    '<div class="fs-head"><h2 id="cart-title">سلة المشتريات</h2>' +
    '<button type="button" class="fs-close" id="cart-close" aria-label="إغلاق"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>' +
    '<div class="fs-body" id="cart-body"></div>' +
    '<div class="fs-foot cart-foot" id="cart-foot"></div>';
  document.body.appendChild(back);
  document.body.appendChild(sheet);
  back.addEventListener("click", closeCartSheet);
  document.getElementById("cart-close").addEventListener("click", closeCartSheet);
  document.getElementById("cart-body").addEventListener("click", function (e) {
    var del = e.target.closest("[data-cart-delete]");
    if (del) { cartDeleteItem(del.dataset.cartDelete); return; }
  });
}
function renderCartSheetBody() {
  var body = document.getElementById("cart-body");
  var foot = document.getElementById("cart-foot");
  if (!body || !foot) return;
  var t = cartTotals();
  if (!t.items) {
    body.innerHTML = '<div class="cart-empty"><p>سلتك فارغة</p><span>أضف منتجات من العروض لتظهر هنا.</span></div>';
    foot.innerHTML = '<button type="button" class="fs-apply" id="cart-continue">متابعة التسوق</button>';
    var cc = document.getElementById("cart-continue");
    if (cc) cc.addEventListener("click", closeCartSheet);
    return;
  }
  var rows = "";
  CART.forEach(function (v, id) {
    var prodJson = escapeHtml(JSON.stringify(v));
    rows += '<div class="cart-row">' +
      '<div class="cr-info"><div class="cr-name">' + escapeHtml(v.name_ar || "صنف") + '</div>' +
        (v.code ? '<div class="cr-code">' + escapeHtml(v.code) + '</div>' : '') +
        '<div class="cr-price">' + fmtPrice(v.price) + ' ر.س' +
        (v.old_price && v.old_price > v.price ? ' <s>' + fmtPrice(v.old_price) + '</s>' : '') + '</div></div>' +
      '<div class="cr-actions">' +
        '<div class="product-qty-control" data-qty="' + v.qty + '" data-cart-id="' + escapeHtml(id) + '" role="group" aria-label="الكمية">' +
          '<button class="qty-btn qty-plus" type="button" data-cart-add="' + escapeHtml(id) + '" data-product=\'' + prodJson + '\' aria-label="زيادة">+</button>' +
          '<span class="qty-value">' + v.qty + '</span>' +
          '<button class="qty-btn qty-minus" type="button" data-cart-remove="' + escapeHtml(id) + '" aria-label="تقليل">−</button>' +
        '</div>' +
        '<div class="cr-line">' + fmtPrice(v.price * v.qty) + ' ر.س</div>' +
        '<button type="button" class="cr-del" data-cart-delete="' + escapeHtml(id) + '" aria-label="حذف ' + escapeHtml(v.name_ar || "") + ' من السلة">حذف</button>' +
      '</div></div>';
  });
  body.innerHTML =
    '<div class="cart-summary">' +
      '<span>' + t.items + ' ' + (t.items === 1 ? "صنف" : "أصناف") + ' · ' + t.qty + ' قطعة</span>' +
      (t.save > 0 ? '<span class="cs-save">وفرت ' + fmtPrice(t.save) + ' ر.س</span>' : '') +
    '</div>' + rows;
  foot.innerHTML =
    '<button type="button" class="fs-clear" id="cart-clear">تفريغ السلة</button>' +
    '<button type="button" class="fs-apply" id="cart-checkout">إتمام الطلب · ' + fmtPrice(t.sum) + ' ر.س</button>';
  var clr = document.getElementById("cart-clear");
  if (clr) clr.addEventListener("click", function () {
    if (window.confirm("هل تريد تفريغ السلة بالكامل؟")) cartClearAll();
  });
  var co = document.getElementById("cart-checkout");
  if (co) co.addEventListener("click", function () {
    closeCartSheet();
    trackEvent("checkout_whatsapp_clicked", { total: t.sum, items: t.items });
    if (typeof handleOrderClick === "function") handleOrderClick();
  });
}
function openCartSheet() {
  ensureCartSheet();
  _cartSheetOpen = true;
  _cartLastFocus = document.activeElement;
  renderCartSheetBody();
  var sheet = document.getElementById("cart-sheet");
  var back = document.getElementById("cart-backdrop");
  back.hidden = false; requestAnimationFrame(function () { if (_cartSheetOpen) back.classList.add("show"); });
  sheet.hidden = false; requestAnimationFrame(function () { if (_cartSheetOpen) sheet.classList.add("show"); });
  document.body.classList.add("sheet-open");
  var closeBtn = document.getElementById("cart-close");
  if (closeBtn) setTimeout(function () { if (_cartSheetOpen) closeBtn.focus(); }, 120);
  trackEvent("cart_opened", cartTotals());
}
function closeCartSheet() {
  if (!_cartSheetOpen) return;
  _cartSheetOpen = false;
  var sheet = document.getElementById("cart-sheet");
  var back = document.getElementById("cart-backdrop");
  if (sheet) { sheet.classList.remove("show"); setTimeout(function () { if (!_cartSheetOpen) sheet.hidden = true; }, 300); }
  if (back) { back.classList.remove("show"); setTimeout(function () { if (!_cartSheetOpen) back.hidden = true; }, 300); }
  if (!_sheetOpen && !_qvOpen) document.body.classList.remove("sheet-open");
  if (_cartLastFocus && _cartLastFocus.focus) { try { _cartLastFocus.focus(); } catch (e) {} }
}

/* ─────────────────────── QUICK PRODUCT VIEW ──────────────────── */
var _qvOpen = false, _qvLastFocus = null;
function ensureQuickView() {
  if (document.getElementById("qv-sheet")) return;
  var back = document.createElement("div");
  back.id = "qv-backdrop"; back.className = "sheet-backdrop"; back.hidden = true;
  var sheet = document.createElement("div");
  sheet.id = "qv-sheet"; sheet.className = "filter-sheet qv-sheet";
  sheet.setAttribute("role", "dialog"); sheet.setAttribute("aria-modal", "true");
  sheet.setAttribute("aria-labelledby", "qv-title"); sheet.hidden = true;
  sheet.innerHTML =
    '<div class="fs-handle" aria-hidden="true"></div>' +
    '<div class="fs-head"><h2 id="qv-title">تفاصيل المنتج</h2>' +
    '<button type="button" class="fs-close" id="qv-close" aria-label="إغلاق"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>' +
    '<div class="fs-body" id="qv-body"></div>';
  document.body.appendChild(back);
  document.body.appendChild(sheet);
  back.addEventListener("click", closeQuickView);
  document.getElementById("qv-close").addEventListener("click", closeQuickView);
}
function openQuickView(id) {
  var e = SHOP_ID_MAP.get(id);
  if (!e) return;
  ensureQuickView();
  _qvOpen = true;
  _qvLastFocus = document.activeElement;
  var p = e.p;
  var qty = CART.has(id) ? CART.get(id).qty : 0;
  var oldP = parseFloat(String(p.old_price || "").replace(/[^0-9.]/g, ""));
  var prodJson = escapeHtml(JSON.stringify({ id: id, name_ar: p.product_name_ar || "صنف", name_en: p.product_name_en || "",
    code: p.item_code || "", price: e.price, old_price: isFinite(oldP) ? oldP : 0, cat: p.category || "" }));
  var offerLbl = e.offer === "combo" ? String(p.discount_percent || "").trim()
               : e.disc ? ("خصم " + e.disc + "%") : "";
  document.getElementById("qv-body").innerHTML =
    '<div class="qv-img">' + shopImgHtml(p) + '</div>' +
    '<h3 class="qv-name">' + escapeHtml(p.product_name_ar || "") + '</h3>' +
    (p.product_name_en ? '<div class="qv-en">' + escapeHtml(p.product_name_en) + '</div>' : '') +
    (p.subtitle ? '<div class="qv-sub">' + escapeHtml(p.subtitle) + '</div>' : '') +
    '<div class="qv-price-row">' +
      '<span class="qv-price">' + fmtPrice(e.price) + ' <span>ر.س</span></span>' +
      (isFinite(oldP) && oldP > e.price ? '<span class="qv-old">' + fmtPrice(oldP) + '</span>' : '') +
      (offerLbl ? '<span class="qv-offer">' + escapeHtml(offerLbl) + '</span>' : '') +
    '</div>' +
    (e.save > 0 ? '<div class="qv-save">وفرت ' + fmtPrice(e.save) + ' ر.س</div>' : '') +
    (p.item_code ? '<div class="qv-code">كود الصنف: ' + escapeHtml(p.item_code) + '</div>' : '') +
    '<div class="qv-cart" data-incart="' + (qty ? 1 : 0) + '" data-shop-id="' + escapeHtml(id) + '">' +
      '<button type="button" class="sc-add" data-cart-add="' + escapeHtml(id) + '" data-product=\'' + prodJson + '\'>أضف للسلة</button>' +
      '<div class="product-qty-control" data-qty="' + qty + '" data-cart-id="' + escapeHtml(id) + '" role="group" aria-label="الكمية">' +
        '<button class="qty-btn qty-plus" type="button" data-cart-add="' + escapeHtml(id) + '" data-product=\'' + prodJson + '\' aria-label="زيادة">+</button>' +
        '<span class="qty-value">' + (qty || "أضف") + '</span>' +
        '<button class="qty-btn qty-minus" type="button" data-cart-remove="' + escapeHtml(id) + '" aria-label="تقليل">−</button>' +
      '</div>' +
    '</div>';
  var back = document.getElementById("qv-backdrop");
  var sheet = document.getElementById("qv-sheet");
  back.hidden = false; requestAnimationFrame(function () { if (_qvOpen) back.classList.add("show"); });
  sheet.hidden = false; requestAnimationFrame(function () { if (_qvOpen) sheet.classList.add("show"); });
  document.body.classList.add("sheet-open");
  var closeBtn = document.getElementById("qv-close");
  if (closeBtn) setTimeout(function () { if (_qvOpen) closeBtn.focus(); }, 120);
  trackEvent("quick_view_opened", { id: id });
}
function closeQuickView() {
  if (!_qvOpen) return;
  _qvOpen = false;
  var sheet = document.getElementById("qv-sheet");
  var back = document.getElementById("qv-backdrop");
  if (sheet) { sheet.classList.remove("show"); setTimeout(function () { if (!_qvOpen) sheet.hidden = true; }, 300); }
  if (back) { back.classList.remove("show"); setTimeout(function () { if (!_qvOpen) back.hidden = true; }, 300); }
  if (!_sheetOpen && !_cartSheetOpen) document.body.classList.remove("sheet-open");
  if (_qvLastFocus && _qvLastFocus.focus) { try { _qvLastFocus.focus(); } catch (e) {} }
}
function syncQuickViewCartState() {
  var box = document.querySelector("#qv-sheet .qv-cart");
  if (!box) return;
  var id = box.dataset.shopId;
  box.dataset.incart = CART.has(id) ? 1 : 0;
}

/* ───────────── ADAPTIVE HEADER + BACK TO TOP ────────────────── */
function ensureBackToTop() {
  if (document.getElementById("back-to-top")) return;
  var b = document.createElement("button");
  b.type = "button"; b.id = "back-to-top";
  b.setAttribute("aria-label", "العودة لأعلى الصفحة");
  b.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 14 6-6 6 6"/></svg>';
  b.hidden = true;
  b.addEventListener("click", function () {
    try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch (e) { try { window.scrollTo(0, 0); } catch (e2) {} }
  });
  document.body.appendChild(b);
}
function onShopScroll() {
  if (!document.body.classList.contains("shop-mode")) return;
  var y = window.scrollY || 0;
  /* Keep the sticky header at one constant height. Changing a sticky
     element's height during scrolling shifts all content and causes the
     compact class to oscillate around the threshold on touch devices. */
  if (document.body.classList.contains("sh-compact")) {
    document.body.classList.remove("sh-compact");
  }
  var btt = document.getElementById("back-to-top");
  if (btt) btt.hidden = y < 700;
}

/* ─────────────────────────── BOOT ────────────────────────────── */
var _shopBooted = false;
window.addEventListener("ocean:products-updated", function () {
  if (!_shopBooted || !window.ALL_PRODUCTS || !window.ALL_PRODUCTS.length) return;
  buildSearchIndex();
  renderShopChips();
  renderShopIntro();
  renderShopResults();
  syncShopCartUI();
});
function bootShopFromData() {
  if (!window.ALL_PRODUCTS || !window.ALL_PRODUCTS.length) return;
  buildSearchIndex();
  renderShopChips();
  renderShopIntro();
  var inp = document.getElementById("shop-search");
  if (inp && SHOP.q) inp.value = SHOP.q;
  toggleClearBtn();
  renderShopResults();
  CART.forEach(function (v, id) { try { _syncQtyControl(id); } catch (e) {} });
  syncShopCartUI();
  _shopBooted = true;
}
function waitForDataAndBoot() {
  var tries = 0;
  (function poll() {
    if (window.ALL_PRODUCTS && window.ALL_PRODUCTS.length) { bootShopFromData(); return; }
    if (++tries > 200) return;
    setTimeout(poll, 250);
  })();
}
function initShopMode() {
  restoreShopState();
  wireShopEvents();
  ensureBackToTop();
  restoreCartFromStorage();
  setMode();
  waitForDataAndBoot();
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initShopMode);
} else {
  initShopMode();
}
})();
</script>

</body></html>
