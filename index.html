function cartAdd(id, productData) {
  if (CART.has(id)) {
    CART.get(id).qty += 1;
  } else {
    CART.set(id, { ...productData, qty: 1 });
  }
  _syncQtyControl(id);
  updateCartBar();
}

function cartRemove(id) {
  if (!CART.has(id)) return;
  const item = CART.get(id);
  item.qty -= 1;
  if (item.qty <= 0) CART.delete(id);
  _syncQtyControl(id);
  updateCartBar();
}

function _syncQtyControl(id) {
  const qty = CART.has(id) ? CART.get(id).qty : 0;
  const escaped = CSS.escape(id);
  // Regular product cards
  document.querySelectorAll(`.product-qty-control[data-cart-id="${escaped}"]`).forEach(ctrl => {
    ctrl.dataset.qty = qty;
    const valEl = ctrl.querySelector('.qty-value');
    if (valEl) valEl.textContent = qty === 0 ? 'أضف' : qty;
  });
  // Hero product controls
  document.querySelectorAll(`.hp-qty-control[data-cart-id="${escaped}"]`).forEach(ctrl => {
    ctrl.dataset.qty = qty;
    const valEl = ctrl.querySelector('.hp-qty-val');
    if (valEl) valEl.textContent = qty;
    // Dim minus when zero
    const minusBtn = ctrl.querySelector('[data-cart-remove]');
    if (minusBtn) minusBtn.style.opacity = '1';
  });
}

function updateCartBar() {
  const bar   = document.getElementById('smart-cart-bar');
  const count = document.getElementById('sc-count');
  const total = document.getElementById('sc-total');
  if (!bar) return;

  let items = 0, qty = 0, sum = 0;
  for (const v of CART.values()) {
    items++; qty += v.qty; sum += v.price * v.qty;
  }

  const visible = qty > 0;
  bar.classList.toggle('is-visible', visible);
  document.body.classList.toggle('cart-bar-open', visible);

  if (count) count.textContent = `${items} ${items === 1 ? 'صنف' : 'أصناف'} · ${qty} قطعة`;
  if (total) total.innerHTML = `${sum.toFixed(2)} <span style="font-size:14px;color:rgba(244,236,219,.6)">ر.س</span>`;
}

/* ── Branch helpers (adapted from script.js) ── */
function _normalizeHeaderKey(key) {
  return String(key || '').replace(/^\uFEFF/, '').trim().toLowerCase().replace(/[\s_\-\/]+/g, '');
}
function _getCell(row, aliases) {
  const wanted = aliases.map(_normalizeHeaderKey);
  for (const key of Object.keys(row || {})) {
    if (wanted.includes(_normalizeHeaderKey(key))) return row[key];
  }
  return '';
}
function _parseCoord(value) {
  if (value == null) return null;
  const arabicD = '٠١٢٣٤٥٦٧٨٩', easternD = '۰۱۲۳۴۵۶۷۸۹';
  let s = String(value).trim()
    .replace(/[,،]/g, '.').replace(/[٠-٩]/g, d => String(arabicD.indexOf(d)))
    .replace(/[۰-۹]/g, d => String(easternD.indexOf(d))).replace(/[^0-9.\-]/g, '');
  if (!s || s === '-' || s === '.') return null;
  const n = Number(s);
  return isFinite(n) ? n : null;
}
function _normalizeBranchRow(row, idx) {
  const sheetLat = _parseCoord(_getCell(row, ['Latitude','Lat','خط العرض']));
  const sheetLng = _parseCoord(_getCell(row, ['Longitude','Lng','Long','خط الطول']));
  const valid = sheetLat !== null && sheetLng !== null &&
    sheetLat >= -90 && sheetLat <= 90 && sheetLng >= -180 && sheetLng <= 180;
  const delivery = String(_getCell(row, ['delevery','delivery','توصيل']) || '').toLowerCase() === 'yes';
  const whatsapp = String(_getCell(row, ['whats app link','whatsapp','whatsapp link','واتساب']) || '').replace(/\s+/g,'') || null;
  const rawMaps = String(_getCell(row, ['google maps location','google maps','maps','location link','رابط اللوكيشن']) || '').trim() || null;
  const maps = rawMaps || (valid ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(sheetLat+','+sheetLng)}` : null);
  return {
    _id: idx,
    store_code: String(_getCell(row, ['Store code','Store Code','code','كود الفرع']) || '').trim(),
    business_name: String(_getCell(row, ['Business name','Name','اسم الفرع']) || '').trim(),
    city: String(_getCell(row, ['Locality','City','المدينة']) || '').trim(),
    delivery, whatsapp, maps,
    lat: valid ? sheetLat : null, lng: valid ? sheetLng : null,
    coord_source: valid ? 'sheet' : 'missing',
    dist: null
  };
}
function _haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function _formatDist(km) {
  return km < 1 ? `${Math.round(km*1000)} م` : `${km.toFixed(1)} كم`;
}

async function ensureBranchesLoaded() {
  if (_BRANCHES_LOADED) return;
  if (_BRANCHES_LOADING) {
    // wait until done
    return new Promise(res => { const t = setInterval(() => { if (!_BRANCHES_LOADING) { clearInterval(t); res(); } }, 100); });
  }
  _BRANCHES_LOADING = true;
  try {
    const result = await oceanLoadDataset("branches", BRANCH_SHEET_URL);
    const data = result.data;
    _BRANCHES = data.map((r, i) => _normalizeBranchRow(r, i));
    _BRANCHES_LOADED = true;
  } catch(e) {
    console.warn('[SmartCart] Branch sheet fetch failed:', e.message);
    _BRANCHES = [];
  }
  _BRANCHES_LOADING = false;
}

function computeBranchDistances(lat, lng) {
  return _BRANCHES.map(b => ({
    ...b,
    dist: (b.coord_source === 'sheet' && b.lat !== null && b.lng !== null)
      ? _haversine(lat, lng, b.lat, b.lng) : null
  }));
}

function getNearestDeliveryBranch(branchesWithDist) {

/* ── WhatsApp URL builder ── */
function normalizeWhatsappPhone(rawWhatsapp) {
  let raw = String(rawWhatsapp || '').trim();
  if (!raw) raw = String(CS_WHATSAPP || getSetting('whatsapp_number') || getSetting('contact_whatsapp') || '').trim();

  // Accept normal numbers or full WhatsApp links from Google Sheet / Settings
  let phone = '';
  const linkMatch = raw.match(/(?:phone=|wa\.me\/|\/send\/)(\+?\d{7,15})/i) || raw.match(/(\+?\d{7,15})/);
  if (linkMatch) phone = linkMatch[1];
  else phone = raw.replace(/[^0-9]/g, '');

  phone = String(phone || '').replace(/[^0-9]/g, '');
  if (phone.startsWith('00')) phone = phone.slice(2);

  // Saudi mobile normalization: 05xxxxxxxx → 9665xxxxxxxx, 5xxxxxxxx → 9665xxxxxxxx
  if (/^05\d{8}$/.test(phone)) phone = '966' + phone.slice(1);
  else if (/^5\d{8}$/.test(phone)) phone = '966' + phone;

  return phone;
}

function buildWhatsappUrl(rawWhatsapp, message) {
  const phone = normalizeWhatsappPhone(rawWhatsapp);
  const encoded = encodeURIComponent(message || '');
  if (!phone) return '';
  // api.whatsapp.com is more reliable than wa.me inside iOS/Android browsers and webviews
  return `https://api.whatsapp.com/send?phone=${phone}&text=${encoded}`;
}

function openWhatsappUrl(url) {
  if (!url) {
    showOrderToast('رقم الواتساب غير موجود في الإعدادات أو بيانات الفرع');
    return;
  }

  // Mobile Safari/Chrome often blocks window.open after async geolocation.
  // Navigating the same tab is the most reliable way to open WhatsApp on mobile.
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if (isMobile) {
    window.location.href = url;
    return;
  }

  const win = window.open(url, '_blank', 'noopener,noreferrer');
  if (!win) window.location.href = url;
}

/* ── Main order flow ── */
async function handleOrderClick() {
  // Guard: cart empty
  if (CART.size === 0) {
    showOrderToast('أضف صنفاً واحداً على الأقل قبل إرسال الطلب');
    return;
  }

  // Show loading state on button
  const btn = document.getElementById('smart-cart-cta');
  if (btn) { btn.classList.add('loading'); btn.textContent = 'جارٍ تحديد موقعك…'; }

  // Ensure branch data loaded (lazy, background)
  await ensureBranchesLoaded();

  if (!navigator.geolocation) {
    if (btn) { btn.classList.remove('loading'); btn.innerHTML = '<svg class="wa-ic" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> اطلب من أقرب فرع إليك'; }
    showLocationDeniedModal();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      if (btn) { btn.classList.remove('loading'); btn.innerHTML = '<svg class="wa-ic" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> اطلب من أقرب فرع إليك'; }

      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const location = { lat, lng };

      const branchesWithDist = computeBranchDistances(lat, lng);
      const nearest = getNearestDeliveryBranch(branchesWithDist);
      const nearestAny = getNearestAnyBranch(branchesWithDist);

      // Pickup branch: prefer nearest delivery branch (even if outside radius), fall back to any branch with coords
      const pickupBranch = nearest || nearestAny;

      if (!nearest && !nearestAny) {
        // No branch at all has coordinates
        showOutOfCoverageModal('لا يمكن تحديد أقرب فرع حالياً، فضلاً تواصل معنا عبر واتساب.', location, null);

      }

      if (nearest && nearest.dist <= DELIVERY_RADIUS_KM) {
        // ✅ Within delivery radius → open WhatsApp delivery order
        openWhatsAppOrder(nearest, location);
      } else {
        // ❌ Outside radius → show pickup modal
        showOutOfCoverageModal(nearest, location, pickupBranch);
      }
    },
    err => {

      showLocationDeniedModal();

    { timeout: 12000, maximumAge: 60000, enableHighAccuracy: true }

/* ── Event delegation for cart buttons ── */
document.addEventListener('click', function(e) {
  // Plus button
  const addBtn = e.target.closest('[data-cart-add]');
  if (addBtn) {
    e.preventDefault(); e.stopPropagation();
    const id = addBtn.dataset.cartAdd;
    let product;
    try { product = JSON.parse(addBtn.dataset.product || '{}'); } catch(_) { product = {}; }
    cartAdd(id, product);
    return;
  }
  // Minus button
  const removeBtn = e.target.closest('[data-cart-remove]');
  if (removeBtn) {
    e.preventDefault(); e.stopPropagation();
    cartRemove(removeBtn.dataset.cartRemove);
    return;
  }
});

document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('smart-cart-cta');
  if (btn) btn.addEventListener('click', handleOrderClick);
});
if (document.readyState !== 'loading') {
  const btn = document.getElementById('smart-cart-cta');
  if (btn && !btn._cartWired) { btn._cartWired = true; btn.addEventListener('click', handleOrderClick); }
}

/* ================================================================
   COVER & STATIC SECTIONS — driven by getSetting()
   Called after settings are loaded so all text is resolved.
   ================================================================ */
function renderCoverAndStaticSections() {
  /* ── Page title ── */
  const magTitle = getSetting('magazine_page_title');
  if (magTitle) document.title = magTitle;

  /* ── Cover page ── */
  /* Official Ocean Pharmacy logo is the one and only brand mark — sheet
     settings only refresh the accessible fallback text, never replace it. */
  const coverMast = document.querySelector('.cover-mast');
  if (coverMast) {
    const s = getSetting('brand_short_ar') || getSetting('brand_name_ar');
    const fb = coverMast.querySelector('.ocean-logo__fallback');
    if (s && fb) fb.textContent = s;
    const lg = coverMast.querySelector('.ocean-logo');
    if (s && lg) lg.setAttribute('aria-label', s);
  }
  const coverEdition = document.querySelector('.cover-edition');
  if (coverEdition) {
    const es = getSetting('cover_edition_strong'), sub = getSetting('cover_edition_sub');
    if (es || sub) coverEdition.innerHTML = `<strong>${escapeHtml(es)}</strong>${escapeHtml(sub)}`;
  }
  const coverTagline = document.querySelector('.cover-tagline span');
  if (coverTagline) { const v = getSetting('cover_tagline'); if (v) coverTagline.textContent = v; }

  const coverSub = document.querySelector('.cover-sub');
  if (coverSub) { const v = getSetting('cover_sub_text'); if (v) coverSub.innerHTML = escapeHtml(v).replace(/٦٠٪|60%/g, '<strong>٦٠٪</strong>').replace(/٢٠٠/g, '<strong>٢٠٠</strong>'); }

  const coverStatBranches = document.querySelector('.cover-stat-row .stat:last-child .n');
  if (coverStatBranches) { const v = getSetting('cover_stat_branches'); if (v) coverStatBranches.textContent = v; }

  /* Burst badge */
  const b1 = document.querySelector('.cover-burst .b1');
  const b2 = document.querySelector('.cover-burst .b2');
  const b3 = document.querySelector('.cover-burst .b3');
  if (b1) { const v = getSetting('cover_badge_label_top');    if (v) b1.textContent = v; }
  if (b2) { const n = getSetting('cover_badge_number'), sf = getSetting('cover_badge_suffix'); if (n || sf) b2.innerHTML = `${escapeHtml(n)}<sup>${escapeHtml(sf)}</sup>`; }
  if (b3) { const v = getSetting('cover_badge_label_bottom'); if (v) b3.textContent = v; }

  /* Cover chips */
  const chips = document.querySelectorAll('.cover-callouts .chip');
  const chipSettings = ['cover_chip_1','cover_chip_2','cover_chip_3','cover_chip_4'];
  chips.forEach((chip, i) => {
    if (chipSettings[i]) {
      const val = getSetting(chipSettings[i]);
      if (!val) return;                         // فاضي → سيب الـ chip زي ما هو
      const icn = chip.querySelector('.icn');
      const icnHtml = icn ? icn.outerHTML : '';
      chip.innerHTML = icnHtml + escapeHtml(val);
    }
  });

  /* Cover headline */
  const hl = document.querySelector('.cover-headline');
  if (hl) { const m = getSetting('cover_headline_main'), a = getSetting('cover_headline_accent'); if (m || a) hl.innerHTML = `<span>${escapeHtml(m)}</span> <span class="accent">${escapeHtml(a)}</span>`; }

  /* Cover footer */
  const coverFootDates = document.querySelector('.cover-foot .dates');
  if (coverFootDates) {
    const v = getSetting('validity_text');
    if (v) { const dot = coverFootDates.querySelector('.dot'); const dotHtml = dot ? dot.outerHTML : '<span class="dot"></span>'; coverFootDates.innerHTML = dotHtml + escapeHtml(v); }
  }
  const coverFootMeta = document.querySelector('.cover-foot .meta');
  if (coverFootMeta) { const v = getSetting('cover_foot_meta'); if (v) coverFootMeta.textContent = v; }

  /* ── TOC page static text ── */
  const tocMono = document.querySelector('.page-head .cat-mono');
  if (tocMono) { const v = getSetting('toc_page_label'); if (v) tocMono.textContent = v; }
  const tocH1 = document.querySelector('.page-head h1');
  if (tocH1) { const v = getSetting('toc_page_title'); if (v) tocH1.textContent = v; }
  const tocWordmark = document.querySelector('.page-head .h-right .wordmark');
  if (tocWordmark) { const r = getSetting('brand_ring_letter'), n = getSetting('brand_name_ar'); if (r || n) tocWordmark.innerHTML = `<span class="wordmark-mark">${escapeHtml(r)}</span><span>${escapeHtml(n)}</span>`; }
  const tocEd = document.querySelector('.page-head .h-right .ed');
  if (tocEd) { const v = getSetting('toc_edition_label'); if (v) tocEd.textContent = v; }
  const tocFootLeft  = document.querySelector('.page-foot span:first-child');
  if (tocFootLeft)  { const v = getSetting('toc_footer_left');  if (v) tocFootLeft.textContent  = v; }
  const tocFootRight = document.querySelector('.page-foot span:last-child');
  if (tocFootRight) { const v = getSetting('toc_footer_right'); if (v) tocFootRight.textContent = v; }

  /* ── Toolbar ── */
  const toolbarBrand = document.querySelector('.toolbar .brand span:last-child');
  if (toolbarBrand) { const v = getSetting('toolbar_brand_label'); if (v) toolbarBrand.textContent = v; }
  const searchInput = document.getElementById('search-input');
  if (searchInput) { const v = getSetting('toolbar_search_ph'); if (v) searchInput.placeholder = v; }
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) { const v = getSetting('toolbar_refresh_label'); if (v) { const ic = refreshBtn.querySelector('.ic'); refreshBtn.innerHTML = (ic?ic.outerHTML:'<span class="ic">⟳</span>') + `<span>${escapeHtml(v)}</span>`; } }
  const printBtn = document.getElementById('print-btn');
  if (printBtn)   { const v = getSetting('toolbar_print_label');   if (v) { const ic = printBtn.querySelector('.ic');   printBtn.innerHTML   = (ic?ic.outerHTML:'<span class="ic">⎙</span>') + `<span>${escapeHtml(v)}</span>`; } }

  /* ── Cart bar CTA label ── */
  const cartCta = document.getElementById('smart-cart-cta');
  if (cartCta) {
    const v = getSetting('cart_cta_label');
    if (v) { const waIc = cartCta.querySelector('.wa-ic'); const waHtml = waIc ? waIc.outerHTML : ''; cartCta.innerHTML = waHtml + escapeHtml(v); }
  }
}

/* Merge MAGAZINE_SETTINGS into FINAL_DEFAULTS keys for renderFinalPage */
function buildFinalPageSettings() {
  const finalKeys = [
    'final_page_title_ar','final_page_subtitle_ar','final_page_headline_ar','final_page_body_ar',
    'cta_1_text','cta_1_link','cta_2_text','cta_2_link','cta_3_text','cta_3_link',
    'qr_image_url','whatsapp_number','whatsapp_text','website_url','google_maps_url',
    'branch_finder_text','nearest_branch_text','delivery_text',
    'footer_terms_ar','validity_note_ar','contact_title_ar',
    'contact_phone','contact_whatsapp','contact_website','contact_instagram','contact_tiktok'
  ];
  const merged = { ...FINAL_DEFAULTS };
  finalKeys.forEach(k => {
    const v = getSetting(k);
    if (v) merged[k] = v;
  });
  return merged;
}

/* Portrait Auto-Detect: marks tall product images with .portrait class */
function detectPortraitImages() {
  document.querySelectorAll('.product-image img, .pi-img-wrap img').forEach(img => {
    if (img.complete && img.naturalWidth > 0) {
      const ratio = img.naturalHeight / img.naturalWidth;
      if (ratio > 1.35) img.classList.add('portrait');
    } else {
      img.addEventListener('load', function() {
        const ratio = this.naturalHeight / this.naturalWidth;
        if (ratio > 1.35) this.classList.add('portrait');
      });
    }
  });
}
document.addEventListener('DOMContentLoaded', detectPortraitImages);
const portraitObserver = new MutationObserver(() => detectPortraitImages());
document.addEventListener('DOMContentLoaded', () => {

/* ════════════════════════════════════════════════════════════════════
   OCEAN PHARMACY — MOTION ENGINE
   Single IntersectionObserver · No layout thrash · Mobile-safe
   ════════════════════════════════════════════════════════════════════ */
(function() {
  "use strict";

  /* Skip all animations if user prefers reduced motion */
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  if (reducedMotion) {
    /* Make everything immediately visible */
    document.querySelectorAll(".product-card,.premium-card,.toc-tile").forEach(el => {
      el.style.opacity = "1";
      el.style.transform = "none";
    });
    return;
  }

  /* ── Shared IntersectionObserver for cards + TOC tiles ── */
  let staggerIndex = 0;
  const seenRoots = new WeakSet();

  const motionObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting || seenRoots.has(entry.target)) return;
      seenRoots.add(entry.target);

      const el = entry.target;

      /* Stagger delay — resets per scroll batch via requestAnimationFrame */
      const delay = (staggerIndex % 8) * 60;
      staggerIndex++;

      requestAnimationFrame(() => {
        el.style.transitionDelay = delay + "ms";
        el.classList.add("is-visible");

        /* Clean up will-change after animation ends */
        el.addEventListener("transitionend", () => {
          el.style.willChange = "auto";
          el.style.transitionDelay = "";
        }, { once: true });
      });

      motionObserver.unobserve(el);
    });
  }, {
    threshold: 0.08,
    rootMargin: "0px 0px -30px 0px"
  });

  /* Observe cards + TOC tiles — live + dynamic (MutationObserver) */
  function observeMotionTargets() {
    document.querySelectorAll(
      ".product-card:not(.is-visible), .toc-tile:not(.is-visible)"
    ).forEach(el => motionObserver.observe(el));
  }

  /* Re-observe when new cards are injected by rendering logic */
  const motionMutObs = new MutationObserver(() => {
    staggerIndex = 0; /* reset stagger for new page batch */
    observeMotionTargets();
  });

  /* ── 7. TOOLBAR HIDE / SHOW — mobile only ── */
  function initToolbarScroll() {
    if (window.innerWidth > 700) return; /* desktop: skip */

    const toolbar = document.querySelector(".toolbar");
    if (!toolbar) return;

    let lastY = window.scrollY;
    let ticking = false;
    let inputFocused = false;

    /* Never hide while inputs are focused */
    toolbar.querySelectorAll("input, select").forEach(inp => {
      inp.addEventListener("focus",  () => { inputFocused = true; });
      inp.addEventListener("blur",   () => { inputFocused = false; });
    });

    window.addEventListener("scroll", () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        if (!inputFocused) {
          const currentY = window.scrollY;
          const delta = currentY - lastY;

          if (delta > 6 && currentY > 80) {
            toolbar.classList.add("toolbar-hidden");
          } else if (delta < -4) {
            toolbar.classList.remove("toolbar-hidden");
          }
          lastY = currentY;
        }
        ticking = false;
      });
    }, { passive: true });
  }

  /* ── Boot after DOM ready ── */
  function bootMotion() {
    observeMotionTargets();

    motionMutObs.observe(document.body, {
      childList: true,
      subtree: true
    });

    initToolbarScroll();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", bootMotion);
  } else {
    bootMotion();
  }

})();


/* ═══════════════════════════════════════════════════════════════════

      .replace('<img ', '<img loading="eager" fetchpriority="high" decoding="async" ')

/* ══════════════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════════════ */
function renderEmptyState() {

/* ══════════════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════════
   PHASE 1-E  RESULT COUNT BADGE
   ══════════════════════════════════════════════════════════════ */
function upsertResultCount() {
  let badge = document.getElementById("result-count-badge");
  if (!badge) return; /* badge must exist in HTML */

  const total = (window.ALL_PRODUCTS || []).length;
  if (!total) { badge.style.display = "none"; return; }

  const filter = window.CURRENT_FILTER || {};
  const q   = (filter.search || "").trim();
  const cat = filter.category || "";

  /* Use existing getFilteredProducts if available for accuracy */
  let filteredCount;
  if (typeof getFilteredProducts === "function") {
    filteredCount = getFilteredProducts().length;
  } else {
    filteredCount = (window.ALL_PRODUCTS || []).filter(p => {
      if (cat && String(p.category || "").trim().toLowerCase() !== cat) return false;
      if (q) {
        const hay = ((p.product_name_ar || "") + " " + (p.product_name_en || "") + " " + (p.category || "")).toLowerCase();
        return hay.includes(q.toLowerCase());
      }
      return true;
    }).length;
  }

  const isFiltered = !!(q || cat);
  badge.style.display = "";
  badge.className = "result-count" + (isFiltered ? " filtered" : "");
  badge.textContent = isFiltered
    ? `عُرض ${filteredCount} من ${total} منتج`
    : `${total} منتج`;
}

/* ══════════════════════════════════════════════════════════════

function injectA11y() {

/* Inject ARIA onto dynamically rendered cards */
function injectCardA11y() {
  document.querySelectorAll(".product-card:not([role])").forEach(card => {
    card.setAttribute("role", "article");
    const name = card.querySelector(".product-name");
    if (name) card.setAttribute("aria-label", name.textContent.trim());

    const badge = card.querySelector(".badge");
    if (badge && !badge.hasAttribute("role")) {

      }
    }

    const savings = card.querySelector(".product-savings");
    if (savings && !savings.hasAttribute("aria-label")) {
      const txt = savings.querySelector("span:first-child");
      if (txt) savings.setAttribute("aria-label", txt.textContent.trim());
    }

    const priceRow = card.querySelector(".price-row");
    if (priceRow && !priceRow.hasAttribute("aria-live")) {
      priceRow.setAttribute("aria-live", "polite");
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   PHASE 2-A  DISCOUNT BADGE COUNTER
   Animates the percentage number on badge entrance
   ══════════════════════════════════════════════════════════════ */
function animateBadgeCounter(badge) {
  if (!badge || badge.dataset.counted === "true") return;
  const pctEl = badge.querySelector(".pct");
  if (!pctEl) return;

  const raw = pctEl.textContent.trim();
  /* Only animate pure numeric percentages like "25%" or "30" */
  const match = raw.match(/^(\d+)(%?)$/);
  if (!match) return;

  const target = parseInt(match[1], 10);
  const suffix = match[2] || "";
  if (isNaN(target) || target <= 0) return;

  badge.dataset.counted = "true";
  const start = performance.now();
  const dur = 600;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / dur, 1);
    const current = Math.round(easeOut(progress) * target);
    pctEl.textContent = current + suffix;
    if (progress < 1) requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════════════════════════
   PHASE 2-B  HIGH-VALUE / SPOTLIGHT CLASS INJECTION
   Called after renderCategoriesMount renders cards
   ══════════════════════════════════════════════════════════════ */
function injectValueClasses() {
  document.querySelectorAll(".product-card:not([data-value-checked])").forEach(card => {
    card.dataset.valueChecked = "1";
    const badge = card.querySelector(".badge .pct");
    if (!badge) return;
    const pct = parseInt(badge.textContent, 10);
    if (isNaN(pct)) return;
    if (pct >= 30) {
      card.classList.add("high-value");
      /* Add value pill after premium-tag if not already there */
      const tagRow = card.querySelector(".premium-tag-row");
      if (tagRow && !tagRow.querySelector(".high-value-tag")) {
        const pill = document.createElement("span");
        pill.className = "high-value-tag";
        pill.textContent = "قيمة ممتازة";
        tagRow.appendChild(pill);
      }
    }
    if (pct >= 40) {
      card.classList.add("spotlight");
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   PHASE 2-C  LIGHT SECTION TRANSITION on filter/search change
   ══════════════════════════════════════════════════════════════ */
let _sectionTransitioning = false;

function wrapRenderWithTransition(originalFn) {
  return function() {
    if (_sectionTransitioning || !window.ALL_PRODUCTS || !window.ALL_PRODUCTS.length) {
      return originalFn.apply(this, arguments);
    }
    const mount = document.getElementById("categories-mount");
    if (!mount || !mount.children.length) return originalFn.apply(this, arguments);

    _sectionTransitioning = true;
    mount.classList.add("page-leaving");
    requestAnimationFrame(() => mount.classList.add("out"));

    setTimeout(() => {
      originalFn.apply(this, arguments);
      mount.classList.remove("page-leaving", "out");
      mount.classList.add("page-entering");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => mount.classList.add("in"));
      });
      setTimeout(() => {
        mount.classList.remove("page-entering", "in");
        _sectionTransitioning = false;
      }, 350);
    }, 200);
  };
}

/* ══════════════════════════════════════════════════════════════
   PHASE 3-A  DESKTOP SECTION NAVIGATION DOTS
   ══════════════════════════════════════════════════════════════ */
function initSectionNav() {
  if (window.innerWidth <= 900) return;

  let nav = document.getElementById("section-nav");
  if (!nav) {
    nav = document.createElement("nav");
    nav.id = "section-nav";
    nav.className = "section-nav";
    nav.setAttribute("aria-label", "التنقل بين أقسام المجلة");
    document.body.appendChild(nav);
  }
  nav.innerHTML = "";

  const pages = document.querySelectorAll(".page-wrap");
  if (pages.length < 2) return;

  pages.forEach((wrap, i) => {
    const headEl  = wrap.querySelector(".page-head h1, .cover-mast, .final-title");
    const label   = headEl ? headEl.textContent.trim().slice(0, 12) : `صفحة ${i + 1}`;
    const dot     = document.createElement("button");
    dot.className = "section-nav-dot";
    dot.title     = label;
    dot.setAttribute("aria-label", `الانتقال إلى: ${label}`);
    dot.addEventListener("click", () => wrap.scrollIntoView({ behavior: "smooth", block: "start" }));
    nav.appendChild(dot);
  });

  /* Activate dot on scroll */
  const navDots = nav.querySelectorAll(".section-nav-dot");
  const sectionObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const idx = Array.from(pages).indexOf(entry.target);
      navDots.forEach((d, i) => d.classList.toggle("active", i === idx));
    });
  }, { threshold: 0.4 });

  pages.forEach(p => sectionObserver.observe(p));
}

/* ══════════════════════════════════════════════════════════════
   OBSERVER — runs after cards are rendered
   Single MutationObserver for all post-render tasks
   ══════════════════════════════════════════════════════════════ */
const _postRenderObs = new MutationObserver(() => {
  const mount = document.getElementById("categories-mount");

  /* Empty state: real products loaded but filter shows zero */
  if (mount && window.ALL_PRODUCTS && window.ALL_PRODUCTS.length > 0) {
    const hasRealCards = mount.querySelector(".product-card:not(.skeleton-card)");
    const hasPageWrap  = mount.querySelector(".page-wrap");
    /* If mount has content but no real cards and no page-wrap = empty result */
    if (hasPageWrap && !hasRealCards && !mount.querySelector(".empty-state") && !mount.querySelector(".error-state-premium")) {
      mount.innerHTML = renderEmptyState();
    }
  }

  injectCardA11y();
  injectValueClasses();
  upsertResultCount();
  /* Animate badge counters for newly visible cards */
  document.querySelectorAll(".product-card.is-visible .badge:not([data-counted])").forEach(animateBadgeCounter);
  /* Build/rebuild section nav after DOM changes */
  if (window.innerWidth > 900) {
    clearTimeout(window._navRebuildTimer);
    window._navRebuildTimer = setTimeout(initSectionNav, 400);

  _imgPriorityIdx = 0;
});

const _visibilityObs = new MutationObserver(mutations => {
  mutations.forEach(m => {
    if (m.type === "attributes" && m.attributeName === "class") {
      const el = m.target;
      if (el.classList.contains("is-visible")) {
        const badge = el.querySelector(".badge");
        if (badge) setTimeout(() => animateBadgeCounter(badge), 220);
      }
    }
  });
});

/* ══════════════════════════════════════════════════════════════
   BOOT — patch existing functions then start observers
   ══════════════════════════════════════════════════════════════ */
function enterpriseBoot() {
  if (window.SHOP_ONLY_MODE) return;
  injectA11y();
  setMagazineBusy(true);

  /* Single safe patch — intercepts AFTER render to inject empty state + count */
  /* Uses MutationObserver on mount instead of wrapping the function */
  /* This avoids any risk of breaking the render chain */

  /* Skeleton is now injected directly inside loadMagazine — no wrap needed */
  _imgPriorityIdx = 0;

  /* Start MutationObserver on categories-mount */
  const mount = document.getElementById("categories-mount");
  if (mount) {
    _postRenderObs.observe(mount, { childList: true, subtree: true });
    _visibilityObs.observe(mount, { attributes: true, attributeFilter: ["class"], subtree: true });

  const _busyObs = new MutationObserver(() => {
    const hasReal = document.querySelector(".product-card:not(.skeleton-card)");
    if (hasReal) { setMagazineBusy(false); _busyObs.disconnect(); }
  });
  const _catMount = document.getElementById("categories-mount");
  if (_catMount) _busyObs.observe(_catMount, { childList: true, subtree: false });

  const mag = document.getElementById("magazine");

})(); /* end IIFE */


/* ════════════════════════════════════════════════════════════════
   TOC CLICK NAVIGATION
   One delegated listener — never duplicated on re-render
   ════════════════════════════════════════════════════════════════ */

function slugifyCategoryName(name) {
  return "category-" + String(name || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "-")
    .replace(/[^\u0600-\u06FFa-z0-9-]/g, "")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}

/* Single delegated click handler — registered once at page load */
document.addEventListener("click", function tocNavHandler(e) {
  const tile = e.target.closest(".toc-tile[data-target]");
  if (!tile) return;

  const targetId = tile.dataset.target;

  function scrollToTarget() {
    const el = document.getElementById(targetId);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      return true;
    }
    return false;
  }

  /* Try direct scroll first */
  if (scrollToTarget()) return;

  /* Target not in DOM — may be filtered out. Reset filter then scroll. */
  const filterEl = document.getElementById("category-filter");
  if (filterEl && filterEl.value !== "") {
    filterEl.value = "";
    if (window.CURRENT_FILTER) window.CURRENT_FILTER.category = "";
    filterEl.dispatchEvent(new Event("change"));
    /* Wait for re-render then scroll */
    setTimeout(scrollToTarget, 250);
  }
});

/* Keyboard support — Enter / Space on toc-tile */
document.addEventListener("keydown", function tocKeyHandler(e) {
  if (e.key !== "Enter" && e.key !== " ") return;
  const tile = e.target.closest(".toc-tile[data-target]");
  if (!tile) return;
  e.preventDefault();
  tile.click();
});

        this._fb = 1;
        this.src = "https://drive.google.com/uc?export=view&id=" + driveId;
      } else {
        this.style.display = "none";
      }
    };
  };
})();
</script>
  

<script type="text/plain" id="ocean-magazine-layout-module">
/* ════════════════════════════════════════════════════════════════
   PAGE OVERFLOW GUARD — measurement-based rebalancing
   Runs after every render on the fixed desktop layout (>700px).
   Any product card whose bottom edge would cross the page footer is
   moved (in order) to the next page of the SAME category; a new
   continuation page is created automatically when needed. Nothing
   is ever clipped or hidden.
   ════════════════════════════════════════════════════════════════ */
(function () {
"use strict";

var PAGE_HEIGHT = 1754;   /* fixed magazine page height (px, unscaled) */
var PAD_BOTTOM  = 72;     /* .page-pad bottom padding */
var SAFETY_GAP  = 12;     /* breathing room above the footer */

/* Bottom edge of `el` measured inside its .page-pad (layout offsets are
   unaffected by the page-scale transform, so this works at any zoom). */
function offsetBottomInPad(el, pad) {
  var top = 0, node = el;
  while (node && node !== pad) {
    top += node.offsetTop;
    node = node.offsetParent;
  }
  return top + el.offsetHeight;
}

function contentLimitFor(wrap) {
  var foot = wrap.querySelector(".page-foot");
  var footH = foot ? foot.offsetHeight : 44;
  return PAGE_HEIGHT - PAD_BOTTOM - footH - SAFETY_GAP;
}

/* Build an empty continuation page for the same category, cloning the
   chrome (header, colors, footer) from the source page. */
function createContinuationPage(sourceWrap) {
  var catKey = sourceWrap.dataset.catKey || "";
  var cat = (window.CATEGORY_DATA && window.CATEGORY_DATA[catKey]) || null;
  var newWrap;

  if (cat && typeof renderCategoryPageHtml === "function") {
    var tmp = document.createElement("div");
    tmp.innerHTML = renderCategoryPageHtml(cat, [], 0, false, false, 0);
    newWrap = tmp.firstElementChild;
  } else {
    /* Fallback: clone the source page and empty its grid */
    newWrap = sourceWrap.cloneNode(true);
    newWrap.removeAttribute("id");
    var hero = newWrap.querySelector(".hero-product");
    if (hero) hero.remove();
    var g = newWrap.querySelector(".grid-4, .grid-3");
    if (g) g.innerHTML = "";
    newWrap.dataset.catPage = "cont";
  }

  /* Match the grid type of the source page so moved cards keep their sizing */
  var srcGrid = sourceWrap.querySelector(".grid-4, .grid-3");
  var newGrid = newWrap.querySelector(".grid-4, .grid-3");
  if (srcGrid && newGrid) {
    newGrid.className = srcGrid.className;
    newGrid.style.marginTop = "28px";
  }
  return newWrap;
}

function renumberMagazinePages() {
  var wraps = document.querySelectorAll("#magazine .page-wrap");
  var n = 0;
  wraps.forEach(function (w) {
    n++;
    var pn = w.querySelector(".page-foot .pn");
    if (pn) pn.textContent = "— " + String(n).padStart(2, "0") + " —";
  });
}

function updateCategoryPageCounts() {
  document.querySelectorAll('#categories-mount .page-wrap[data-cat-key]').forEach(function (w) {
    var ed = w.querySelector(".page-head .h-right .ed");
    if (!ed) return;
    var grid = w.querySelector(".grid-4, .grid-3");
    var count = (grid ? grid.children.length : 0) + (w.querySelector(".hero-product") ? 1 : 0);
    ed.textContent = (w.dataset.catPage === "first" ? "" : "+") + count + " عرضاً";
  });
}

function enforcePageBounds() {
  var mount = document.getElementById("categories-mount");
  if (!mount) return;

  /* Card-moving measurement pass: fixed desktop layout only.
     (Mobile pages are auto-height — nothing can overflow there.) */
  var probe = mount.querySelector(".page-pad");
  var canMeasure = window.innerWidth > 700 && probe && probe.offsetHeight >= 200;

  if (canMeasure) {
    var wraps = Array.prototype.slice.call(mount.querySelectorAll(".page-wrap[data-cat-key]"));
    var guard = 0;

    for (var i = 0; i < wraps.length && guard < 600; i++) {
      var wrap = wraps[i];
      var pad  = wrap.querySelector(".page-pad");
      var grid = wrap.querySelector(".grid-4, .grid-3");
      if (!pad || !grid) continue;

      var limit = contentLimitFor(wrap);

      while (grid.children.length > 1 && guard < 600) {
        var last = grid.lastElementChild;
        if (offsetBottomInPad(last, pad) <= limit) break;

        var next = wraps[i + 1];
        var nextGrid = (next && next.dataset.catKey === wrap.dataset.catKey)
          ? next.querySelector(".grid-4, .grid-3") : null;

        if (!nextGrid) {
          next = createContinuationPage(wrap);
          wrap.after(next);
          wraps.splice(i + 1, 0, next);
          nextGrid = next.querySelector(".grid-4, .grid-3");
          if (!nextGrid) break;
        }
        nextGrid.insertBefore(last, nextGrid.firstChild);
        guard++;
      }
    }
  }

  /* Numbering & counts are layout-independent → run on every device */
  renumberMagazinePages();
  updateCategoryPageCounts();
}

var _balanceTimer = null;
function schedulePageBalance() {
  clearTimeout(_balanceTimer);
  _balanceTimer = setTimeout(function () {
    requestAnimationFrame(enforcePageBounds);
  }, 80);
}

/* Re-check after fonts settle (line heights can change) and when the
   viewport crosses into the fixed desktop layout. */
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(schedulePageBalance).catch(function () {});
}
var _lastIsDesktop = window.innerWidth > 700;
window.addEventListener("resize", function () {
  var isDesktop = window.innerWidth > 700;
  if (isDesktop && !_lastIsDesktop) schedulePageBalance();
  _lastIsDesktop = isDesktop;
});

window.enforcePageBounds = enforcePageBounds;
window.schedulePageBalance = schedulePageBalance;
window.renumberMagazinePages = renumberMagazinePages;
})();
</script>

<script type="text/plain" id="ocean-pdf-export-module">
/* ════════════════════════════════════════════════════════════════
   PDF EXPORT ENGINE v2 — sandbox capture, browser-native rendering
   ────────────────────────────────────────────────────────────────
   Architecture:
   1. waitForMagazineReady(): real-state gates (data, pages, cards,
      hero products, pagination, images, QR, fonts) — no blind waits.
   2. validateMagazineIntegrity(): expected vs rendered products /
      categories / pages. Mismatch → export is refused (no partial
      PDF is ever produced).
   3. A hidden same-origin iframe ("capture sandbox") receives a
      clone of the FULLY-RENDERED magazine plus the site stylesheet
      with all `@media (max-width: 700px)` blocks stripped — so the
      fixed 1240×1754 desktop layout is guaranteed on every device
      (iPhone included), with --page-scale forced to 1 and body
      class `pdf-exporting` (web chrome hidden, motion frozen).
   4. Each .page-wrap is rasterized INDEPENDENTLY with html-to-image
      (SVG foreignObject → the browser itself paints the page), so
      Arabic shaping/RTL, gradient-clipped text, clip-path badges
      and color-mix() borders render EXACTLY as in Chrome.
   5. Every canvas is checked for blank output and retried; if a
      page still fails, html2canvas runs as an automatic per-page
      fallback (with raster-safe overrides). Any page that cannot
      be produced aborts the export — never a truncated PDF.
   6. Each page canvas becomes one independent page in jsPDF at
      1240×1754 px — never one long screenshot.
   ════════════════════════════════════════════════════════════════ */
(function () {
"use strict";

var HTML_TO_IMAGE_SRC = "https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js";
var HTML2CANVAS_SRC   = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
var JSPDF_SRC         = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";

var PAGE_W = 1240, PAGE_H = 1754;
var _pdfExporting = false;
var _scriptPromises = {};

function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

function loadScriptInto(doc, src) {
  var key = (doc === document ? "main:" : "frame:") + src;
  if (_scriptPromises[key]) return _scriptPromises[key];
  _scriptPromises[key] = new Promise(function (resolve, reject) {
    var s = doc.createElement("script");
    s.src = src;
    s.async = true;
    s.onload = function () { resolve(); };
    s.onerror = function () {
      delete _scriptPromises[key];
      reject(new Error("تعذّر تحميل مكتبة التصدير. تحقق من اتصال الإنترنت."));
    };
    (doc.head || doc.documentElement).appendChild(s);
  });
  return _scriptPromises[key];
}

/* ── Progress overlay ─────────────────────────────────────────── */
function ensurePdfOverlay() {
  var ov = document.getElementById("pdf-export-overlay");
  if (ov) return ov;
  ov = document.createElement("div");
  ov.id = "pdf-export-overlay";
  ov.setAttribute("role", "dialog");
  ov.setAttribute("aria-modal", "true");
  ov.setAttribute("aria-label", "تصدير المجلة إلى PDF");
  ov.innerHTML =
    '<div class="pdf-box">' +
      '<div class="pdf-spinner" aria-hidden="true"></div>' +
      '<div class="pdf-title">تصدير المجلة PDF</div>' +
      '<div class="pdf-text" id="pdf-progress-text" aria-live="polite">جاري تجهيز المجلة…</div>' +
      '<div class="pdf-bar"><div class="pdf-bar-fill" id="pdf-progress-bar"></div></div>' +
      '<div class="pdf-hint">قد يستغرق التصدير بعض الوقت حسب عدد الصفحات وجودة الصور.</div>' +
    '</div>';
  document.body.appendChild(ov);
  return ov;
}
function showPdfProgress(text, pct) {
  var ov = ensurePdfOverlay();
  ov.classList.add("show");
  var t = document.getElementById("pdf-progress-text");
  var b = document.getElementById("pdf-progress-bar");
  if (t) t.textContent = text;
  if (b && typeof pct === "number") b.style.width = Math.max(0, Math.min(100, pct)) + "%";
}
function hidePdfOverlay() {
  var ov = document.getElementById("pdf-export-overlay");
  if (ov) { ov.classList.remove("show"); ov.classList.remove("done"); }
}

/* ── Image helpers ────────────────────────────────────────────── */
function forceProcessSmartImages(root) {
  (root || document).querySelectorAll(".pi-smart[data-src]").forEach(function (el) {
    if (el.dataset.processed) return;
    el.dataset.processed = "1";
    if (typeof smartProcessImage === "function") {
      smartProcessImage(el, el.dataset.src, el.dataset.alt || "");
    }
  });
}

function waitForCondition(check, timeoutMs, intervalMs) {
  var start = Date.now();
  return new Promise(function (resolve) {
    (function poll() {
      var ok = false;
      try { ok = !!check(); } catch (e) { ok = false; }
      if (ok) return resolve(true);
      if (Date.now() - start > timeoutMs) return resolve(false);
      setTimeout(poll, intervalMs || 250);
    })();
  });
}

function imgSettled(img, timeoutMs) {
  return new Promise(function (resolve) {
    function finish() { resolve(img.complete && img.naturalWidth > 0); }
    if (img.complete) {
      if (img.naturalWidth > 0 && img.decode) { img.decode().then(finish, finish); }
      else { finish(); }
      return;
    }
    var done = false;
    function once() { if (!done) { done = true; finish(); } }
    img.addEventListener("load", once, { once: true });
    img.addEventListener("error", once, { once: true });
    setTimeout(once, timeoutMs);
  });
}

/* Wait for every <img> under root; retry each failed image ONCE. */
async function settleAllImages(root, timeoutMs) {
  var imgs = Array.prototype.slice.call(root.querySelectorAll("img"));
  var states = await Promise.allSettled(imgs.map(function (im) { return imgSettled(im, timeoutMs); }));
  var retried = [];
  states.forEach(function (st, i) {
    var ok = st.status === "fulfilled" && st.value === true;
    if (!ok && imgs[i].getAttribute("src")) {
      var im = imgs[i], src = im.getAttribute("src");
      im.removeAttribute("src");
      im.setAttribute("src", src);           /* one reload attempt */
      retried.push(imgSettled(im, Math.min(timeoutMs, 8000)));
    }
  });
  if (retried.length) await Promise.allSettled(retried);
}

/* ── Magazine readiness — REAL conditions, not timers ─────────── */
async function waitForMagazineReady(timeoutMs) {
  var deadline = Date.now() + (timeoutMs || 45000);
  var left = function () { return Math.max(1000, deadline - Date.now()); };

  /* 1) Google Sheets data + product pages fully rendered */
  var dataOk = await waitForCondition(function () {
    if (!window.ALL_PRODUCTS || !window.ALL_PRODUCTS.length) return false;
    var mount = document.getElementById("categories-mount");
    if (!mount) return false;
    if (document.querySelector(".skeleton-card")) return false;
    if (mount.querySelector(".loading-page")) return false;
    if (!mount.querySelector('.page-wrap[data-cat-key]')) return false;
    return true;
  }, left(), 300);
  if (!dataOk) return { ok: false, reason: "لم يكتمل تحميل بيانات المجلة من Google Sheets." };

  /* 2) TOC + final page (QR) mounted */
  var shellOk = await waitForCondition(function () {
    var toc = document.getElementById("toc-grid-mount");
    var fin = document.getElementById("final-page-mount");
    if (!toc || !toc.querySelector(".toc-tile")) return false;
    if (!fin || !fin.querySelector(".final-page")) return false;
    return true;
  }, left(), 300);
  if (!shellOk) return { ok: false, reason: "لم يكتمل بناء صفحات الفهرس أو الصفحة النهائية." };

  /* 3) Pagination settled (desktop only — mobile chunking is deterministic) */
  if (window.innerWidth > 700 && typeof window.enforcePageBounds === "function") {
    window.enforcePageBounds();
    await sleep(120);
    window.enforcePageBounds(); /* second pass must be a no-op → stable */
  }

  /* 4) Every product / TOC / QR image loaded (lazy processing forced) */
  forceProcessSmartImages(document);
  await waitForCondition(function () {
    return !document.querySelector("#magazine .pi-smart.pi-loading");
  }, Math.min(left(), 25000), 300);
  await settleAllImages(document.getElementById("magazine"), 12000);

  /* 5) Arabic web fonts */
  try {
    if (document.fonts) {
      await Promise.race([document.fonts.ready, sleep(Math.min(left(), 10000))]);
      await Promise.allSettled([
        document.fonts.load('700 20px "Cairo"'),
        document.fonts.load('400 16px "IBM Plex Sans Arabic"'),
        document.fonts.load('500 14px "Roboto Mono"')
      ]);
      var arabicOk = document.fonts.check('700 20px "Cairo"') ||
                     document.fonts.check('400 16px "IBM Plex Sans Arabic"');
      if (!arabicOk) {
        var fontOk = await waitForCondition(function () {
          return document.fonts.check('700 20px "Cairo"') ||
                 document.fonts.check('400 16px "IBM Plex Sans Arabic"');
        }, Math.min(left(), 12000), 400);
        if (!fontOk) return { ok: false, reason: "لم يكتمل تحميل الخط العربي. تحقق من الاتصال ثم أعد المحاولة." };
      }
    }
  } catch (e) { console.warn("[PDF] font wait warning:", e); }

  return { ok: true };
}

/* ── Pre-export validation: expected vs rendered ──────────────── */
function collectExportablePages(root) {
  return Array.prototype.slice.call(root.querySelectorAll(".page-wrap")).filter(function (w) {
    if (!w.querySelector(".page")) return false;
    if (w.querySelector(".loading-page, .skeleton-card, .empty-state, .error-state-premium, .error-card")) return false;
    return true;
  });
}

function validateMagazineIntegrity() {
  var mag = document.getElementById("magazine");
  var mount = document.getElementById("categories-mount");
  var filtered = (typeof getFilteredProducts === "function")
    ? getFilteredProducts()
    : (window.ALL_PRODUCTS || []);

  var expectedProducts = filtered.length;
  var expectedCategories = 0;
  (function () {
    var seen = {};
    filtered.forEach(function (p) {
      var k = String(p.category || "").trim().toLowerCase();
      if (k && !seen[k]) { seen[k] = 1; expectedCategories++; }
    });
  })();

  var renderedProducts = mount
    ? mount.querySelectorAll(".product-card:not(.skeleton-card)").length +
      mount.querySelectorAll(".hero-product").length
    : 0;
  var renderedCategories = 0;
  (function () {
    var seen = {};
    (mount ? mount.querySelectorAll(".page-wrap[data-cat-key]") : []).forEach(function (w) {
      var k = w.dataset.catKey;
      if (k && !seen[k]) { seen[k] = 1; renderedCategories++; }
    });
  })();

  var pages = collectExportablePages(mag);
  /* Expected: cover + ALL index pages + all category pages in the DOM + final page */
  var tocPages = document.querySelectorAll(".toc-page-wrap").length || 1;
  var expectedPages =
    1 /* cover */ +
    tocPages /* index page(s) */ +
    (mount ? mount.querySelectorAll(".page-wrap[data-cat-key]").length : 0) +
    (document.querySelector("#final-page-mount .final-page") ? 1 : 0);

  var report = {
    expectedProducts: expectedProducts,   renderedProducts: renderedProducts,
    expectedCategories: expectedCategories, renderedCategories: renderedCategories,
    expectedPages: expectedPages,         renderedPages: pages.length
  };
  var ok = expectedProducts === renderedProducts &&
           expectedCategories === renderedCategories &&
           expectedPages === pages.length &&
           expectedProducts > 0 && pages.length > 2;

  if (!ok) console.error("[PDF] Magazine integrity check FAILED:", JSON.stringify(report));
  else console.log("[PDF] Magazine integrity check passed:", JSON.stringify(report));
  return { ok: ok, report: report, pages: pages };
}

/* ── Capture sandbox (hidden same-origin iframe) ──────────────── */

/* Strip every `@media (max-width: 700px)` block from a CSS string
   (balanced-brace scan) so mobile rules can never reach the sandbox. */
function stripMobileMedia(cssText) {
  var re = /@media[^{]*\(\s*max-width\s*:\s*700px\s*\)[^{]*\{/g;
  var out = "", last = 0, m;
  while ((m = re.exec(cssText)) !== null) {
    out += cssText.slice(last, m.index);
    var depth = 1, i = re.lastIndex;
    while (i < cssText.length && depth > 0) {
      var ch = cssText[i];
      if (ch === "{") depth++;
      else if (ch === "}") depth--;
      i++;
    }
    last = i;
    re.lastIndex = i;
  }
  out += cssText.slice(last);
  return out;
}

function prepareClonedMagazine(clone) {
  /* Clone-only image normalization: Drive `uc?export=view` links block
     CORS re-fetches; lh3.googleusercontent.com serves the same file
     with CORS headers. Live-page URLs are never modified. */
  clone.querySelectorAll("img").forEach(function (img) {
    var src = img.getAttribute("src") || "";
    var m = src.match(/drive\.google\.com\/uc\?export=view&(?:amp;)?id=([a-zA-Z0-9_\-]+)/);
    if (m) img.setAttribute("src", "https://lh3.googleusercontent.com/d/" + m[1]);
    img.removeAttribute("loading");
    img.setAttribute("decoding", "sync");
    img.setAttribute("crossorigin", "anonymous");
    img.style.opacity = "1";
  });
  /* Unprocessed lazy containers should never reach the sandbox, but if
     one slips through, show its placeholder instead of a shimmer. */
  clone.querySelectorAll(".pi-smart.pi-loading").forEach(function (el) {
    el.classList.remove("pi-loading");
  });
  var ov = clone.querySelector("#pdf-export-overlay");
  if (ov) ov.remove();
  return clone;
}

async function buildCaptureSandbox() {
  var iframe = document.createElement("iframe");
  iframe.setAttribute("aria-hidden", "true");
  iframe.setAttribute("tabindex", "-1");
  iframe.width = "1400";
  iframe.height = "1900";
  iframe.style.cssText =
    "position:fixed;left:-12000px;top:0;width:1400px;height:1900px;" +
    "border:0;visibility:hidden;pointer-events:none;";
  document.body.appendChild(iframe);

  var idoc = iframe.contentDocument;
  var iwin = iframe.contentWindow;
  if (!idoc || !iwin) { iframe.remove(); throw new Error("تعذّر إنشاء بيئة التصدير."); }

  /* Head: font links + full site CSS with mobile media rules stripped */
  var fontLinks = "";
  document.querySelectorAll('link[rel="stylesheet"], link[rel="preconnect"]').forEach(function (l) {
    fontLinks += l.outerHTML;
  });
  var cssText = "";
  document.querySelectorAll("style").forEach(function (st) { cssText += st.textContent + "\n"; });
  cssText = stripMobileMedia(cssText);

  idoc.open();
  idoc.write(
    '<!DOCTYPE html><html lang="ar" dir="rtl" style="--page-scale:1"><head><meta charset="UTF-8">' +
    fontLinks +
    "<style>" + cssText + "</style>" +
    '</head><body class="pdf-exporting pdf-export-mode"></body></html>'
  );
  idoc.close();
  idoc.documentElement.style.setProperty("--page-scale", "1");

  /* Body: a deep clone of the fully-rendered magazine */
  var clone = prepareClonedMagazine(document.getElementById("magazine").cloneNode(true));
  idoc.body.appendChild(idoc.importNode ? idoc.importNode(clone, true) : clone);

  /* Wait for the sandbox's fonts + images (all cached → fast) */
  try {
    if (idoc.fonts) {
      await Promise.race([idoc.fonts.ready, sleep(8000)]);
      await Promise.allSettled([
        idoc.fonts.load('700 20px "Cairo"'),
        idoc.fonts.load('400 16px "IBM Plex Sans Arabic"'),
        idoc.fonts.load('500 14px "Roboto Mono"')
      ]);
    }
  } catch (e) { console.warn("[PDF] sandbox font warning:", e); }
  await settleAllImages(idoc.body, 15000);
  await sleep(80); /* one settled layout/paint tick */

  return { iframe: iframe, doc: idoc, win: iwin };
}

/* ── Blank-canvas detection (Safari first-render guard) ───────── */
function canvasLooksBlank(canvas) {
  try {
    var ctx = canvas.getContext("2d");
    if (!ctx) return false;
    var w = canvas.width, h = canvas.height;
    if (!w || !h) return true;
    var first = null, allSame = true;
    for (var yi = 1; yi <= 4 && allSame; yi++) {
      for (var xi = 1; xi <= 4 && allSame; xi++) {
        var d = ctx.getImageData(Math.floor(w * xi / 5), Math.floor(h * yi / 5), 1, 1).data;
        var v = d[0] + "," + d[1] + "," + d[2] + "," + d[3];
        if (first === null) first = v;
        else if (v !== first) allSame = false;
      }
    }
    return allSame;
  } catch (e) { return false; } /* tainted canvas etc. → assume not blank */
}

/* ── Pre-capture text-bounds audit (diagnostic, requirement §12) ──
   Checks key text elements against the page rect with a safe margin
   and logs any element whose ink box touches/exceeds the boundary.  */
var AUDIT_SELECTORS = [
  ".cover-headline", ".cover-mast", ".wordmark", ".page-head h1",
  ".price-new", ".price-old", ".price-new .cur",
  ".hero-product .hp-new", ".hero-product .hp-old", ".hero-product .hp-price",
  ".premium-card .price-row", ".badge", ".product-savings",
  ".toc-tile .tt-title", ".final-title"
].join(",");

function auditTextBounds(pageEl, pageIndex) {
  try {
    var SAFE = 4; /* px */
    var pr = pageEl.getBoundingClientRect();
    var flagged = 0;
    pageEl.querySelectorAll(AUDIT_SELECTORS).forEach(function (el) {
      var r = el.getBoundingClientRect();
      if (!r.width || !r.height) return;
      if (r.left   < pr.left   + SAFE || r.right  > pr.right  - SAFE ||
          r.top    < pr.top    + SAFE || r.bottom > pr.bottom - SAFE) {
        flagged++;
        console.warn("[PDF] صفحة " + pageIndex + ": عنصر نصي ملاصق لحدود الصفحة (خطر قص):",
          el.className || el.tagName,
          { left: Math.round(r.left - pr.left), right: Math.round(pr.right - r.right),
            top: Math.round(r.top - pr.top), bottom: Math.round(pr.bottom - r.bottom) });
      }
    });
    /* Badge-internal check: every text line must sit inside its badge */
    var BSAFE = 2; /* px */
    pageEl.querySelectorAll(".badge").forEach(function (badge) {
      if (!badge.offsetWidth) return;
      var br = badge.getBoundingClientRect();
      badge.querySelectorAll(".offer-main, .offer-free, .lbl, .pct").forEach(function (line) {
        var lr = line.getBoundingClientRect();
        if (!lr.width || !lr.height) return;
        if (lr.left < br.left + BSAFE || lr.right  > br.right  - BSAFE ||
            lr.top  < br.top  + BSAFE || lr.bottom > br.bottom - BSAFE) {
          flagged++;
          console.warn("[PDF] صفحة " + pageIndex + ": نص يلامس حدود الـBadge:",
            (line.className || line.tagName) + " → «" + (line.textContent || "").trim().slice(0, 30) + "»",
            { left: Math.round(lr.left - br.left), right: Math.round(br.right - lr.right),
              top: Math.round(lr.top - br.top), bottom: Math.round(br.bottom - lr.bottom) });
        }
      });
    });
    if (flagged) console.warn("[PDF] صفحة " + pageIndex + ": " + flagged + " عنصر بحاجة لمراجعة الهوامش.");
  } catch (e) { /* diagnostic only — never blocks the export */ }
}

/* ── Per-page rasterization: html-to-image → html2canvas ──────── */
async function capturePage(sb, pageEl, scale, fontEmbedCSS) {
  var lastErr = null;

  if (sb.win.htmlToImage) {
    for (var attempt = 1; attempt <= 3; attempt++) {
      try {
        var canvas = await sb.win.htmlToImage.toCanvas(pageEl, {
          width: PAGE_W,
          height: PAGE_H,
          pixelRatio: scale,
          backgroundColor: "#FDFAF1",
          cacheBust: false,
          skipAutoScale: true,
          fontEmbedCSS: fontEmbedCSS || undefined,
          filter: function (node) {
            return !(node.id === "pdf-export-overlay");
          }
        });
        if (canvas && canvas.width && !canvasLooksBlank(canvas)) return canvas;
        lastErr = new Error("blank canvas (attempt " + attempt + ")");
      } catch (e) { lastErr = e; }
      await sleep(250 * attempt);
    }
    console.warn("[PDF] html-to-image failed for a page, falling back to html2canvas:", lastErr);
  }

  /* Automatic fallback: html2canvas inside the same desktop sandbox,
     with raster-safe overrides (Arabic letter-spacing, gradient text…) */
  await loadScriptInto(sb.doc, HTML2CANVAS_SRC);
  if (typeof sb.win.html2canvas !== "function") {
    throw (lastErr || new Error("renderer unavailable"));
  }
  sb.doc.body.classList.add("pdf-raster-fallback");
  try {
    var c2 = await sb.win.html2canvas(pageEl, {
      scale: scale,
      useCORS: true,
      allowTaint: false,
      backgroundColor: "#FDFAF1",
      imageTimeout: 20000,
      logging: false,
      scrollX: 0,
      scrollY: 0,
      windowWidth: 1400,
      windowHeight: 1900
    });
    if (!c2 || !c2.width || canvasLooksBlank(c2)) {
      throw (lastErr || new Error("blank fallback canvas"));
    }
    return c2;
  } finally {
    sb.doc.body.classList.remove("pdf-raster-fallback");
  }
}

/* ── Dynamic file name ────────────────────────────────────────── */
function sanitizeFileToken(s) {
  return String(s || "")
    .replace(/[^0-9A-Za-z\u0600-\u06FF]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}
function buildPdfFileName() {
  var explicit = "";
  try { explicit = (typeof getSetting === "function") ? getSetting("pdf_file_name") : ""; } catch (e) {}
  if (explicit) {
    var name = sanitizeFileToken(explicit.replace(/\.pdf$/i, ""));
    return (name || "Ocean-Offers-Magazine") + ".pdf";
  }
  var edition = "";
  try { edition = (typeof getSetting === "function") ? getSetting("cover_edition_strong") : ""; } catch (e) {}
  if (!edition) {
    var el = document.querySelector(".cover-edition strong");
    if (el) edition = el.textContent;
  }
  var token = sanitizeFileToken(edition);
  if (!token) {
    var d = new Date();
    token = d.toLocaleString("en-US", { month: "long" }) + "-" + d.getFullYear();
  }
  return "Ocean-Offers-Magazine-" + token + ".pdf";
}

/* ── Main export flow ─────────────────────────────────────────── */
async function exportMagazinePDF() {
  if (_pdfExporting) return;                        /* block double clicks */
  var btn = document.getElementById("print-btn");
  _pdfExporting = true;
  if (btn) { btn.disabled = true; btn.setAttribute("aria-busy", "true"); btn.style.opacity = ".6"; }
  showPdfProgress("جاري تجهيز المجلة…", 2);

  var sandbox = null;
  try {
    /* 1) Load libraries (main window: jsPDF only) */
    await loadScriptInto(document, JSPDF_SRC);
    if (!window.jspdf || !window.jspdf.jsPDF) throw new Error("مكتبات التصدير غير متاحة حالياً.");

    /* 2) Real readiness gates */
    showPdfProgress("جاري التأكد من اكتمال تحميل المجلة…", 5);
    var ready = await waitForMagazineReady(45000);
    if (!ready.ok) throw new Error(ready.reason);

    /* 3) Integrity validation — refuse to export a partial magazine */
    showPdfProgress("جاري التحقق من اكتمال الصفحات…", 9);
    var integrity = validateMagazineIntegrity();
    if (!integrity.ok) {
      throw new Error("لم يكتمل تحميل جميع صفحات المجلة، يرجى الانتظار ثم إعادة المحاولة.");
    }
    var livePages = integrity.pages;

    /* 4) Build the desktop capture sandbox from the verified DOM */
    showPdfProgress("جاري تجهيز نسخة الطباعة…", 13);
    sandbox = await buildCaptureSandbox();
    await loadScriptInto(sandbox.doc, HTML_TO_IMAGE_SRC).catch(function (e) {
      console.warn("[PDF] html-to-image unavailable, html2canvas fallback will be used:", e);
    });

    var sbPages = collectExportablePages(sandbox.doc.body);
    if (sbPages.length !== livePages.length) {
      console.error("[PDF] sandbox/live page mismatch:", sbPages.length, "vs", livePages.length);
      throw new Error("لم يكتمل تحميل جميع صفحات المجلة، يرجى الانتظار ثم إعادة المحاولة.");
    }

    /* Verify the sandbox really carries every card (clone integrity) */
    var sbCards = sandbox.doc.body.querySelectorAll(".product-card:not(.skeleton-card)").length +
                  sandbox.doc.body.querySelectorAll(".hero-product").length;
    if (sbCards !== integrity.report.renderedProducts) {
      console.error("[PDF] sandbox clone is missing cards:", sbCards, "vs", integrity.report.renderedProducts);
      throw new Error("لم يكتمل تحميل جميع صفحات المجلة، يرجى الانتظار ثم إعادة المحاولة.");
    }

    /* 5) Pre-compute the embedded @font-face CSS once (reused per page) */
    var fontEmbedCSS = "";
    if (sandbox.win.htmlToImage && sandbox.win.htmlToImage.getFontEmbedCSS) {
      try {
        fontEmbedCSS = await sandbox.win.htmlToImage.getFontEmbedCSS(sbPages[0]);
      } catch (e) { console.warn("[PDF] font embed CSS failed (fonts may fall back):", e); }
    }

    /* 6) Rasterize page by page → one PDF page per .page-wrap */
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF({
      orientation: "portrait",
      unit: "px",
      format: [PAGE_W, PAGE_H],
      hotfixes: ["px_scaling"],
      compress: true
    });
    var scale = sbPages.length > 18 ? 1.5 : 2;   /* 2× ≈ A4 @ 300dpi */
    var added = 0;

    for (var i = 0; i < sbPages.length; i++) {
      showPdfProgress("جاري تجهيز الصفحة " + (i + 1) + " من " + sbPages.length + "…",
                      15 + Math.round((i / sbPages.length) * 78));
      auditTextBounds(sbPages[i], i + 1);
      var canvas = await capturePage(sandbox, sbPages[i], scale, fontEmbedCSS);
      var imgData = canvas.toDataURL("image/jpeg", 0.92);
      if (added > 0) pdf.addPage([PAGE_W, PAGE_H], "portrait");
      pdf.addImage(imgData, "JPEG", 0, 0, PAGE_W, PAGE_H, undefined, "FAST");
      added++;
      canvas.width = 0; canvas.height = 0;       /* release memory */
      await sleep(30);                            /* keep UI responsive */
    }

    /* 7) Post-export validation — page count must match exactly */
    if (added !== sbPages.length || pdf.getNumberOfPages() !== sbPages.length) {
      console.error("[PDF] page count mismatch:", added, pdf.getNumberOfPages(), sbPages.length);
      throw new Error("لم يكتمل إنشاء جميع الصفحات، يرجى إعادة المحاولة.");
    }

    /* 8) Save */
    showPdfProgress("جاري إنشاء ملف PDF…", 96);
    await sleep(60);
    pdf.save(buildPdfFileName());

    var ov = document.getElementById("pdf-export-overlay");
    if (ov) ov.classList.add("done");
    showPdfProgress("تم تحميل المجلة بنجاح ✓", 100);
    if (typeof showOrderToast === "function") showOrderToast("تم تحميل المجلة بنجاح ✓");
    setTimeout(hidePdfOverlay, 1400);

  } catch (err) {
    console.error("[PDF] export failed:", err);
    hidePdfOverlay();
    var msg = (err && err.message) ? err.message : "حدث خطأ غير متوقع.";
    if (typeof showOrderToast === "function") {
      showOrderToast("تعذّر تصدير ملف PDF: " + msg, 5600);
    } else {
      alert("تعذّر تصدير ملف PDF: " + msg);
    }
  } finally {
    if (sandbox && sandbox.iframe) { try { sandbox.iframe.remove(); } catch (e) {} }
    _pdfExporting = false;
    if (btn) { btn.disabled = false; btn.removeAttribute("aria-busy"); btn.style.opacity = ""; }
    document.body.classList.remove("pdf-exporting", "pdf-raster-fallback", "pdf-export-mode");
  }
}

})();

<script>
/* Magazine/PDF features are deliberately inert on the storefront. Their
   source blocks above are compiled only after an explicit request. */
(function () {
  "use strict";
  var loaded = Object.create(null);
  var magazinePromise = null;
  var pdfPromise = null;

  function executeDeferredModule(id) {
    if (loaded[id]) return;
    var source = document.getElementById(id);
    if (!source) throw new Error("Deferred module not found: " + id);
    var script = document.createElement("script");
    script.text = source.textContent || "";
    script.setAttribute("data-ocean-loaded-module", id);
    document.head.appendChild(script);
    loaded[id] = true;
  }

  window.loadOceanMagazineModules = function () {
    if (magazinePromise) return magazinePromise;
    magazinePromise = Promise.resolve().then(function () {
      executeDeferredModule("ocean-magazine-extras-module");
      executeDeferredModule("ocean-magazine-cover-module");
      executeDeferredModule("ocean-magazine-layout-module");
    });
    return magazinePromise;
  };

  window.loadOceanPdfModule = function () {
    if (typeof window.exportMagazinePDF === "function") return Promise.resolve();
    if (pdfPromise) return pdfPromise;
    pdfPromise = window.loadOceanMagazineModules().then(function () {
      executeDeferredModule("ocean-pdf-export-module");
      if (typeof window.exportMagazinePDF !== "function") {
        throw new Error("تعذر تهيئة أداة PDF.");
      }
    });
    return pdfPromise;
  };

  window.requestMagazinePDF = function () {
    return window.loadOceanPdfModule()
      .then(function () { return window.exportMagazinePDF(); })
      .catch(function (error) {
        console.error("[PDF] lazy load failed:", error);
        if (typeof showOrderToast === "function") {
          showOrderToast("تعذر تشغيل أداة PDF. حاول مرة أخرى.", 4200);
        }
        return null;
      });
  };
})();
</script>

  ["واقي شمس", "واقي الشمس", "واقي للشمس", "sunscreen", "sunblock", "صن بلوك", "صن سكرين"],
  ["حفاض", "حفاضات", "حفايض", "diapers", "بامبرز", "pampers"],
  ["رضاعه", "رضاعة", "رضّاعة", "bottle", "feeding bottle", "ببرونه", "ببرونة"],
  ["شامبو", "شامبوه", "shampoo"],

  ["ميلاتونين", "ميلاتون", "melatonin"],

  ["سيباميد", "sebamed"],
  ["موستيلا", "mustela"],
  ["حليب", "لبن", "milk", "formula"],
  ["مكمل", "مكملات", "supplement", "supplements"],

    if (++edits > 1) return false;
    if (la === lb) { i++; j++; }
    else if (la > lb) { i++; }
    else { j++; }

  { id: "25-50", lbl: "25 – 50 ر.س",    test: function (v) { return v >= 25 && v <= 50; } },
  { id: "50-100",lbl: "50 – 100 ر.س",   test: function (v) { return v > 50 && v <= 100; } },
  { id: "gt100", lbl: "أكثر من 100 ر.س", test: function (v) { return v > 100; } }

    var e = r.e, p = e.p;
    if (SHOP.cat && String(p.category || "").trim().toLowerCase() !== SHOP.cat) return false;
    if (SHOP.hot && e.disc < 30) return false;

    if (SHOP.price) { var rng = priceRangeById(SHOP.price); if (rng && !rng.test(e.price)) return false; }
    if (SHOP.offer && e.offer !== SHOP.offer) return false;

  var arr = list.slice();
  switch (mode) {
    case "relevance": /* already score-sorted by searchProducts */ break;
    case "discount": arr.sort(function (a, b) { return b.e.disc - a.e.disc || a.e.order - b.e.order; }); break;
    case "saving": arr.sort(function (a, b) { return b.e.save - a.e.save || a.e.order - b.e.order; }); break;
    case "priceAsc": arr.sort(function (a, b) { return (a.e.price || 1e9) - (b.e.price || 1e9); }); break;
    case "priceDesc": arr.sort(function (a, b) { return b.e.price - a.e.price; }); break;

/* ───────────────────── HEADER: CHIPS + INTRO ─────────────────── */
function shopSafeHex(value, fallback) {
  var v = String(value || "").trim();
  var m = v.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
  if (!m) return fallback;
  if (m[1].length === 3) {
    v = "#" + m[1].split("").map(function (c) { return c + c; }).join("");
  }
  return v.toUpperCase();
}
function shopContrastText(hex, secondHex) {
  function luminance(value) {
    var v = shopSafeHex(value, "#0E3D6E").slice(1);
    var rgb = [v.slice(0, 2), v.slice(2, 4), v.slice(4, 6)].map(function (part) {
      var c = parseInt(part, 16) / 255;
      return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
  }
  var surfaces = [hex];
  if (secondHex) surfaces.push(secondHex);
  var darkLum = luminance("#10233D");
  var whiteWorst = Infinity;
  var darkWorst = Infinity;
  surfaces.forEach(function (surface) {
    var surfaceLum = luminance(surface);
    whiteWorst = Math.min(whiteWorst, 1.05 / (surfaceLum + 0.05));
    darkWorst = Math.min(darkWorst, (Math.max(surfaceLum, darkLum) + 0.05) /
      (Math.min(surfaceLum, darkLum) + 0.05));
  });
  return whiteWorst >= darkWorst ? "#FFFFFF" : "#10233D";
}

    var deep = shopSafeHex(cat.accent_deep, accent);
    var bg = shopSafeHex(cat.bg, "#FDFAF1");
    var on = shopContrastText(accent, deep);
    var ink = shopContrastText(bg);
    html += '<button type="button" class="sh-chip" data-chip="cat" data-cat="' + escapeHtml(cat.key) + '" style="--cat-accent:' + accent + ';--cat-deep:' + deep + ';--cat-bg:' + bg + ';--cat-on:' + on + ';--cat-ink:' + ink + '">' + escapeHtml(cat.name_ar) + '</button>';

var _sgTimer = null;
function markMatch(text, qNorm) {
  var t = String(text || "");
  var tokens = qNorm.split(" ").filter(Boolean);
  if (!tokens.length) return escapeHtml(t);
  // best-effort highlight on the normalized-aligned raw string
  var out = escapeHtml(t);
  tokens.forEach(function (tok) {
    if (tok.length < 2) return;
    try {
      var re = new RegExp("(" + tok.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "i");
      out = out.replace(re, "<mark>$1</mark>");
    } catch (e) {}
  });
  return out;
}
function renderSuggestions() {

  if (!raw) {
    var recent = getRecentSearches();
    if (recent.length) {
      html += '<div class="sg-head">عمليات البحث الأخيرة <button type="button" data-sg="clear-recent">مسح</button></div>';
      recent.forEach(function (r) {
        html += '<button type="button" class="sg-item" data-sg="query" data-q="' + escapeHtml(r) + '"><span class="sg-icn">⏱</span><span class="sg-txt">' + escapeHtml(r) + '</span></button>';
      });
    }
    if (!html) { box.hidden = true; box.innerHTML = ""; return; }
    box.innerHTML = html; box.hidden = false; return;
  }
  if (qNorm.length < 2) { box.hidden = true; return; }

  var results = searchProducts(raw);
  var top = results.slice(0, 5);
  top.forEach(function (r) {
    var p = r.e.p;
    html += '<button type="button" class="sg-item" data-sg="product" data-id="' + escapeHtml(getProductCartId(p)) + '">' +
      '<span class="sg-icn">›</span><span class="sg-txt">' + markMatch(p.product_name_ar || p.product_name_en, qNorm) + '</span>' +
      '<span class="sg-price">' + fmtPrice(r.e.price) + ' ر.س</span></button>';
  });
  (window.ORDERED_CATS || []).forEach(function (cat) {
    if (html.split("sg-item").length > 8) return;
    var hay = normalizeSearchText(cat.name_ar + " " + cat.name_en);
    if (qNorm.split(" ").every(function (t) { return hay.indexOf(t) !== -1; })) {
      html += '<button type="button" class="sg-item" data-sg="cat" data-cat="' + escapeHtml(cat.key) + '"><span class="sg-icn">≡</span><span class="sg-txt">قسم: ' + escapeHtml(cat.name_ar) + '</span></button>';
    }
  });
  html += '<button type="button" class="sg-item sg-all" data-sg="all">عرض جميع النتائج (' + results.length + ')</button>';

function saveCartToStorage() {

    localStorage.setItem("ocean_cart", JSON.stringify(items));
  } catch (e) {}
}
function restoreCartFromStorage() {
  try {
    var items = JSON.parse(localStorage.getItem("ocean_cart") || "[]");
    if (!Array.isArray(items) || !items.length) return;
    items.forEach(function (it) {
      if (it && it.id && it.qty > 0) CART.set(it.id, it);
    });
    CART.forEach(function (v, id) { try { _syncQtyControl(id); } catch (e) {} });
    if (typeof updateCartBar === "function") updateCartBar();
    syncShopCartUI();
  } catch (e) {}
}
function cartTotals() {
  var items = 0, qty = 0, sum = 0, save = 0;
  CART.forEach(function (v) {
    items++; qty += v.qty; sum += v.price * v.qty;
    if (v.old_price && v.old_price > v.price) save += (v.old_price - v.price) * v.qty;
  });
  return { items: items, qty: qty, sum: sum, save: save };
}
